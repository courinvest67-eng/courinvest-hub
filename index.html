function AppWithAuth(){
  const[authUser,sAuthUser]=useState(null);
  const[authChecked,sAuthChecked]=useState(false);
  /* Check if Firebase failed to load */
  if(window._fbLoadError||!window._fbAuth){
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg,padding:20}}>
        <div style={{maxWidth:480,width:"100%",background:T.card,border:"1px solid "+T.red+"44",borderRadius:20,padding:32,textAlign:"center"}}>
          <div style={{fontSize:42,marginBottom:12}}>⚠️</div>
          <div style={{fontSize:18,fontWeight:800,color:T.red,marginBottom:10}}>Firebase não carregou</div>
          <div style={{fontSize:13,color:T.t2,lineHeight:1.6,marginBottom:18}}>{window._fbLoadError||"O SDK do Firebase falhou ao iniciar."}</div>
          <div style={{fontSize:11,color:T.t3,lineHeight:1.7,textAlign:"left",background:T.w3,padding:14,borderRadius:10,marginBottom:16}}>
            <strong style={{color:T.gold}}>Como resolver:</strong><br/>
            • Verifique sua conexão com a internet<br/>
            • Desative bloqueadores (AdBlock, Brave Shield, etc.)<br/>
            • Tente em aba anônima (Ctrl+Shift+N)<br/>
            • Teste em outro navegador (Chrome recomendado)
          </div>
          <button onClick={function(){window.location.reload()}} style={{padding:"12px 28px",borderRadius:12,border:"none",background:T.grd,color:T.bg,fontSize:13,fontWeight:800,cursor:"pointer"}}>🔄 Recarregar</button>
        </div>
      </div>
    );
  }
  useEffect(function(){
    var unsub=window._fbAuth.onAuthStateChanged(function(user){
      if(user&&window._fbWhitelist.indexOf((user.email||"").toLowerCase())>=0){
        sAuthUser(user);
      }else{
        sAuthUser(null);
        if(user)window._fbAuth.signOut();
      }
      sAuthChecked(true);
    });
    return function(){unsub()};
  },[]);
  if(!authChecked){
    return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:T.bg}}>
        <div style={{color:T.gold,fontSize:14,fontWeight:600,letterSpacing:2}}>Courinvest · carregando…</div>
      </div>
    );
  }
  if(!authUser)return <LoginScreen/>;
  return <App authUser={authUser}/>;
}

/* APP */
function App({authUser}){
  /* Lazy init: tenta carregar do localStorage (cache enquanto Firestore carrega) */
  const initState=(function(){
    try{
      var saved=localStorage.getItem("courinvest_data_v1");
      if(saved){
        var parsed=JSON.parse(saved);
        if(parsed&&Array.isArray(parsed.cl)&&Array.isArray(parsed.it)){
          if(!parsed.fin)parsed.fin={entradas:[],despesas:[]};
          return parsed;
        }
      }
    }catch(e){console.warn("localStorage read failed:",e)}
    return{cl:iC,it:iI,fin:{entradas:[],despesas:[]}};
  })();
  const[d,dp]=useReducer(rd,initState);
  const[syncState,sSyncState]=useState("loading"); /* loading | synced | offline | error */
  const isInitialLoadRef=useRef(true);
  const skipNextSaveRef=useRef(false);
  /* Firestore sync: ler uma vez ao logar */
  useEffect(function(){
    if(!window._fbDB){sSyncState("error");return}
    var docRef=window._fbDB.collection("workspaces").doc("main");
    docRef.get().then(function(snap){
      if(snap.exists){
        var data=snap.data();
        if(data&&Array.isArray(data.cl)&&Array.isArray(data.it)){
          skipNextSaveRef.current=true;
          dp({t:"REPLACE_ALL",p:{cl:data.cl,it:data.it,fin:data.fin||{entradas:[],despesas:[]}}});
        }
      }else{
        /* Primeira vez: envia o estado inicial pro Firestore */
        docRef.set({cl:initState.cl,it:initState.it,fin:initState.fin||{entradas:[],despesas:[]},updated:Date.now()}).catch(function(e){console.warn("Initial sync failed:",e)});
      }
      sSyncState("synced");
      isInitialLoadRef.current=false;
    }).catch(function(err){
      console.warn("Firestore read failed, using local cache:",err);
      sSyncState("offline");
      isInitialLoadRef.current=false;
    });
  },[]);
  /* Persistência local + Firestore */
  useEffect(function(){
    try{localStorage.setItem("courinvest_data_v1",JSON.stringify(d))}
    catch(e){console.warn("localStorage save failed:",e)}
    if(isInitialLoadRef.current||skipNextSaveRef.current){
      skipNextSaveRef.current=false;
      return;
    }
    /* Debounced save to Firestore */
    var timeoutId=setTimeout(function(){
      if(!window._fbDB)return;
      window._fbDB.collection("workspaces").doc("main").set({
        cl:d.cl,it:d.it,fin:d.fin||{entradas:[],despesas:[]},updated:Date.now()
      }).then(function(){sSyncState("synced")}).catch(function(e){
        console.warn("Firestore save failed:",e);
        sSyncState("offline");
      });
    },800);
    return function(){clearTimeout(timeoutId)};
  },[d]);
  const[pg,sPg]=useState("dashboard");
  const[sel,sSel]=useState(null);
  const[col,sCol]=useState(false);
  const[showN,sShowN]=useState(false);

        <div style={{width:col?68:240,background:"linear-gradient(180deg,rgba(8,15,30,0.98),rgba(5,10,20,0.99))",borderRight:"1px solid rgba(212,163,40,0.06)",display:"flex",flexDirection:"column",transition:"width 0.35s cubic-bezier(0.4,0,0.2,1)",overflow:"hidden",flexShrink:0}}>
          <div onClick={function(){sCol(!col)}} style={{padding:col?"18px 14px":"24px 22px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",minHeight:72,display:"flex",alignItems:"center"}}>
            {col ? <Logo sz={32} full={false}/> : <Logo sz={36} full={true}/>}
          </div>
          <div style={{flex:1,padding:"16px 10px",display:"flex",flexDirection:"column",gap:3}}>
            {navItems.map(function(n){var active=pg===n.id;return (
              <button key={n.id} onClick={function(){go(n.id)}} style={{display:"flex",alignItems:"center",gap:12,padding:col?"12px":"11px 16px",borderRadius:12,border:"none",cursor:"pointer",justifyContent:col?"center":"flex-start",background:active?"rgba(212,163,40,0.08)":"transparent",color:active?T.gold:T.t3,fontSize:14,fontWeight:active?700:400,position:"relative",letterSpacing:.2}}>
                {active && <div style={{position:"absolute",left:0,top:"18%",height:"64%",width:3,borderRadius:2,background:T.grd}}/>}
                <span style={{fontSize:17,opacity:active?1:.5,transition:"opacity 0.2s"}}>{n.i}</span>
                {!col && <span style={{transition:"color 0.2s"}}>{n.l}</span>}
              </button>
            )})}
          </div>
          {!col && <div style={{padding:14,borderTop:"1px solid rgba(255,255,255,0.03)"}}><div style={{padding:16,background:"rgba(212,163,40,0.04)",borderRadius:14,textAlign:"center",border:"1px solid rgba(212,163,40,0.06)"}}><div style={{fontSize:9,fontWeight:800,color:T.gold,letterSpacing:3,opacity:.8}}>COURINVEST HUB</div><div style={{fontSize:9,color:T.t3,marginTop:4,letterSpacing:1}}>Premium v3.0</div></div></div>}
        </div>
      )}

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* Desktop header */}
        {!isMobile && (
          <div style={{padding:"14px 28px",borderBottom:"1px solid rgba(255,255,255,0.04)",background:"rgba(8,15,30,0.9)",backdropFilter:"blur(20px)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h1 style={{margin:0,fontSize:19,fontWeight:700,letterSpacing:.3}}><span style={{color:T.gold,marginRight:8,fontSize:14}}>✦</span>{titles[pg]}</h1>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              {/* Sync indicator */}
              <div title={syncState==="synced"?"Sincronizado com nuvem":syncState==="loading"?"Sincronizando…":syncState==="offline"?"Offline — mudanças salvas localmente":"Erro de sincronização"} style={{display:"flex",alignItems:"center",gap:6,fontSize:10,color:syncState==="synced"?T.green:syncState==="loading"?T.gold:T.orange,padding:"4px 10px",background:syncState==="synced"?T.greenD:syncState==="loading"?T.goldD:T.orangeD,border:"1px solid "+(syncState==="synced"?T.green+"22":syncState==="loading"?T.gold+"22":T.orange+"22"),borderRadius:20,fontWeight:700}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:syncState==="synced"?T.green:syncState==="loading"?T.gold:T.orange,animation:syncState==="loading"?"pulse 1.5s ease-in-out infinite":"none"}}/>
                {syncState==="synced"?"SYNC":syncState==="loading"?"SINCRONIZANDO":"OFFLINE"}
              </div>
              <div style={{position:"relative"}}>
                <button onClick={function(){sShowN(!showN)}} style={{background:showN?"rgba(212,163,40,0.08)":"transparent",border:"1px solid "+(showN?"rgba(212,163,40,0.15)":"transparent"),borderRadius:11,padding:"7px 9px",cursor:"pointer",fontSize:17,transition:"all 0.2s"}}>🔔
                  {nL>0 && <span style={{position:"absolute",top:1,right:1,width:16,height:16,borderRadius:"50%",background:"linear-gradient(135deg,#F87171,#EF4444)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:9,fontWeight:800,color:"white",boxShadow:"0 2px 8px rgba(248,113,113,0.4)"}}>{nL}</span>}
                </button>
                {showN && (
                  <div style={{position:"absolute",top:44,right:0,width:340,background:"rgba(12,21,40,0.95)",backdropFilter:"blur(24px)",border:"1px solid rgba(212,163,40,0.08)",borderRadius:18,padding:6,boxShadow:"0 24px 80px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.02)",zIndex:100,animation:"scaleIn .2s ease"}}>
                    <div style={{padding:"12px 14px",borderBottom:"1px solid "+T.w3}}><span style={{fontSize:13,fontWeight:700,color:T.gold}}>Notificações</span></div>
                    {nots.map(function(n){return (
                      <div key={n.id} style={{display:"flex",gap:10,padding:"10px 12px",background:n.lido?"transparent":T.goldD,borderRadius:10,margin:3}}>
                        <span style={{fontSize:18}}>{n.ic}</span>
                        <div style={{flex:1}}><div style={{fontSize:12,fontWeight:n.lido?400:600}}>{n.msg}</div><div style={{fontSize:10,color:T.t3}}>{n.tp} atrás</div></div>
                        {!n.lido && <div style={{width:8,height:8,borderRadius:"50%",background:T.gold,marginTop:6}}/>}
                      </div>
                    )})}
                  </div>
                )}
              </div>
              {/* User / logout */}
              <button onClick={function(){if(confirm("Sair da conta?"))window._fbAuth.signOut()}} title={"Logado como "+(authUser?authUser.email:"")+" · Clique para sair"} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 12px 5px 5px",borderRadius:20,border:"1px solid "+T.bdr,background:T.w3,color:T.t2,cursor:"pointer",fontSize:11,fontWeight:600}}>
                {authUser&&authUser.photoURL?<img src={authUser.photoURL} alt="" style={{width:26,height:26,borderRadius:"50%"}}/>:<span style={{width:26,height:26,borderRadius:"50%",background:T.gold,color:T.bg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:11}}>C</span>}
                Sair
              </button>
            </div>
          </div>
        )}

        {/* Mobile notification dropdown */}
        {isMobile && showN && (
          <div style={{position:"fixed",top:50,right:8,width:"calc(100% - 16px)",maxWidth:340,background:T.bg3,border:"1px solid "+T.bdr,borderRadius:18,padding:6,boxShadow:"0 20px 60px rgba(0,0,0,0.5)",zIndex:300}} onClick={function(e){e.stopPropagation()}}>
            <div style={{padding:"12px 14px",borderBottom:"1px solid "+T.w3,display:"flex",justifyContent:"space-between"}}><span style={{fontSize:13,fontWeight:700,color:T.gold}}>Notificações</span><button onClick={function(){sShowN(false)}} style={{background:"none",border:"none",color:T.t3,cursor:"pointer"}}>✕</button></div>
            {nots.map(function(n){return (
              <div key={n.id} style={{display:"flex",gap:10,padding:"10px 12px",background:n.lido?"transparent":T.goldD,borderRadius:10,margin:3}}>
                <span style={{fontSize:18}}>{n.ic}</span>
                <div style={{flex:1}}><div style={{fontSize:12,fontWeight:n.lido?400:600}}>{n.msg}</div><div style={{fontSize:10,color:T.t3}}>{n.tp}</div></div>
              </div>
            )})}
          </div>
        )}

        {/* Mobile page title */}
        {isMobile && (
          <div style={{padding:"10px 16px",borderBottom:"1px solid "+T.bdr}}>
            <h1 style={{margin:0,fontSize:17,fontWeight:800}}><span style={{color:T.gold,marginRight:6}}>✦</span>{titles[pg]}</h1>
          </div>
        )}

        <div style={{flex:1,overflow:"auto",padding:isMobile?14:28,background:"radial-gradient(ellipse at 15% -5%,rgba(212,163,40,0.03),transparent 45%),radial-gradient(ellipse at 85% 100%,rgba(56,189,248,0.015),transparent 45%)"}} onClick={function(){sShowN(false)}}>
          {pg==="dashboard" && <Dash data={d}/>}
          {pg==="clients" && !sel && <CL data={d} onSel={function(c){sSel(c)}} dispatch={dp}/>}
          {pg==="clients" && sel && <CD client={sel} data={d} dispatch={dp} onBack={function(){sSel(null)}}/>}
          {pg==="financeiro" && <FinanceiroView data={d} dispatch={dp}/>}
          {pg==="metas" && <MetasConsultor/>}
          {pg==="pipeline" && <PipelineView data={d} dispatch={dp}/>}
          {pg==="agenda" && <Ag/>}
          {pg==="news" && <NewsView/>}
          {pg==="import" && <ImportView/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AppWithAuth/>);

</script>
</body>
</html>
