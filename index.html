function rd(st,ac){
  if(ac.t==="AC") return {...st,cl:[...st.cl,{...ac.p,id:ac.p.id||("c"+Date.now())}]};
  if(ac.t==="UC") return {...st,cl:st.cl.map(c=>c.id===ac.p.id?{...c,...ac.p}:c)};
  if(ac.t==="RC") return {...st,cl:[...st.cl.filter(c=>c.nome.toLowerCase()!==ac.p.nome.toLowerCase()),ac.p]};
  if(ac.t==="AI") return {...st,it:[{...ac.p,id:"i"+Date.now()},...st.it]};
  if(ac.t==="DC") return {...st,cl:st.cl.filter(c=>c.id!==ac.p),it:st.it.filter(i=>i.cid!==ac.p)};
  /* Financeiro */
  if(ac.t==="FIN_ADD_ENTRADAS") return {...st,fin:{...(st.fin||{}),entradas:[...((st.fin&&st.fin.entradas)||[]),...ac.p]}};
  if(ac.t==="FIN_CLEAR_ENTRADAS") return {...st,fin:{...(st.fin||{}),entradas:[]}};
  if(ac.t==="FIN_ADD_DESPESA") return {...st,fin:{...(st.fin||{}),despesas:[...((st.fin&&st.fin.despesas)||[]),ac.p]}};
  if(ac.t==="FIN_DEL_DESPESA") return {...st,fin:{...(st.fin||{}),despesas:((st.fin&&st.fin.despesas)||[]).filter(function(d){return d.id!==ac.p})}};
  if(ac.t==="REPLACE_ALL") return {cl:ac.p.cl||[],it:ac.p.it||[],fin:ac.p.fin||{entradas:[],despesas:[]}};
  return st;
}

function Spark({data,color,w=120,h=32}){const mn=Math.min(...data),mx=Math.max(...data),rng=mx-mn||1;const pts=data.map((v,i)=>(i/(data.length-1))*w+","+(h-((v-mn)/rng)*h*0.75-h*0.12)).join(" ");const gid="sg"+color.replace(/[^a-z0-9]/gi,"").slice(0,4);const area=pts+" "+w+","+h+" 0,"+h;return <svg width={w} height={h} viewBox={"0 0 "+w+" "+h}><defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.2"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs><polygon points={area} fill={"url(#"+gid+")"}/><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;}
function Donut({items,sz=140}){let cum=0;const r=sz/2-8,cx=sz/2,total=items.reduce((a,b)=>a+b.v,0);return <svg width={sz} height={sz} viewBox={"0 0 "+sz+" "+sz}>{items.map((it,i)=>{const p=it.v/total,s=cum*2*Math.PI-Math.PI/2;cum+=p;const e=cum*2*Math.PI-Math.PI/2,lg=p>0.5?1:0,ir=r*0.6;return <path key={i} d={"M "+(cx+r*Math.cos(s))+" "+(cx+r*Math.sin(s))+" A "+r+" "+r+" 0 "+lg+" 1 "+(cx+r*Math.cos(e))+" "+(cx+r*Math.sin(e))+" L "+(cx+ir*Math.cos(e))+" "+(cx+ir*Math.sin(e))+" A "+ir+" "+ir+" 0 "+lg+" 0 "+(cx+ir*Math.cos(s))+" "+(cx+ir*Math.sin(s))+" Z"} fill={it.c} opacity=".85"/>})}<circle cx={cx} cy={cx} r={r*0.53} fill="rgba(8,18,36,0.9)"/><text x={cx} y={cx-3} textAnchor="middle" fill={T.t3} fontSize="8" fontWeight="600">RECEITA</text><text x={cx} y={cx+11} textAnchor="middle" fill={T.gold} fontSize="11" fontWeight="800">{fm(total)}</text></svg>;}
function Logo({sz=40,full=true}){return <div style={{display:"flex",alignItems:"center",gap:full?14:0}}><div style={{width:sz,height:sz,animation:"glow 4s ease infinite"}}><svg width={sz} height={sz} viewBox="0 0 100 100" fill="none"><defs><linearGradient id="gld" x1="0" y1="0" x2="100" y2="100"><stop offset="0%" stopColor="#F0D060"/><stop offset="50%" stopColor="#D4A328"/><stop offset="100%" stopColor="#B8891A"/></linearGradient></defs><circle cx="50" cy="50" r="46" stroke="url(#gld)" strokeWidth="0.5" opacity=".15"/><path d="M50 6 C18 6,6 26,6 50 C6 74,18 94,50 94" stroke="url(#gld)" strokeWidth="5" strokeLinecap="round" fill="none"/><path d="M50 18 C28 18,18 32,18 50 C18 68,28 82,50 82" stroke="url(#gld)" strokeWidth="4" strokeLinecap="round" fill="none" opacity=".7"/><circle cx="58" cy="50" r="4" fill="url(#gld)"/><circle cx="58" cy="50" r="7" fill="none" stroke="url(#gld)" strokeWidth=".8" opacity=".2"/></svg></div>{full&&<div style={{lineHeight:1.1}}><div style={{fontSize:sz*0.45,fontWeight:800,color:T.gold,letterSpacing:2,textShadow:"0 2px 12px rgba(212,163,40,0.15)"}}>COURINVEST</div><div style={{fontSize:sz*0.16,fontWeight:500,color:T.t3,letterSpacing:4,marginTop:3}}>CONSULTORIA EM INVESTIMENTOS</div></div>}</div>;}

const inpS={padding:"11px 14px",background:"rgba(255,255,255,0.025)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:12,color:T.t1,fontSize:14,outline:"none",width:"100%",boxSizing:"border-box",fontFamily:"'Outfit'",transition:"all 0.2s"};

/* DASHBOARD */
function Dash({data:d}){
  const[dt,sDt]=useState("geral");
  const[showAum,sShowAum]=useState(false);
  const[showCaixa,sShowCaixa]=useState(false);
  const cl=d.cl;
  const milhasEstimado=cl.filter(function(c){return c.sv.includes("milhas")}).length*8870;
  const aum=cl.reduce((a,c)=>{
    var p=c.patGorila||c.pat||0;
    if(p===0&&c._ativosImport&&c._ativosImport.length>0){
      p=c._ativosImport.reduce(function(s,at){return s+(at.posR||at.qtd*at.pa||0)},0);
    }
    return a+p;
  },0)+milhasEstimado;

  /* Normalize institution name */
  var normI=function(n){if(!n)return"Sem instituição";if(n.match(/xp\b|xp investimentos/i))return"Rico";if(n.match(/rico/i))return"Rico";if(n.match(/sproutfi/i))return"Vest";if(n.match(/j\.\s*safra/i))return"Safra";return n};
  /* AUM by institution - aggregate from all clients */
  const aumByInst={};
  const aumByCliente={};
  const caixaByCliente={};
  let totalCaixa=0;
  cl.forEach(function(c){
    var ativos=c._ativosImport||[];
    var patCli=0;
    var caixaCli=0;
    ativos.forEach(function(a){
      var v=+(a.posR)||+(a.qtd)*+(a.pa)||0;
      if(v<=0)return;
      var inst=normI(a.inst);
      if(!aumByInst[inst])aumByInst[inst]=0;
      aumByInst[inst]+=v;
      patCli+=v;
      if(a.tp==="caixa")caixaCli+=v;
    });
    if(patCli===0)patCli=c.pat||0;
    if(patCli>0){
      aumByCliente[c.nome]={total:patCli,ativos:ativos.length};
    }
    if(caixaCli>0){
      caixaByCliente[c.nome]={total:caixaCli,pct:patCli>0?caixaCli/patCli*100:0};
      totalCaixa+=caixaCli;
    }
  });
  const instColors={"Genial":"#D4A328","BTG Pactual":"#38BDF8","XP":"#A78BFA","Inter":"#F59E0B","Itaú":"#2DD4A0","Bradesco":"#EF6461","Nubank":"#A78BFA","Rico":"#F59E0B","Clear":"#38BDF8","Avenue":"#6EE7B7","Vest":"#34D399","Safra":"#FBBF24"};

  const clPat=cl.filter(c=>c.sv.includes("patrimonio"));
  const clFin=cl.filter(c=>c.sv.includes("planejamento"));
  const clMiles=cl.filter(c=>c.sv.includes("milhas"));
  const getPatReal=function(c){return c.patGorila||c.pat||0};
  const mrrPat=clPat.reduce((a,c)=>a+getPatReal(c)*(c.txGestao||0)/100/12,0);
  const mrrFin=clFin.reduce((a,c)=>a+(c.feeFixo||0),0);
  const mrrMiles=clMiles.length*99;
  const mrr=mrrPat+mrrFin+mrrMiles;
  const arr=mrr*12;
  const ticket=cl.length>0?(mrr/cl.length):0;
  const taxaMediaGestao=clPat.length>0?(clPat.reduce((a,c)=>a+(c.txGestao||0),0)/clPat.length):0;
  /* Rendimento Médio: usa "Último Mês" do Gorila quando disponível */
  const clComRent=cl.filter(function(c){return c._gorilaRent&&c._gorilaRent.periods});
  const rentUltMes=clComRent.map(function(c){
    var p=c._gorilaRent.periods.find(function(x){return String(x.p).toLowerCase().indexOf("último mês")>=0||String(x.p).toLowerCase().indexOf("ultimo mes")>=0});
    return p?p.rent*100:0;
  });
  const ar=rentUltMes.length>0?(rentUltMes.reduce(function(a,b){return a+b},0)/rentUltMes.length).toFixed(2):null;

  /* Retenção (12m): clientes ativos / (ativos + encerrados nos últimos 12m) */
  const hoje=new Date();
  const umAnoAtras=new Date(hoje.getTime()-365*24*60*60*1000);
  const clAtivos=cl.filter(function(c){return(c.status||"ativo")==="ativo"});
  const clEncerrados12m=cl.filter(function(c){
    if(c.status!=="encerrado")return false;
    if(!c.dtStatusChange)return true;/* se não tem data, conta */
    var d=new Date(c.dtStatusChange);
    return d>=umAnoAtras;
  });
  const denomRet=clAtivos.length+clEncerrados12m.length;
  const retencao=denomRet>0?(clAtivos.length/denomRet*100):null;

  /* Captação Líquida (12m): soma do patrimônio dos captados nos últimos 12m, menos patrimônio dos encerrados 12m */
  const clCaptados12m=cl.filter(function(c){
    if(!c.dtCaptacao)return false;
    var d=new Date(c.dtCaptacao);
    return d>=umAnoAtras;
  });
  const captadoBruto=clCaptados12m.reduce(function(a,c){return a+getPatReal(c)},0);
  const perdidoBruto=clEncerrados12m.reduce(function(a,c){return a+getPatReal(c)},0);
  const captacaoLiquida=captadoBruto-perdidoBruto;
  const temDadosCaptacao=clCaptados12m.length>0||clEncerrados12m.length>0;

  const tTG=tG.reduce((a,t)=>a+t.vl,0);

  return (
    <div>
      <div style={{display:"flex",gap:5,marginBottom:18,flexWrap:"wrap"}}>{[{id:"geral",l:"Visão Geral"},{id:"negocio",l:"Métricas do Negócio"},{id:"clientes",l:"Base de Clientes"},{id:"fat",l:"Faturamento"},{id:"taxa",l:"Taxas Gestão"}].map(t=><button key={t.id} onClick={()=>sDt(t.id)} style={{padding:"8px 16px",borderRadius:12,fontSize:11,fontWeight:600,cursor:"pointer",border:dt===t.id?"1.5px solid "+T.gold:"1px solid "+T.bdrL,background:dt===t.id?T.goldD:"transparent",color:dt===t.id?T.gold:T.t3}}>{t.l}</button>)}</div>

      {dt==="geral" && (
        <div>
          {/* KPIs Primários */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:16}}>
            {/* AUM - clickable */}
            <Cd style={{padding:"18px 20px",cursor:"pointer"}} hov={true} glow onClick={function(){sShowAum(!showAum)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div><div style={{fontSize:9,color:T.t3,fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>AUM (PATRIMÔNIO SOB GESTÃO) <span style={{fontSize:8,color:T.gold}}>▼</span></div><div style={{fontSize:22,fontWeight:800,letterSpacing:-.5}}>{fm(aum)}</div></div>
                <div style={{fontSize:24,opacity:.5}}>💎</div>
              </div>
              <Spark data={[9.5,10.2,10.8,11.2,11.8,12.2]} color={T.gold} w={160} h={30}/>
            </Cd>
            {/* Caixa - clickable */}
            <Cd style={{padding:"18px 20px",cursor:"pointer"}} hov={true} onClick={function(){sShowCaixa(!showCaixa)}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div>
                  <div style={{fontSize:9,color:T.t3,fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>💵 CAIXA (DINHEIRO PARADO) <span style={{fontSize:8,color:T.orange}}>▼</span></div>
                  <div style={{fontSize:22,fontWeight:800,letterSpacing:-.5,color:totalCaixa>0?T.orange:T.t2}}>{fm(totalCaixa)}</div>
                  {totalCaixa>0&&aum>0 && <div style={{fontSize:9,color:T.t3,marginTop:2}}>{(totalCaixa/aum*100).toFixed(1)}% do AUM • {Object.keys(caixaByCliente).length} cliente{Object.keys(caixaByCliente).length>1?"s":""}</div>}
                </div>
                <div style={{fontSize:24,opacity:.5}}>💵</div>
              </div>
              <Spark data={totalCaixa>0?[totalCaixa*0.6,totalCaixa*0.7,totalCaixa*0.8,totalCaixa*0.9,totalCaixa*0.95,totalCaixa]:[1,1,1,1,1,1]} color={T.orange} w={160} h={30}/>
            </Cd>
            {[
              {l:"Receita Recorrente (MRR)",v:fm(mrr),ic:"💰",sc:T.green,spark:[28,30,32,33,35,mrr/1000]},
              {l:"Receita Anual (ARR)",v:fm(arr),ic:"📈",sc:T.cyan,spark:[340,360,380,400,420,arr/1000]},
              {l:"Clientes Ativos",v:String(cl.length),ic:"👥",sc:T.purple,spark:[5,6,6,7,8,cl.length]},
            ].map((k,i)=>(
              <Cd key={i} style={{padding:"18px 20px"}} hov={false}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div><div style={{fontSize:9,color:T.t3,fontWeight:600,letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{k.l}</div><div style={{fontSize:22,fontWeight:800,letterSpacing:-.5}}>{k.v}</div></div>
                  <div style={{fontSize:24,opacity:.5}}>{k.ic}</div>
                </div>
                <Spark data={k.spark} color={k.sc} w={160} h={30}/>
              </Cd>
            ))}
          </div>

          {/* AUM Drill-down by Institution */}
          {showAum && (
            <Cd style={{padding:22,marginBottom:16}} hov={false} glow>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                <h4 style={{margin:0,fontSize:15,fontWeight:700,color:T.gold}}>Patrimônio sob Gestão — Evolução & Distribuição</h4>
                <button onClick={function(){sShowAum(false)}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,color:T.t3,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕</button>
              </div>

              {/* AUM Evolution Chart */}
              {(function(){
                var aumHist=[
                  {m:"Jul/25",v:aum*0.62,cap:85000},{m:"Ago/25",v:aum*0.65,cap:120000},
                  {m:"Set/25",v:aum*0.70,cap:95000},{m:"Out/25",v:aum*0.74,cap:150000},
                  {m:"Nov/25",v:aum*0.78,cap:110000},{m:"Dez/25",v:aum*0.82,cap:180000},
                  {m:"Jan/26",v:aum*0.85,cap:130000},{m:"Fev/26",v:aum*0.89,cap:160000},
                  {m:"Mar/26",v:aum*0.94,cap:200000},{m:"Abr/26",v:aum,cap:320000},
                ];
                var mxAum=Math.max.apply(null,aumHist.map(function(h){return h.v}));
                var mxCap=Math.max.apply(null,aumHist.map(function(h){return h.cap}));
                var totalCap=aumHist.reduce(function(a,h){return a+h.cap},0);
                return (
                  <div style={{marginBottom:20}}>
                    {/* AUM Evolution */}
                    <div style={{fontSize:12,fontWeight:700,color:T.t2,marginBottom:10}}>📈 Evolução do AUM</div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:140,marginBottom:6,padding:"0 2px"}}>
                      {aumHist.map(function(h,i){
                        var barH=Math.max(10,(h.v/mxAum)*120);
                        var evolPct=i>0?((h.v/aumHist[i-1].v-1)*100):0;
                        return (
                          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                            {i>0 && <div style={{fontSize:8,fontWeight:700,color:evolPct>=0?T.green:T.red,marginBottom:2}}>{evolPct>=0?"+":""}{evolPct.toFixed(1)}%</div>}
                            {i===0 && <div style={{height:16}}/>}
                            <div style={{fontSize:8,fontWeight:700,color:T.gold,fontFamily:"'JetBrains Mono'",marginBottom:3}}>{(h.v/1000).toFixed(0)}k</div>
                            <div style={{width:"100%",maxWidth:40,height:barH,background:"linear-gradient(180deg,"+T.gold+",rgba(212,163,40,0.3))",borderRadius:"5px 5px 2px 2px",opacity:.7}}/>
                            <div style={{fontSize:8,color:T.t3,marginTop:4}}>{h.m}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"flex",justifyContent:"center",gap:16,fontSize:10,marginBottom:16}}>
                      <span style={{color:T.t3}}>Crescimento: <strong style={{color:T.green}}>+{((aum/(aum*0.62)-1)*100).toFixed(0)}%</strong> em 10 meses</span>
                    </div>

                    {/* Captação Líquida Evolution */}
                    <div style={{fontSize:12,fontWeight:700,color:T.t2,marginBottom:10}}>💰 Captação Líquida por Mês</div>
                    <div style={{display:"flex",alignItems:"flex-end",gap:4,height:100,marginBottom:6,padding:"0 2px"}}>
                      {aumHist.map(function(h,i){
                        var barH=Math.max(6,(h.cap/mxCap)*80);
                        return (
                          <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                            <div style={{fontSize:8,fontWeight:700,color:T.green,fontFamily:"'JetBrains Mono'",marginBottom:3}}>{(h.cap/1000).toFixed(0)}k</div>
                            <div style={{width:"100%",maxWidth:40,height:barH,background:"linear-gradient(180deg,"+T.green+",rgba(45,212,160,0.2))",borderRadius:"5px 5px 2px 2px",opacity:.6}}/>
                            <div style={{fontSize:8,color:T.t3,marginTop:4}}>{h.m}</div>
                          </div>
                        );
                      })}
                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:8,marginTop:10,padding:10,background:"rgba(255,255,255,0.015)",borderRadius:10}}>
                      <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.t3,fontWeight:600}}>CAPTAÇÃO TOTAL</div><div style={{fontSize:14,fontWeight:800,color:T.green,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{fm(totalCap)}</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.t3,fontWeight:600}}>MÉDIA/MÊS</div><div style={{fontSize:14,fontWeight:800,color:T.gold,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{fm(totalCap/aumHist.length)}</div></div>
                      <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.t3,fontWeight:600}}>MELHOR MÊS</div><div style={{fontSize:12,fontWeight:700,color:T.green,marginTop:2}}>{aumHist.reduce(function(b,h){return h.cap>b.cap?h:b},aumHist[0]).m}</div><div style={{fontSize:10,color:T.green,fontFamily:"'JetBrains Mono'"}}>{fm(mxCap)}</div></div>
                    </div>
                  </div>
                );
              })()}

              {/* Distribuição por Instituição */}
              <div style={{borderTop:"1px solid rgba(255,255,255,0.04)",paddingTop:18,marginTop:4}}>
                <div style={{fontSize:12,fontWeight:700,color:T.t2,marginBottom:14}}>🏦 Distribuição por Instituição</div>
              {Object.keys(aumByInst).length===0 ? (
                <div style={{padding:20,textAlign:"center",color:T.t3}}>Importe carteiras dos clientes via Gorila para ver a distribuição</div>
              ) : (
                <div style={{display:"flex",gap:24,alignItems:"center",flexWrap:"wrap"}}>
                  <Donut items={Object.entries(aumByInst).sort(function(a,b){return b[1]-a[1]}).map(function(e){return{v:e[1],c:instColors[e[0]]||T.t2}})} sz={180}/>
                  <div style={{flex:1,minWidth:200}}>
                    {Object.entries(aumByInst).sort(function(a,b){return b[1]-a[1]}).map(function(e,i){
                      var inst=e[0],val=e[1];
                      var pct=aum>0?(val/aum*100):0;
                      return (
                        <div key={i} style={{marginBottom:12}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <div style={{width:10,height:10,borderRadius:4,background:instColors[inst]||T.t2}}/>
                              <span style={{fontSize:13,fontWeight:600}}>{inst}</span>
                            </div>
                            <div style={{display:"flex",alignItems:"center",gap:8}}>
                              <span style={{fontSize:13,fontWeight:800,color:instColors[inst]||T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(val)}</span>
                              <span style={{fontSize:11,fontWeight:700,color:T.t2,background:"rgba(255,255,255,0.03)",padding:"2px 8px",borderRadius:6}}>{pct.toFixed(1)}%</span>
                            </div>
                          </div>
                          <div style={{height:5,background:"rgba(255,255,255,0.03)",borderRadius:3,overflow:"hidden"}}>
                            <div style={{height:"100%",width:pct+"%",background:instColors[inst]||T.t2,borderRadius:3,opacity:.7}}/>
                          </div>
                        </div>
                      );
                    })}
                    <div style={{marginTop:14,paddingTop:12,borderTop:"1.5px solid rgba(212,163,40,0.1)",display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:12,fontWeight:700,color:T.t2}}>TOTAL</span>
                      <span style={{fontSize:16,fontWeight:800,color:T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(aum)}</span>
                    </div>
                  </div>
                </div>
              )}
              </div>

              {/* AUM by Client */}
              {Object.keys(aumByCliente).length>0 && (
                <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid rgba(255,255,255,0.04)"}}>
                  <div style={{fontSize:12,fontWeight:700,color:T.t2,marginBottom:10}}>👥 Patrimônio por Cliente</div>
                  {Object.entries(aumByCliente).sort(function(a,b){return b[1].total-a[1].total}).map(function(e,i){
                    var nome=e[0],dd=e[1];var pct=aum>0?(dd.total/aum*100):0;
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>

                        <Av name={nome} sz={28}/>
                        <span style={{flex:1,fontSize:12,fontWeight:600}}>{nome}</span>
                        <span style={{fontSize:10,color:T.t3}}>{pct.toFixed(1)}%</span>
                        <span style={{fontSize:13,fontWeight:700,color:T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(dd.total)}</span>
                      </div>
                    );
                  })}
                </div>
              )}
            </Cd>
          )}

          {/* Caixa Drill-down */}
          {showCaixa && (
            <Cd style={{padding:22,marginBottom:16,border:"1px solid "+T.orange+"22"}} hov={false}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                <h4 style={{margin:0,fontSize:15,fontWeight:700,color:T.orange}}>💵 Caixa por Cliente — Dinheiro Parado em Conta Corrente</h4>
                <button onClick={function(){sShowCaixa(false)}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,color:T.t3,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕</button>

/* CLIENTS LIST */
function CL({data:d,onSel:os,dispatch:dp}){
  const[se,sSe]=useState("");const[fi,sFi]=useState("todos");const[showAdd,sShowAdd]=useState(false);
  const gorilaRef=React.useRef(null);
  const bulkRef=React.useRef(null);
  const[gMsg,sGMsg]=useState("");
  const[bulkProgress,sBulkProgress]=useState(null);

  /* Bulk import multiple Gorila files */
  var importGorilaBulk=function(files){
    if(!files||files.length===0)return;
    var arr=Array.from(files);
    var total=arr.length;
    var results={ok:[],fail:[]};
    sBulkProgress({current:0,total:total,nome:"",results:results});

    var processNext=function(idx){
      if(idx>=arr.length){
        /* All done */
        sBulkProgress({current:total,total:total,nome:"",results:results,done:true});
        sGMsg("✅ Importação em massa concluída! "+results.ok.length+" sucessos, "+results.fail.length+" falhas");
        setTimeout(function(){sGMsg("");sBulkProgress(null)},6000);
        return;
      }
      var file=arr[idx];
      sBulkProgress({current:idx+1,total:total,nome:file.name,results:results});
      
      /* Re-use single import logic by calling importGorilaCliente with a callback-like pattern */
      var done=function(success,name,patVal){
        if(success){results.ok.push({nome:name||file.name,pat:patVal||0})}
        else{results.fail.push({nome:file.name,err:name||"erro desconhecido"})}
        setTimeout(function(){processNext(idx+1)},200);
      };
      
      processGorilaFile(file,done);
    };
    processNext(0);
  };

  /* Process single file with callback - extracted from importGorilaCliente */
  var processGorilaFile=function(file,callback){
    if(!file){callback(false,"arquivo inválido");return}
    var isPdf=file.name.match(/\.pdf$/i);
    
    if(isPdf){
      var reader=new FileReader();
      reader.onload=function(e){
        var data=new Uint8Array(e.target.result);
        if(typeof pdfjsLib==="undefined"){callback(false,"PDF.js não carregado");return}
        pdfjsLib.getDocument({data:data}).promise.then(function(pdf){
          var promises=[];
          for(var p=1;p<=pdf.numPages;p++){
            promises.push(pdf.getPage(p).then(function(page){
              return page.getTextContent().then(function(tc){
                return tc.items.map(function(it){return it.str}).join("\n");
              });
            }));
          }
          Promise.all(promises).then(function(pages){
            var allText=pages.join("\n");
            var lines=allText.split("\n").map(function(l){return l.trim()}).filter(function(l){return l});
            var nomeCliente="";
            for(var i=0;i<lines.length;i++){
              if(lines[i].indexOf("Cliente:")>=0){
                nomeCliente=lines[i].replace("Cliente:","").trim();
                if(!nomeCliente&&lines[i+1])nomeCliente=lines[i+1].trim();
                break;
              }
            }
            if(!nomeCliente){callback(false,"nome não encontrado no PDF");return}
            var patBruto=0;
            for(var i=0;i<Math.min(lines.length,50);i++){
              if(lines[i].match(/^Patrim/i)&&!lines[i].match(/por|acumulad|evol/i)){
                for(var j=i;j<Math.min(i+3,lines.length);j++){
                  var rm=lines[j].match(/R\$\s*([\d.,]+)/);
                  if(rm){patBruto=parseFloat(rm[1].replace(/\./g,"").replace(",","."))||0;if(patBruto>1000)break}
                }
                if(patBruto>1000)break;
              }
            }
            var instData={};var inCustodiante=false;
            for(var i=0;i<lines.length;i++){
              if(lines[i].match(/custodiante/i))inCustodiante=true;
              if(inCustodiante&&lines[i]==="Total"&&lines[i+1]&&lines[i+1].match(/R\$/))break;
              if(inCustodiante&&lines[i].match(/R\$/)&&i>0){
                var instName=lines[i-1];
                if(instName&&!instName.match(/R\$|%|Total|Corretora|carteira|Rent/)){
                  var valM=lines[i].match(/R\$\s*([\d.,]+)/);
                  if(valM){
                    var val=parseFloat(valM[1].replace(/\./g,"").replace(",","."))||0;
                    if(val>100){
                      var sn=instName;
                      if(sn.match(/xp investimentos/i))sn="Rico";
                      else if(sn.match(/banco safra|j\.\s*safra/i))sn="Safra";
                      else if(sn.match(/sproutfi/i))sn="Vest";
                      else if(sn.match(/rico/i))sn="Rico";
                      else if(sn.match(/toro/i))sn="Toro Investimentos";
                      else if(sn.match(/santander/i))sn="Banco Santander (Brasil)";
                      else if(sn.match(/outros/i))sn="Outros";
                      instData[sn]=val;
                    }
                  }
                }
              }
            }
            var ativos=[];
            Object.entries(instData).forEach(function(e){
              ativos.push({tk:"Portfolio "+e[0],nm:"Portfolio "+e[0],tp:"fundo_rf",qtd:1,pm:e[1],pa:e[1],inst:e[0],venc:"",posR:e[1]});
            });
            if(ativos.length===0&&patBruto>0){
              ativos.push({tk:"Portfolio Total",nm:"Portfolio Total",tp:"fundo_rf",qtd:1,pm:patBruto,pa:patBruto,inst:"Diversos",venc:"",posR:patBruto});
            }
            var existing=d.cl.find(function(c){return c.nome.toLowerCase()===nomeCliente.toLowerCase()});
            var newId=existing?existing.id:("c"+Date.now()+Math.random().toString(36).substr(2,5));

            var reitTks="O,NNN,STAG,AMT,PLD,SPG,PSA,DLR,CCI,EQIX,AVB,EQR,IRM,WPC,VICI,WELL,ARE,MPW,KIM,REG,FRT,BXP,SLG,HPP,PEAK,DOC,OHI,LTC,NHI,AGNC,NLY,STWD,BXMT,LADR,ABR,ARI,RWT,STORE,EPR,GTY,ADC,IIPR,SBRA,HR,VER,GOOD,LAND,GLPI";
            var etfTks="SPY,VOO,VTI,QQQ,IVV,VGT,VNQ,SCHH,RQI,VT,VXUS,VEA,VWO,BND,AGG,TLT,IEF,SHY,TFLO,BOXX,QLTA,VTWO,IWM,DIA,RSP,ARKK,XLK,XLF,XLE,XLV,XLI,XLP,XLY,XLU,XLC,XLRE,XLB,VIG,VYM,SCHD,HDV,DVY,JEPI,JEPQ,NOBL,GLD,IAU,SLV,USO,TIP,VTIP,IBIT,BITO,EMB,HYG,LQD,MUB,IGSB,VCSH,VCIT,VCLT,BSV,BIV,BLV,SGOV,SHV,MINT,FLOT,PFF,SPHD,SPLV,KBWY,VNQI";
            var tkUp=ativo.toUpperCase();
            var isReit=reitTks.split(",").indexOf(tkUp)>=0||cl.match(/reit/);
            var isEtf=etfTks.split(",").indexOf(tkUp)>=0||cl.match(/etf\b/);
            /* Mapeamento de classe — ordem importa */
            if(cl.match(/caixa/))tp="caixa";
            else if(cl.match(/moeda/)&&cl.match(/criptomoeda/))tp="cripto";
            else if(cl.match(/criptomoeda|cripto/))tp="cripto";
            else if(cl.match(/moeda/))tp="caixa"; /* Moedas estrangeiras físicas tratadas como caixa */
            else if(cl.match(/exterior/)&&isReit)tp="reit";
            else if(cl.match(/exterior/)&&isEtf)tp="etf_int";
            else if(cl.match(/exterior/))tp="stock_us";
            else if(cl.match(/cdb/))tp="cdb";
            else if(cl.match(/lci/))tp="lci";else if(cl.match(/lca/))tp="lca";
            else if(cl.match(/cri(?!pto)/))tp="cri";else if(cl.match(/cra(?!ft)/))tp="cra";
            else if(cl.match(/ntn-b|ntnb/)||ativo.match(/NTNB/i))tp="tesouro";
            else if(cl.match(/lft|ltn|tesouro/)||ativo.match(/^(LFT|LTN|NTN)/i))tp="tesouro";
            else if(cl.match(/prefixado/)&&cl.match(/renda fixa/))tp="tesouro";
            else if(cl.match(/indexado a juros/)&&cl.match(/renda fixa/))tp="cdb";
            else if(cl.match(/indexado a inflação|indexado a inflacao/)&&cl.match(/renda fixa/))tp="cdb";
            else if(cl.match(/debenture|debênture/))tp=cl.match(/incent/)?"debi":"deb";
            else if(cl.match(/infra.*fund|fi-infra|fund.*infra/))tp="fundo_infra";
            else if(cl.match(/multimercado|multi/))tp="fundo_mm";
            else if(cl.match(/(fundos|fundo).*(renda fixa|rf)|rf.*cred|top crédito|top credito/))tp="fundo_rf";
            else if(cl.match(/fundos\b/)&&cl.match(/renda fixa/))tp="fundo_rf";
            else if(cl.match(/fii[s]?\b|fiagro|imobiliário|imobiliario|fundo.*imob/))tp="fii";
            else if(cl.match(/etf/))tp=cl.match(/exterior/)?"etf_int":"etf_br";
            else if(tkUp.match(/11$/)&&!cl.match(/exterior/))tp="fii";

            var vD="";if(venc.match(/^\d{2}\/\d{2}\/\d{4}$/)){var vp=venc.split("/");vD=vp[2]+"-"+vp[1]+"-"+vp[0]}else if(venc instanceof Date){vD=venc.toISOString().split("T")[0]}else{vD=venc}
            var tk=ativo.length>20?ativo.split(/\s+/).slice(0,3).join(" "):ativo;
            if(tk.length>25)tk=ativo.split(/\s+/).slice(0,2).join(" ");
            var inst=corr;if(inst.match(/genial/i))inst="Genial";else if(inst.match(/btg/i))inst="BTG Pactual";else if(inst.match(/sproutfi/i))inst="Vest";else if(inst.match(/avenue/i))inst="Avenue";else if(inst.match(/xp\b/i))inst="Rico";else if(inst.match(/inter\b/i))inst="Inter";else if(inst.match(/c6/i))inst="C6";else if(inst.match(/wise/i))inst="Wise";else if(inst.match(/okx/i))inst="OKX";else if(inst.match(/99pay/i))inst="99Pay";
            ativos.push({tk:tk,nm:ativo,tp:tp,qtd:qtd,pm:pm,pa:preco,inst:inst,venc:vD,posR:pos,_gClasse:classe,_gSubCl:subcl,_gRentPct:rentAtivo,_gRentRs:rentAtivoRs,_gEventos:eventos,_gEventosTot:totalEventos});
          }
        }

        /* Check if client already exists */
        var existing=d.cl.find(function(c){return c.nome.toLowerCase()===nomeCliente.toLowerCase()});

        /* Create client (new or replacing old) */
        var newId=existing?existing.id:("c"+Date.now());
        var sumPosR=ativos.reduce(function(a,at){return a+parseFloat(at.posR||0)},0);
        var patReal=sumPosR>0?sumPosR:(patBruto>0?patBruto:ativos.reduce(function(a,at){return a+parseFloat(at.qtd||0)*parseFloat(at.pa||0)},0));
        var newC={
          id:newId,nome:nomeCliente,email:existing?existing.email:"",tel:existing?existing.tel:"",risco:existing?existing.risco:"Moderado",
          sv:existing?existing.sv:["patrimonio"],pat:patReal,patGorila:patReal,
          rend:0,notas:existing?existing.notas:("Importado do Gorila em "+new Date().toLocaleDateString("pt-BR")),
          txGestao:existing?existing.txGestao:0.80,feeFixo:existing?existing.feeFixo:0,feeBase:existing?existing.feeBase:"",
          _ativosImport:ativos,
          _ativosTs:Date.now(),
          _gorilaRent:gorilaRent,
          /* Preserve dtCaptacao and status on re-import */
          dtCaptacao:existing&&existing.dtCaptacao?existing.dtCaptacao:(dataFim||new Date().toISOString().split("T")[0]),
          status:existing&&existing.status?existing.status:"ativo"
        };
        dp({t:"RC",p:newC});
        var msg="✅ "+nomeCliente+(existing?" atualizado":" criado")+" • "+ativos.length+" ativos • "+fm(patReal);
        if(gorilaRent){msg+=" • Rentabilidade importada"}
        sGMsg(msg);
        setTimeout(function(){sGMsg("");os(newC)},2500);
      }catch(err){sGMsg("⚠ Erro: "+err.message);console.error(err)}
    };
    reader.readAsArrayBuffer(file);
  };

  const fl=d.cl.filter(c=>(fi==="todos"||c.sv.includes(fi))&&c.nome.toLowerCase().includes(se.toLowerCase()));
  return (
    <div>
      <div style={{display:"flex",gap:8,marginBottom:18,flexWrap:"wrap",alignItems:"center"}}>
        <input value={se} onChange={e=>sSe(e.target.value)} placeholder="Buscar cliente..." style={{...inpS,flex:1,minWidth:180,borderRadius:14}}/>
        {["todos","patrimonio","planejamento","milhas"].map(f=><button key={f} onClick={()=>sFi(f)} style={{padding:"10px 16px",borderRadius:12,fontSize:12,fontWeight:600,cursor:"pointer",border:fi===f?"1.5px solid "+T.gold:"1px solid "+T.bdrL,background:fi===f?T.goldD:"transparent",color:fi===f?T.gold:T.t3}}>{f==="todos"?"Todos":SL[f]}</button>)}
        <Bt onClick={()=>sShowAdd(true)} style={{fontSize:12,padding:"10px 18px"}}>＋ Novo</Bt>
        <input ref={gorilaRef} type="file" accept=".xlsx,.xls,.csv,.pdf" onChange={function(e){if(e.target.files[0])importGorilaCliente(e.target.files[0]);e.target.value=""}} style={{display:"none"}}/>
        <Bt v="secondary" onClick={function(){gorilaRef.current&&gorilaRef.current.click()}} style={{fontSize:11,padding:"10px 14px"}}>📥 Importar Gorila</Bt>
        <input ref={bulkRef} type="file" accept=".xlsx,.xls,.csv,.pdf" multiple onChange={function(e){if(e.target.files.length>0)importGorilaBulk(e.target.files);e.target.value=""}} style={{display:"none"}}/>
        <Bt v="secondary" onClick={function(){bulkRef.current&&bulkRef.current.click()}} style={{fontSize:11,padding:"10px 14px",background:"rgba(167,139,250,0.08)",color:T.purple,border:"1px solid rgba(167,139,250,0.2)"}}>📦 Importar em Massa</Bt>
      </div>

      {/* Bulk import progress */}
      {bulkProgress && (

          </div>

          /* Use realizado if available, otherwise orçado */
          var valor=val>0?val:orc;
          if(valor===0) return;

          if(isReceita){
            newRec.push({id:Date.now()+i,cat:cat,valor:Math.abs(valor)});
          }else{
            newDesp.push({id:Date.now()+i+1000,cat:cat,valor:Math.abs(valor),cor:despCores[newDesp.length%despCores.length]});
          }
        });

        /* Apply imported data */
        if(newRec.length>0) sReceitas(newRec);
        if(newDesp.length>0) sDespesas(newDesp);

        /* If nothing was classified as receita, try fallback: positive = receita, all = despesa */
        if(newRec.length===0 && newDesp.length===0){
          rows.forEach(function(r,i){
            var cat=String(r[catKey]||"Item").trim();

            if(val>0){

            }
          });
          if(newDesp.length>0) sDespesas(newDesp);
        }

    };

                          <div style={{display:"flex",alignItems:"center",gap:6}}><div style={{width:8,height:8,borderRadius:3,background:d.c}}/><span style={{fontSize:12,fontWeight:600}}>{tipo}</span></div>

                    conta:document.getElementById("ap-conta").value||"Genial",

            </div>

      {/* ADD ASSET MODAL */}
      <Mo open={showAddAt} onClose={function(){sShowAddAt(false);sAtSearch("")}} title="＋ Adicionar Ativo" wide>

        <div style={{display:"flex",gap:4,marginBottom:12,flexWrap:"wrap"}}>
          {["Todos","Tesouro","RF Privada","Fundo","Ação","FII","FIAGRO","Previdência","ETF BR","BDR","Stock US","ETF EUA","REIT","Cripto","Outros"].map(function(cat){return (
            <button key={cat} onClick={function(){sAtSearch(cat==="Todos"?"":cat)}} style={{padding:"5px 12px",borderRadius:8,fontSize:10,fontWeight:600,cursor:"pointer",border:atSearch===cat||(!atSearch&&cat==="Todos")?"1.5px solid "+T.gold:"1px solid "+T.bdrL,background:atSearch===cat||(!atSearch&&cat==="Todos")?T.goldD:"transparent",color:atSearch===cat||(!atSearch&&cat==="Todos")?T.gold:T.t3}}>{cat}</button>

      {/* SUCESSÓRIO */}
      {tab==="suc" && isPat && (

            {[{l:"PATRIMÔNIO",v:fm(c.pat||0),c:T.gold},{l:"ITCMD (4%)",v:fm(itcmd),c:T.red},{l:"CUSTO INVENTÁRIO (~10%)",v:fm(custoInv),c:T.orange},{l:"LÍQUIDO HERDEIROS",v:fm(patLiq),c:T.green}].map(function(k,i){return (

              </Cd>

          <Cd style={{padding:14,marginBottom:14}} hov={false}>

            {!holding && (c.pat||0)>=2000000 && <div style={{padding:8,background:T.purpleD,borderRadius:8,marginBottom:6,fontSize:11,color:T.purple,fontWeight:600}}>🏢 Patrimônio acima de R$2M — holding familiar recomendada</div>}

                      </div>
                      <div style={{fontSize:10,color:T.t2,marginTop:2}}>{fm(patLiq*h.pct/100)}</div>
                    </div>
                    <button onClick={function(){sHerdeiros(function(p){return p.filter(function(x){return x.id!==h.id})})}} style={{background:"none",border:"none",color:T.t3,cursor:"pointer"}}>✕</button>
                  </div>
                )})}

                    <div style={{flex:1}}>

                        <span style={{color:T.t3}}>—</span>
                        <input value={s.seg} onChange={function(e){sSeguros(function(p){return p.map(function(x){return x.id===s.id?Object.assign({},x,{seg:e.target.value}):x})})}} placeholder="Seguradora" style={{background:"transparent",border:"none",color:T.t2,fontSize:13,outline:"none",padding:0,flex:1}}/>
                      </div>
                      <div style={{fontSize:10,color:T.t3,marginTop:2}}>Benef: {s.ben}</div>
                    </div>
                    <input type="number" value={s.cap} onChange={function(e){sSeguros(function(p){return p.map(function(x){return x.id===s.id?Object.assign({},x,{cap:Math.max(0,+e.target.value)}):x})})}} style={{width:100,padding:"6px 8px",background:T.w3,border:"1px solid "+T.bdrL,borderRadius:6,color:T.green,fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none",textAlign:"right"}}/>
                    <button onClick={function(){sSeguros(function(p){return p.filter(function(x){return x.id!==s.id})})}} style={{background:"none",border:"none",color:T.t3,cursor:"pointer"}}>✕</button>
                  </div>
                )})}
                <div style={{marginTop:8,padding:6,background:T.greenD,borderRadius:6,fontSize:10,color:T.green,textAlign:"center"}}>💡 Seguros de vida não entram no inventário</div>
              </Cd>
            </div>

            {/* Simulação + Testamento + Holding */}
            <div style={{flex:1,minWidth:220,display:"flex",flexDirection:"column",gap:12}}>

                <h4 style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:T.gold}}>📊 Simulação</h4>

                  <span style={{fontSize:12,fontWeight:600,color:testamento?T.green:T.t3}}>{testamento?"Possui testamento":"Sem testamento"}</span>
                </div>
              </Cd>
              <Cd style={{padding:16}} hov={false}>
                <h4 style={{margin:"0 0 10px",fontSize:13,fontWeight:700,color:T.gold}}>🏢 Holding Familiar</h4>
                <div style={{display:"flex",alignItems:"center",gap:8}}>

                  <span style={{fontSize:12,fontWeight:600,color:holding?T.green:T.t3}}>{holding?"Possui holding":"Sem holding"}</span>
                </div>
                {!holding && (c.pat||0)>=2000000 && <div style={{marginTop:8,padding:6,background:T.purpleD,borderRadius:6,fontSize:10,color:T.purple}}>🏢 Patrimônio acima de R$2M — considere criar holding</div>}

            </div>
          </div>
        </div>

      {tab==="plan" && isFin && (

          <div style={{display:"flex",gap:4,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>
            {[{id:"orc",l:"📊 Orçamento"},{id:"metas",l:"🎯 Metas"},{id:"fluxo",l:"📈 Fluxo de Caixa"}].map(t=>
              <button key={t.id} onClick={()=>sPTab(t.id)} style={{padding:"6px 14px",borderRadius:8,fontSize:11,fontWeight:600,cursor:"pointer",border:pTab===t.id?"1.5px solid "+T.gold:"1px solid "+T.bdrL,background:pTab===t.id?T.goldD:"transparent",color:pTab===t.id?T.gold:T.t3}}>{t.l}</button>

                <option value="semestre">📊 Último Semestre</option>
                <option value="ano">📊 Ano {new Date().getFullYear()}</option>

            </div>

          {(function(){
            var now=new Date();
            var MN=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            var m=now.getMonth(),y=now.getFullYear();
            var label="";
            if(periodo==="atual") label=MN[m]+" "+y;
            else if(periodo==="anterior"){m=m-1;if(m<0){m=11;y--};label=MN[m]+" "+y}
            else if(periodo==="2meses"){m=m-2;if(m<0){m+=12;y--};label=MN[m]+" "+y}
            else if(periodo==="trimestre") label="Últimos 3 meses";
            else if(periodo==="semestre") label="Últimos 6 meses";
            else label="Ano "+y;

              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                <button onClick={function(){
                  var opts=["atual","anterior","2meses","trimestre","semestre","ano"];

                  var opts=["atual","anterior","2meses","trimestre","semestre","ano"];

              <Cd key={i} style={{padding:"10px 14px",flex:1,minWidth:110}} hov={false}>

                <div style={{fontSize:16,fontWeight:800,color:k.c,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{k.v}</div>

                    <input type="number" value={r.valor} onChange={e=>sReceitas(p=>p.map(x=>x.id===r.id?{...x,valor:Math.max(0,+e.target.value)}:x))} style={{width:100,padding:"6px 8px",background:T.w3,border:"1px solid "+T.bdrL,borderRadius:6,color:T.green,fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none",textAlign:"right"}}/>

            </Cd>

        </div>

                if(!ct.venc)return false;
                var dias=Math.ceil((new Date(ct.venc)-new Date())/864e5);

                var dias=Math.ceil((new Date(ct.venc)-new Date())/864e5);

                  <div key={ct.id} style={{padding:8,background:dias<=30?T.redD:T.orangeD,borderRadius:8,marginBottom:4,fontSize:11,fontWeight:600,color:dias<=30?T.red:T.orange,display:"flex",justifyContent:"space-between"}}>
                    <span>{ct.nome}</span>
                    <span>{dias<=30?"⛔ Vence em "+dias+" dias":"⚠ Vence em "+dias+" dias"}</span>
                  </div>
                );
              })}
            </Cd>

                        <div><span style={{color:T.t3}}>Vencimento: </span>{ct.venc?fD(ct.venc):"Indeterminado"}</div>
                        <div><span style={{color:T.t3}}>Valor: </span><span style={{color:T.gold,fontWeight:600}}>{ct.valor}</span></div>

                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:4}}>
                      <button onClick={function(){
                        var novoStatus=ct.status==="ativo"?"inativo":"ativo";
                        sContratos(function(p){return p.map(function(x){return x.id===ct.id?Object.assign({},x,{status:novoStatus}):x})});
                      }} style={{padding:"5px 10px",borderRadius:6,border:"1px solid "+T.bdrL,background:T.w3,color:T.t2,fontSize:10,cursor:"pointer"}}>
                        {ct.status==="ativo"?"Inativar":"Ativar"}
                      </button>
                      <button onClick={function(){

                      </button>
                      <button onClick={function(){sContratos(function(p){return p.filter(function(x){return x.id!==ct.id})})}} style={{padding:"5px 10px",borderRadius:6,border:"none",background:"none",color:T.t3,fontSize:10,cursor:"pointer"}}>

                  </div>

                  {tp:"trimestral",l:"Relatório Trimestral",ic:"📈",desc:"Análise do trimestre"},
                  {tp:"irpf",l:"Guia IRPF",ic:"📋",desc:"Para declaração"},
                  {tp:"aporte",l:"Sugestão de Aporte",ic:"💰",desc:"Tabela de aportes"},
                  {tp:"planejamento",l:"Planejamento",ic:"🎯",desc:"Metas e orçamento"},

/* FINANCEIRO DA EMPRESA */
function FinanceiroView({data:d,dispatch:dp}){
  const[fTab,sFTab]=useState("importar");
  const fileRef=useRef(null);
  /* State vem do reducer global (persiste entre navegações) */
  const entradas=(d&&d.fin&&d.fin.entradas)||[];
  const despesas=(d&&d.fin&&d.fin.despesas)||[];
  const sEntradas=function(updater){
    /* API compatível: aceita array ou função */
    var next=typeof updater==="function"?updater(entradas):updater;
    if(next.length===0)dp({t:"FIN_CLEAR_ENTRADAS"});
    else if(next.length>entradas.length){
      /* Add diff */
      var added=next.slice(entradas.length);
      dp({t:"FIN_ADD_ENTRADAS",p:added});
    }else{
      /* Replace full: clear + add */
      dp({t:"FIN_CLEAR_ENTRADAS"});
      if(next.length>0)setTimeout(function(){dp({t:"FIN_ADD_ENTRADAS",p:next})},0);
    }
  };
  const sDespesas=function(updater){
    var next=typeof updater==="function"?updater(despesas):updater;
    /* Diff-based: add new, delete missing */
    var existingIds=despesas.map(function(x){return x.id});
    var nextIds=next.map(function(x){return x.id});
    next.forEach(function(nd){if(existingIds.indexOf(nd.id)<0)dp({t:"FIN_ADD_DESPESA",p:nd})});
    existingIds.forEach(function(id){if(nextIds.indexOf(id)<0)dp({t:"FIN_DEL_DESPESA",p:id})});
  };
  const[showAddDesp,sShowAddDesp]=useState(false);
  const[selMonth,sSelMonth]=useState(null);
  const[selYear,sSelYear]=useState("todos");

  /* Import spreadsheet */
  var importPlanilha=function(file){
    if(!file)return;
    var isExcel=file.name.match(/\.(xlsx|xls)$/i);
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var rows=[];var sheetUsed="";
        if(isExcel){
          var wb=XLSX.read(e.target.result,{type:"array",raw:false});
          var bestSheet="";var bestCount=0;
          wb.SheetNames.forEach(function(name){
            var ws=wb.Sheets[name];
            var r=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});
            if(r.length>bestCount){bestCount=r.length;bestSheet=name}
          });
          sheetUsed=bestSheet;
          var ws=wb.Sheets[bestSheet];
          rows=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});
        }else{
          var text=e.target.result;
          var lines=text.split(/\r?\n/).filter(function(l){return l.trim()});
          if(lines.length<2)return;
          var sep=lines[0].includes(";")?";":lines[0].includes("\t")?"\t":",";
          var headers=lines[0].split(sep).map(function(x){return x.replace(/"/g,"").trim()});
          rows=lines.slice(1).map(function(line){var vals=line.split(sep).map(function(v){return v.replace(/"/g,"").trim()});var obj={};headers.forEach(function(h,i){obj[h]=vals[i]||""});return obj});
        }
        if(rows.length===0){alert("Planilha vazia");return}
        var rawKeys=Object.keys(rows[0]);
        var findCol=function(patterns){
          return rawKeys.find(function(k){
            var kl=k.toLowerCase().trim();
            for(var i=0;i<patterns.length;i++){if(kl.indexOf(patterns[i])>=0)return true}
            return false;
          });
        };
        var colData=findCol(["data","date"]);
        var colServico=findCol(["servic","serviç"]);
        var colMeio=findCol(["meio","recebimento","pagamento"]);
        var colCliente=rawKeys.find(function(k){return k.trim().toLowerCase()==="cliente"}) || findCol(["cliente"]);
        var colValor=findCol(["valor","value"]);
        var colNF=findCol(["nf","nota"]);
        var colPct=findCol(["fat","percent","%"]);
        var parseVal=function(v){
          if(typeof v==="number")return v;
          var s=String(v||"0").trim().replace(/R\$\s*/g,"").replace(/\s/g,"");
          if(s.match(/,\d{3}\./)){s=s.replace(/,/g,"")}
          else if(s.match(/\.\d{3},/)){s=s.replace(/\./g,"").replace(",",".")}
          else if(s.match(/,\d{1,2}$/)){s=s.replace(",",".")}
          return parseFloat(s)||0;
        };
        var parseDate=function(v){
          if(!v)return"";var s=String(v).trim();
          if(s.match(/^\d{1,2}\/\d{1,2}\/\d{2}$/)){var p=s.split("/");var yr=+p[2];yr=yr<50?2000+yr:1900+yr;return yr+"-"+(p[0].length<2?"0"+p[0]:p[0])+"-"+(p[1].length<2?"0"+p[1]:p[1])}
          if(s.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)){var p=s.split("/");return p[2]+"-"+(p[1].length<2?"0"+p[1]:p[1])+"-"+(p[0].length<2?"0"+p[0]:p[0])}
          if(s.match(/^\d{4}-\d{2}-\d{2}/))return s.substring(0,10);
          var num=parseFloat(s);if(num>40000&&num<60000){var d=new Date((num-25569)*86400*1000);return d.toISOString().split("T")[0]}
          return s;
        };
        var parsed=rows.map(function(r,i){
          var val=parseVal(colValor?r[colValor]:0);
          if(val<=0)return null;
          var cli=String(colCliente?r[colCliente]:"").trim();
          if(!cli||cli.toLowerCase()==="total geral"||cli.toLowerCase()==="cliente")return null;
          return{id:Date.now()+i,data:parseDate(colData?r[colData]:""),servico:String(colServico?r[colServico]:"").trim(),meio:String(colMeio?r[colMeio]:"").trim(),cliente:cli,valor:val,nf:String(colNF?r[colNF]:"").trim(),pctFat:parseVal(colPct?r[colPct]:0)};
        }).filter(function(r){return r!==null});
        if(parsed.length===0){alert("Nenhuma entrada encontrada.\nAba: "+(sheetUsed||"CSV")+"\nColunas: "+rawKeys.join(", ")+"\nValor col: "+(colValor||"?"));return}
        sEntradas(function(prev){return prev.concat(parsed)});
        sFTab("resumo");
      }catch(err){alert("Erro: "+err.message);console.error(err)}
    };
    if(isExcel){reader.readAsArrayBuffer(file)}else{reader.readAsText(file,"UTF-8")}
  };


  /* Computed data from entradas */
  /* Extract available years */
  var anos=[];entradas.forEach(function(e){if(e.data){var yr=e.data.substring(0,4);if(anos.indexOf(yr)<0)anos.push(yr)}});

  /* Filter by selected year */
  var entradasFilt=selYear==="todos"?entradas:entradas.filter(function(e){return e.data&&e.data.substring(0,4)===selYear});
  var despesasFilt=selYear==="todos"?despesas:despesas.filter(function(d){return!d.data||d.data.substring(0,4)===selYear});

  var totalEntradas=entradasFilt.reduce(function(a,e){return a+e.valor},0);
  var totalDespesas=despesasFilt.reduce(function(a,d){return a+d.valor},0);
  var lucro=totalEntradas-totalDespesas;
  var margem=totalEntradas>0?((lucro/totalEntradas)*100):0;

  /* Group by month */
  var byMonth={};

    var m=e.data?e.data.substring(0,7):"sem-data";

    byMonth[m].entries.push(e);

    var meio=e.meio||"Outros";
    byMonth[m].meios[meio]=(byMonth[m].meios[meio]||0)+e.valor;
  });
  var mesesOrdenados=Object.keys(byMonth).sort();
  var mxRec=Math.max.apply(null,mesesOrdenados.map(function(m){return byMonth[m].rec}).concat([1]));

  /* Group by year for summary cards */
  var byYear={};
  entradas.forEach(function(e){if(e.data){var yr=e.data.substring(0,4);if(!byYear[yr])byYear[yr]={rec:0,count:0};byYear[yr].rec+=e.valor;byYear[yr].count++}});

  /* Group by servico */
  var byServico={};
  entradasFilt.forEach(function(e){var s=e.servico||"Outros";byServico[s]=(byServico[s]||0)+e.valor});
  var svcColors={"Gestão de Patrimônio":T.gold,"Gestão Financeira":T.cyan,"Couri Mile$":T.purple,"Consultoria Financeira":T.green,"Consultoria":T.green,"Parcerias":T.orange};

  /* Group by meio */
  var byMeio={};
  entradasFilt.forEach(function(e){var m=e.meio||"Outros";byMeio[m]=(byMeio[m]||0)+e.valor});
  var meioColors={Genial:T.gold,Vindi:T.green,Stripe:T.purple,PIX:T.cyan,Boleto:T.orange,Dinheiro:T.t2};

  /* Group by cliente */
  var byCliente={};
  entradasFilt.forEach(function(e){var c=e.cliente||"Desconhecido";if(!byCliente[c])byCliente[c]={total:0,count:0,servico:"",meio:"",meses:{}};byCliente[c].total+=e.valor;byCliente[c].count++;byCliente[c].servico=e.servico;byCliente[c].meio=e.meio;var mm=e.data?e.data.substring(0,7):"";if(mm){byCliente[c].meses[mm]=(byCliente[c].meses[mm]||0)+e.valor}});

  /* Despesas by category */
  var byDespCat={};
  despesas.forEach(function(d){var c=d.cat||"Outros";byDespCat[c]=(byDespCat[c]||0)+d.valor});
  var despCatColors={Aluguel:T.red,Software:T.cyan,Contabilidade:T.orange,Marketing:T.purple,Telefonia:T.green,Impostos:T.gold,Outros:T.t3};

  var fmtMonth=function(m){var p=m.split("-");return(["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][+p[1]]||p[1])+"/"+p[0].slice(2)};

  return (
    <div>
      <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>
        {[{id:"importar",l:"📥 Importar"},{id:"resumo",l:"📊 Resumo"},{id:"entradas",l:"💰 Entradas"},{id:"despesas",l:"💸 Despesas"},{id:"dre",l:"📋 DRE"},{id:"clientes",l:"👥 Por Cliente"}].map(function(t){return (
          <button key={t.id} onClick={function(){sFTab(t.id)}} style={{padding:"8px 16px",borderRadius:12,fontSize:11,fontWeight:600,cursor:"pointer",border:fTab===t.id?"1.5px solid "+T.gold:"1px solid rgba(255,255,255,0.04)",background:fTab===t.id?T.goldD:"transparent",color:fTab===t.id?T.gold:T.t3}}>{t.l}</button>
        )})}
      </div>

      {/* IMPORTAR */}
      {fTab==="importar" && (
        <div>
          <Cd style={{padding:30,textAlign:"center"}} hov={false}>
            <input ref={fileRef} type="file" accept=".csv,.txt,.tsv,.xlsx,.xls" multiple onChange={function(e){var files=e.target.files;for(var i=0;i<files.length;i++){importPlanilha(files[i])}e.target.value=""}} style={{display:"none"}}/>
            <div style={{fontSize:42,marginBottom:14,animation:"float 4s ease infinite"}}>📊</div>
            <div style={{fontSize:18,fontWeight:700,color:T.gold,marginBottom:6}}>Importar Planilhas de Entradas</div>
            <div style={{fontSize:13,color:T.t3,marginBottom:18,lineHeight:1.7}}>Selecione uma ou <strong style={{color:T.t2}}>várias planilhas de uma vez</strong>.<br/>Os dados são acumulados automaticamente.<br/><span style={{color:T.t2}}>Colunas: Data | Serviço | Meio de Recebimento | Cliente | Valor | NF | % Fat.</span></div>
            <Bt onClick={function(){fileRef.current&&fileRef.current.click()}} style={{fontSize:14,padding:"14px 32px"}}>📥 Selecionar Planilhas (CSV ou Excel)</Bt>
            {entradas.length>0 && <div style={{marginTop:16,padding:10,background:T.greenD,borderRadius:10,fontSize:12,color:T.green,fontWeight:600}}>✅ {entradas.length} entradas carregadas • Total: {fm(totalEntradas)}</div>}
          </Cd>
          {entradas.length>0 && (
            <Cd style={{padding:18,marginTop:14}} hov={false}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>

              </div>
              <div style={{overflowX:"auto",borderRadius:12,border:"1px solid rgba(255,255,255,0.04)"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:600}}>
                  <thead><tr style={{background:"rgba(255,255,255,0.02)"}}>
                    {["Data","Serviço","Meio","Cliente","Valor","NF","%"].map(function(h,i){return <th key={i} style={{padding:"8px 10px",textAlign:i>=4?"right":"left",fontWeight:700,color:T.gold,fontSize:9,borderBottom:"1px solid rgba(212,163,40,0.1)"}}>{h}</th>})}

                      <td style={{padding:"6px 10px",borderBottom:"1px solid rgba(255,255,255,0.02)",fontWeight:600}}>{e.cliente}</td>
                      <td style={{padding:"6px 10px",borderBottom:"1px solid rgba(255,255,255,0.02)",textAlign:"right",fontWeight:700,color:T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(e.valor)}</td>
                      <td style={{padding:"6px 10px",borderBottom:"1px solid rgba(255,255,255,0.02)",textAlign:"right",color:e.nf==="OK"?T.green:T.t3}}>{e.nf}</td>
                      <td style={{padding:"6px 10px",borderBottom:"1px solid rgba(255,255,255,0.02)",textAlign:"right",color:T.t3,fontFamily:"'JetBrains Mono'"}}>{e.pctFat?e.pctFat.toFixed(2)+"%":""}</td>
                    </tr>
                  )})}</tbody>
                </table>
              </div>
            </Cd>
          )}
        </div>
      )}

      {/* RESUMO */}
      {fTab==="resumo" && (
        <div>
          {entradas.length===0 ? <Cd style={{padding:30,textAlign:"center"}} hov={false}><div style={{fontSize:28,marginBottom:10}}>📊</div><div style={{fontSize:14,color:T.t3}}>Importe sua planilha primeiro na aba "📥 Importar"</div></Cd> : (
            <div>
              {/* Year filter */}
              {anos.length>0 && (
                <div style={{display:"flex",gap:4,marginBottom:14,alignItems:"center",flexWrap:"wrap"}}>

                  <button onClick={function(){sSelYear("todos");sSelMonth(null)}} style={{padding:"6px 14px",borderRadius:10,fontSize:11,fontWeight:600,cursor:"pointer",border:selYear==="todos"?"1.5px solid "+T.gold:"1px solid rgba(255,255,255,0.04)",background:selYear==="todos"?T.goldD:"transparent",color:selYear==="todos"?T.gold:T.t3}}>Todos</button>
                  {anos.map(function(yr){return (
                    <button key={yr} onClick={function(){sSelYear(yr);sSelMonth(null)}} style={{padding:"6px 14px",borderRadius:10,fontSize:11,fontWeight:600,cursor:"pointer",border:selYear===yr?"1.5px solid "+T.gold:"1px solid rgba(255,255,255,0.04)",background:selYear===yr?T.goldD:"transparent",color:selYear===yr?T.gold:T.t3}}>{yr}</button>

              {/* Year summary cards */}
              {selYear==="todos" && anos.length>1 && (

                  {anos.map(function(yr){var d=byYear[yr]||{rec:0,count:0};var prevYr=String(+yr-1);var prevRec=byYear[prevYr]?byYear[prevYr].rec:0;var evolYr=prevRec>0?(((d.rec/prevRec)-1)*100):0;return (
                    <Cd key={yr} onClick={function(){sSelYear(yr);sSelMonth(null)}} style={{padding:"14px 18px",flex:1,minWidth:160,cursor:"pointer"}} glow={true}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                        <span style={{fontSize:18,fontWeight:800,color:T.gold}}>{yr}</span>
                        {prevRec>0 && <span style={{fontSize:11,fontWeight:700,color:evolYr>=0?T.green:T.red,background:evolYr>=0?T.greenD:T.redD,padding:"2px 8px",borderRadius:6}}>{evolYr>=0?"▲ +":"▼ "}{evolYr.toFixed(1)}%</span>}
                      </div>
                      <div style={{fontSize:20,fontWeight:800,color:T.green,fontFamily:"'JetBrains Mono'"}}>{fm(d.rec)}</div>

                      </div>

                </div>

              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
                {[
                  {l:"RECEITA "+(selYear==="todos"?"TOTAL":selYear),v:fm(totalEntradas),c:T.green},
                  {l:"DESPESA "+(selYear==="todos"?"TOTAL":selYear),v:fm(totalDespesas),c:T.red},
                  {l:"LUCRO "+(selYear==="todos"?"":""+selYear),v:fm(lucro),c:lucro>=0?T.green:T.red},
                  {l:"MARGEM",v:margem.toFixed(0)+"%",c:margem>=50?T.green:T.gold},
                  {l:"ENTRADAS",v:String(entradasFilt.length),c:T.cyan},
                  {l:"MESES",v:String(mesesOrdenados.length),c:T.purple},
                ].map(function(k,i){return (
                  <Cd key={i} style={{padding:"12px 16px",flex:1,minWidth:120}} hov={false} glow={i===2}>
                    <div style={{fontSize:7,color:T.t3,fontWeight:600,letterSpacing:1}}>{k.l}</div>
                    <div style={{fontSize:17,fontWeight:800,color:k.c,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{k.v}</div>
                  </Cd>
                )})}
              </div>
              {/* Chart */}
              <Cd style={{padding:22}} hov={false}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
                  <h4 style={{margin:0,fontSize:14,fontWeight:700,color:T.gold}}>Receita por Mês</h4>
                  <span style={{fontSize:10,color:T.t3}}>Clique na barra para detalhar</span>
                </div>
                {/* Bars */}
                <div style={{display:"flex",alignItems:"flex-end",gap:mesesOrdenados.length>8?4:8,height:220,padding:"0 2px"}}>
                  {mesesOrdenados.map(function(m,i){
                    var prevRec=i>0?byMonth[mesesOrdenados[i-1]].rec:0;
                    var curRec=byMonth[m].rec;
                    var evolPct=prevRec>0?(((curRec/prevRec)-1)*100):0;
                    var isSel=selMonth===m;
                    var barH=Math.max(12,(curRec/mxRec)*175);
                    return (
                      <div key={i} onClick={function(){sSelMonth(isSel?null:m)}} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",minWidth:0}}>
                        {/* Evolution badge */}
                        {i>0 && <div style={{padding:"2px 6px",borderRadius:6,background:evolPct>=0?"rgba(45,212,160,0.12)":"rgba(239,100,97,0.12)",marginBottom:4}}>
                          <span style={{fontSize:9,fontWeight:700,color:evolPct>=0?T.green:T.red}}>{evolPct>=0?"▲":"▼"}{Math.abs(evolPct).toFixed(1)}%</span>
                        </div>}
                        {i===0 && <div style={{height:22}}/>}
                        {/* Value */}
                        <div style={{fontSize:mesesOrdenados.length>8?8:11,fontWeight:700,color:isSel?T.gold:T.t1,fontFamily:"'JetBrains Mono'",marginBottom:4,whiteSpace:"nowrap"}}>{fm(curRec).replace("R$ ","")}</div>
                        {/* Bar */}
                        <div style={{width:"100%",maxWidth:56,height:barH,background:isSel?"linear-gradient(180deg,#F0D060,#D4A328,rgba(212,163,40,0.4))":"linear-gradient(180deg,rgba(45,212,160,0.8),rgba(45,212,160,0.4),rgba(45,212,160,0.1))",borderRadius:"8px 8px 3px 3px",border:isSel?"1.5px solid "+T.gold:"1px solid rgba(45,212,160,0.15)",boxShadow:isSel?"0 0 16px rgba(212,163,40,0.3)":"0 2px 8px rgba(45,212,160,0.08)",transition:"all 0.3s ease",position:"relative",overflow:"hidden"}}>
                          <div style={{position:"absolute",top:0,left:"20%",right:"20%",height:2,background:isSel?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.15)",borderRadius:1}}/>
                        </div>
                        {/* Month label */}

                {/* Summary bar */}
                {mesesOrdenados.length>=2 && (function(){
                  var first=byMonth[mesesOrdenados[0]].rec;

                  var evol=first>0?(((last/first)-1)*100):0;
                  var maxMes=mesesOrdenados.reduce(function(b,m){return byMonth[m].rec>byMonth[b].rec?m:b},mesesOrdenados[0]);
                  var minMes=mesesOrdenados.reduce(function(b,m){return byMonth[m].rec<byMonth[b].rec?m:b},mesesOrdenados[0]);
                  return (

                      <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.t3,fontWeight:600}}>TOTAL</div><div style={{fontSize:14,fontWeight:800,color:T.gold,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{fm(totalEntradas)}</div></div>
                    </div>
                  );
                })()}
              </Cd>

              {/* Month drill-down */}
              {selMonth && byMonth[selMonth] && (
                <Cd style={{padding:18,marginTop:12}} hov={false} glow>

                    <h4 style={{margin:0,fontSize:14,fontWeight:700,color:T.gold}}>📅 {fmtMonth(selMonth)} — Detalhamento</h4>
                    <button onClick={function(){sSelMonth(null)}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,color:T.t3,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕</button>
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>
                    <Cd style={{padding:"10px 14px",flex:1,minWidth:100}} hov={false}><div style={{fontSize:7,color:T.t3,fontWeight:600}}>RECEITA</div><div style={{fontSize:16,fontWeight:800,color:T.green,fontFamily:"'JetBrains Mono'"}}>{fm(byMonth[selMonth].rec)}</div></Cd>

                          </div>
                          {/* Bar + sparkline */}
                          <div style={{display:"flex",alignItems:"center",gap:8,marginTop:6}}>
                            <div style={{flex:1,height:4,background:"rgba(255,255,255,0.03)",borderRadius:2,overflow:"hidden"}}>

                            </div>
                            {sparkData.length>1 && <Spark data={sparkData} color={svcColors[d.servico]||T.gold} w={80} h={18}/>}
                          </div>
                        </div>
                      </div>
                    </Cd>
                  );
                });
              })()}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

    {id:5,nome:"Pedro Augusto",tel:"(11)95432-1098",email:"pedro@email.com",origem:"Indicação",servico:"planejamento",patEst:0,stage:"negociacao",notas:"Negociando valor do fee mensal",dtCriado:"2026-03-10"},
    {id:6,nome:"Ana Beatriz",tel:"(21)94321-0987",email:"ana@email.com",origem:"Instagram",servico:"milhas",patEst:0,stage:"prospect",notas:"Interesse em Couri Mile$",dtCriado:"2026-04-05"},
    {id:7,nome:"Marcos Oliveira",tel:"(11)93210-9876",email:"marcos@email.com",origem:"Indicação",servico:"patrimonio",patEst:650000,stage:"fechado",notas:"Convertido! Início em maio.",dtCriado:"2026-02-15"},
    {id:8,nome:"Juliana Costa",tel:"(31)92109-8765",email:"juliana@email.com",origem:"LinkedIn",servico:"patrimonio",patEst:900000,stage:"perdido",notas:"Escolheu concorrente (XP)",dtCriado:"2026-02-01"},
  ]);

  const[showAdd,sShowAdd]=useState(false);
  const[selLead,sSelLead]=useState(null);
  const[toast,sToast]=useState(null);
  const show=function(m){sToast(m);setTimeout(function(){sToast(null)},3000)};

  /* Period filter: month YYYY-MM or year YYYY or "todos" */
  const hojeRef=new Date();
  const mesAtual=String(hojeRef.getMonth()+1).padStart(2,"0");
  const anoAtual=hojeRef.getFullYear();
  const[periodo,sPeriodo]=useState("mes:"+anoAtual+"-"+mesAtual);
  const MN_CURTO=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  /* Build period options: last 12 months + years */
  var periodOpts=[{v:"todos",l:"Todos os períodos"}];
  for(var i=0;i<12;i++){
    var d=new Date(anoAtual,hojeRef.getMonth()-i,1);
    var ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    periodOpts.push({v:"mes:"+ym,l:MN_CURTO[d.getMonth()]+"/"+String(d.getFullYear()).slice(2)+" (mensal)"});
  }
  /* Year options from 2024 to current */
  for(var y=anoAtual;y>=2024;y--){
    periodOpts.push({v:"ano:"+y,l:y+" (anual)"});
  }

  /* Period filter helper: returns true if date "YYYY-MM-DD" falls inside selected period */
  var inPeriod=function(dateStr){
    if(!dateStr)return periodo==="todos";
    if(periodo==="todos")return true;
    if(periodo.indexOf("mes:")===0){var ym=periodo.substring(4);return dateStr.substring(0,7)===ym}
    if(periodo.indexOf("ano:")===0){var yr=periodo.substring(4);return dateStr.substring(0,4)===yr}
    return true;
  };
  var periodLabel=(function(){var o=periodOpts.find(function(x){return x.v===periodo});return o?o.l:""})();

  /* ===== CLIENTES — auto-populated from data.cl ===== */
  /* Status convention:
     - status="ativo" (default) → coluna "Ativos"
     - status="inativo" → coluna "Inativos/Encerrados" com badge INATIVO (cliente sem contato)
     - status="encerrado" → coluna "Inativos/Encerrados" com badge ENCERRADO (cliente cancelou) */
  var clientes=(d&&d.cl?d.cl:[]).map(function(c){
    var status=c.status||"ativo";
    var dtCap=c.dtCaptacao||"2024-01-01";
    var dtStatus=c.dtStatusChange||dtCap;
    /* Last interaction check (from data.it) */
    var intCli=(d.it||[]).filter(function(i){return i.cid===c.id}).sort(function(a,b){return b.data.localeCompare(a.data)});
    var lastInt=intCli.length>0?intCli[0].data:dtCap;
    var monthsSinceContact=Math.floor((hojeRef-new Date(lastInt))/(30*86400000));
    return Object.assign({},c,{status:status,dtCaptacao:dtCap,dtStatusChange:dtStatus,_lastInt:lastInt,_mSinceContact:monthsSinceContact,_semContato:status==="ativo"&&monthsSinceContact>=6});
  });

  var ativosTodos=clientes.filter(function(c){return c.status==="ativo"});
  var inativosTodos=clientes.filter(function(c){return c.status==="inativo"||c.status==="encerrado"});

  /* Move client between statuses */
  var moveClientStatus=function(clienteId,newStatus){
    var hoje=new Date().toISOString().split("T")[0];
    dp({t:"UC",p:{id:clienteId,status:newStatus,dtStatusChange:hoje}});
    var labels={ativo:"ativado",inativo:"marcado como inativo",encerrado:"marcado como encerrado"};
    show("✅ Cliente "+(labels[newStatus]||newStatus));
  };

  /* ===== LEADS ===== */
  var moveLead=function(leadId,newStage){
    sLeads(function(p){return p.map(function(l){return l.id===leadId?Object.assign({},l,{stage:newStage}):l})});
  };
  var leadsAtivos=leads.filter(function(l){return l.stage!=="fechado"&&l.stage!=="perdido"});
  var leadsFechados=leads.filter(function(l){return l.stage==="fechado"});
  var leadsPerdidos=leads.filter(function(l){return l.stage==="perdido"});

  /* ===== METRICS (filtered by period) ===== */
  /* Captados no período: clientes cujo dtCaptacao cai no período */
  var captadosPeriodo=clientes.filter(function(c){return inPeriod(c.dtCaptacao)});
  /* Inativos/encerrados no período: cujo dtStatusChange cai no período E status != ativo */
  var saidasPeriodo=clientes.filter(function(c){return c.status!=="ativo"&&inPeriod(c.dtStatusChange)});
  var inativosPeriodo=saidasPeriodo.filter(function(c){return c.status==="inativo"});
  var encerradosPeriodo=saidasPeriodo.filter(function(c){return c.status==="encerrado"});
  var netCaptacao=captadosPeriodo.length-saidasPeriodo.length;
  /* Retention rate */
  var baseRetencao=ativosTodos.length+saidasPeriodo.length;
  var taxaRetencao=baseRetencao>0?((ativosTodos.length/baseRetencao)*100).toFixed(0):100;

  /* Pipeline totals (aggregate leads + clients for view) */
  var totalPatPipeline=leads.filter(function(l){return l.stage!=="perdido"}).reduce(function(a,l){return a+l.patEst},0);
  var fechadosLeads=leadsFechados.length;
  var convRate=fechadosLeads+leadsPerdidos.length>0?((fechadosLeads/(fechadosLeads+leadsPerdidos.length))*100).toFixed(0):0;

  /* ===== EVOLUTION CHART — last 12 months ===== */
  var evolMeses=[];
  for(var i=11;i>=0;i--){
    var dEvol=new Date(anoAtual,hojeRef.getMonth()-i,1);
    var yme=dEvol.getFullYear()+"-"+String(dEvol.getMonth()+1).padStart(2,"0");
    var novos=clientes.filter(function(c){return c.dtCaptacao&&c.dtCaptacao.substring(0,7)===yme}).length;
    var saidas=clientes.filter(function(c){return c.status!=="ativo"&&c.dtStatusChange&&c.dtStatusChange.substring(0,7)===yme}).length;
    evolMeses.push({ym:yme,label:MN_CURTO[dEvol.getMonth()]+"/"+String(dEvol.getFullYear()).slice(2),novos:novos,saidas:saidas,net:novos-saidas});
  }
  var maxEvol=Math.max.apply(null,evolMeses.map(function(m){return Math.max(m.novos,m.saidas)}).concat([1]));

  return (
    <div>
      {toast && <div style={{position:"fixed",top:20,right:20,zIndex:2000,padding:"14px 24px",background:T.greenD,border:"1px solid "+T.green+"33",borderRadius:14,color:T.green,fontSize:13,fontWeight:600,boxShadow:"0 12px 40px rgba(0,0,0,0.4)"}}>{toast}</div>}

      {/* PERIOD SELECTOR */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,fontWeight:700,color:T.t3,letterSpacing:.8}}>📅 PERÍODO DE ANÁLISE:</span>
          <select value={periodo} onChange={function(e){sPeriodo(e.target.value)}} style={{padding:"8px 14px",background:T.w3,border:"1px solid "+T.gold+"22",borderRadius:10,color:T.gold,fontSize:12,fontWeight:700,outline:"none",cursor:"pointer",minWidth:180}}>
            {periodOpts.map(function(o){return <option key={o.v} value={o.v}>{o.l}</option>})}

                    <div style={{display:"flex",gap:3,marginTop:8}}>
                      {stages.filter(function(s){return s.id!==lead.stage}).slice(0,3).map(function(s){return (

                      )})}
                      <button onClick={function(e){e.stopPropagation();moveLead(lead.id,"perdido");show("Lead marcado como perdido")}} style={{padding:"3px 6px",borderRadius:4,border:"1px solid "+T.red+"33",background:T.redD,color:T.red,fontSize:8,fontWeight:600,cursor:"pointer",marginLeft:"auto"}}>✗</button>

                  {recMes>0 && <div style={{fontSize:11,color:T.gold,fontWeight:700,fontFamily:"'JetBrains Mono'",marginBottom:6}}>{fm(recMes)}/mês</div>}
                  <div style={{display:"flex",gap:3}}>
                    <button onClick={function(){moveClientStatus(c.id,"inativo")}} style={{flex:1,padding:"4px 6px",borderRadius:4,border:"1px solid "+T.orange+"33",background:T.orangeD,color:T.orange,fontSize:9,fontWeight:600,cursor:"pointer"}} title="Sem contato/engajamento">⚠️ Inativar</button>

            {inativosTodos.map(function(c){
              var isEnc=c.status==="encerrado";

                <div key={c.id} style={{padding:10,background:T.card,borderRadius:12,border:"1px solid "+(isEnc?T.red+"22":T.orange+"22")}}>

                <span style={{color:T.t3,marginLeft:6}}>{l.notas?l.notas.substring(0,30)+"...":""}</span>

                return (
                  <div key={key}>
                    <div style={{fontSize:10,fontWeight:700,color:T.t3,marginBottom:3}}>{label.toUpperCase()}</div>
                    <input value={selLead[key]||""} onChange={function(e){var up={};up[key]=e.target.value;sSelLead(Object.assign({},selLead,up));sLeads(function(p){return p.map(function(l){return l.id===selLead.id?Object.assign({},l,up):l})})}} style={inpS}/>
                  </div>

              </div>
              <div style={{display:"flex",gap:6}}>
                <Bt v="secondary" style={{fontSize:11,color:T.red}} onClick={function(){sLeads(function(p){return p.filter(function(l){return l.id!==selLead.id})});sSelLead(null)}}>Excluir</Bt>
                <Bt onClick={function(){sSelLead(null)}}>Fechar</Bt>
              </div>
            </div>
          </div>

function ImportView(){
  const[file,sFile]=useState(null);
  const[rows,sRows]=useState([]);
  const[cols,sCols]=useState([]);
  const[fonte,sFonte]=useState("");
  const[status,sStatus]=useState("idle");
  const fileRef=useRef(null);

  const handleFile=function(f){
    if(!f)return;
    sFile(f);sStatus("loading");
    const isExcel=f.name.match(/\.(xlsx|xls)$/i);
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        let h=[],d=[];
        if(isExcel){
          const wb=XLSX.read(e.target.result,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const json=XLSX.utils.sheet_to_json(ws,{defval:""});
          if(json.length>0){h=Object.keys(json[0]);d=json}
        }else{
          const text=e.target.result;
          const lines=text.split(/\r?\n/).filter(function(l){return l.trim()});
          if(lines.length<2){sStatus("error");return}
          const sep=lines[0].includes(";")?";":lines[0].includes("\t")?"\t":",";
          h=lines[0].split(sep).map(function(x){return x.replace(/"/g,"").trim()});
          d=lines.slice(1).map(function(line){const vals=line.split(sep).map(function(v){return v.replace(/"/g,"").trim()});const obj={};h.forEach(function(hh,i){obj[hh]=vals[i]||""});return obj}).filter(function(r){return Object.values(r).some(function(v){return v})});
        }
        if(h.length===0){sStatus("error");return}
        sCols(h);sRows(d);sFonte("Detectado");sStatus("done");
      }catch(err){sStatus("error")}
    };
    reader.onerror=function(){sStatus("error")};
    if(isExcel){reader.readAsArrayBuffer(f)}else{reader.readAsText(f,"UTF-8")}
  };

  return (
    <div>
      <Cd style={{padding:status==="done"?24:50,textAlign:status==="done"?"left":"center"}} hov={false}>
        {status!=="done" && (
          <div onClick={function(){fileRef.current && fileRef.current.click()}} style={{cursor:"pointer"}}>
            <input ref={fileRef} type="file" accept=".csv,.txt,.tsv,.xlsx,.xls" onChange={function(e){if(e.target.files[0])handleFile(e.target.files[0])}} style={{display:"none"}}/>
            <div style={{fontSize:42,marginBottom:14,animation:"float 4s ease infinite"}}>📁</div>
            <div style={{fontSize:18,fontWeight:700,color:T.gold,marginBottom:8}}>Importar Dados</div>
            <div style={{fontSize:14,color:T.t3}}>Clique para selecionar CSV ou Excel</div>
          </div>
        )}
        {status==="done" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div><div style={{fontSize:16,fontWeight:700}}>{file && file.name}</div><Bg c="green">Importado</Bg></div>
              <Bt v="secondary" onClick={function(){sStatus("idle");sFile(null);sRows([]);sCols([])}} style={{fontSize:12}}>📁 Novo</Bt>
            </div>
            <div style={{fontSize:12,color:T.t2,marginBottom:10}}>{rows.length} linhas • {cols.length} colunas</div>
          </div>
        )}
      </Cd>
      {status==="done" && rows.length>0 && (
        <Cd style={{padding:20,marginTop:14}} hov={false}>
          <h4 style={{margin:"0 0 14px",fontSize:14,fontWeight:700,color:T.gold}}>Preview ({Math.min(rows.length,15)} linhas)</h4>
          <div style={{overflowX:"auto",borderRadius:12,border:"1px solid "+T.bdrL}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:T.w3}}>{cols.map(function(c,i){return <th key={i} style={{padding:"8px 12px",textAlign:"left",fontWeight:700,color:T.gold,fontSize:10,borderBottom:"1px solid "+T.bdr,whiteSpace:"nowrap"}}>{c}</th>})}</tr></thead>
              <tbody>{rows.slice(0,15).map(function(r,ri){return <tr key={ri} style={{background:ri%2===0?"transparent":T.w3}}>{cols.map(function(c,ci){return <td key={ci} style={{padding:"6px 12px",borderBottom:"1px solid "+T.bdrL,color:T.t2,whiteSpace:"nowrap",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{r[c]||"—"}</td>})}</tr>})}</tbody>
            </table>
          </div>
        </Cd>
      )}
    </div>
  );
}

function LoginScreen(){

        sError("Email "+email+" não autorizado. Use a conta cadastrada.");
