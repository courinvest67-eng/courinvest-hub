function rd(st,ac){
  if(ac.t==="AC") return {...st,cl:[...st.cl,{...ac.p,id:ac.p.id||("c"+Date.now())}]};
  if(ac.t==="UC") return {...st,cl:st.cl.map(c=>c.id===ac.p.id?{...c,...ac.p}:c)};
  if(ac.t==="RC") return {...st,cl:[...st.cl.filter(c=>c.nome.toLowerCase()!==ac.p.nome.toLowerCase()),ac.p]};
  if(ac.t==="AI") return {...st,it:[{...ac.p,id:"i"+Date.now()},...st.it]};
  if(ac.t==="DC") return {...st,cl:st.cl.filter(c=>c.id!==ac.p),it:st.it.filter(i=>i.cid!==ac.p)};
  /* Leads (Pipeline Comercial) */
  if(ac.t==="AL") return {...st,lds:[...(st.lds||[]),{...ac.p,id:ac.p.id||("l"+Date.now())}]};
  if(ac.t==="UL") return {...st,lds:(st.lds||[]).map(function(l){return l.id===ac.p.id?{...l,...ac.p}:l})};
  if(ac.t==="DL") return {...st,lds:(st.lds||[]).filter(function(l){return l.id!==ac.p})};
  if(ac.t==="SET_LEADS") return {...st,lds:ac.p||[]};
  /* Financeiro */
  if(ac.t==="FIN_ADD_ENTRADAS") return {...st,fin:{...(st.fin||{}),entradas:[...((st.fin&&st.fin.entradas)||[]),...ac.p]}};
  if(ac.t==="FIN_CLEAR_ENTRADAS") return {...st,fin:{...(st.fin||{}),entradas:[]}};
  if(ac.t==="FIN_ADD_DESPESA") return {...st,fin:{...(st.fin||{}),despesas:[...((st.fin&&st.fin.despesas)||[]),ac.p]}};
  if(ac.t==="FIN_DEL_DESPESA") return {...st,fin:{...(st.fin||{}),despesas:((st.fin&&st.fin.despesas)||[]).filter(function(d){return d.id!==ac.p})}};
  if(ac.t==="REPLACE_ALL") return {cl:ac.p.cl||[],it:ac.p.it||[],lds:ac.p.lds||[],fin:ac.p.fin||{entradas:[],despesas:[]}};
  return st;
}

          {(function(){

                },{tk:"",v:0});

              }
              /* Caixa alto */
              if(caixaByCliente[c.id]&&patC>0){

            /* ========= 2) EVENTOS DO MÊS ========= */

              var dt=new Date(c.dtCaptacao);

                var anos=anoAtual-dt.getFullYear();

                    dia:diaAniv,
                    tipo:"rel",
                    ic:"🤝",
                    cor:T.cyan,
                    cid:c.id,
                    nm:c.nome,
                    msg:anos+" ano"+(anos>1?"s":"")+" de relacionamento"
                  });

            /* Vencimentos no mês atual */
            clAtivos.forEach(function(c){
              if(!c._ativosImport)return;
              c._ativosImport.forEach(function(a){
                if(!a.venc)return;
                var dt=new Date(a.venc);

                    dia:dt.getDate(),
                    tipo:"venc",

                    cor:dt.getDate()<diaAtual?T.red:T.orange,
                    cid:c.id,
                    nm:c.nome,

                  });

              return{id:c.id,nm:c.nome,v:p12?p12.rent*100:(pm?pm.rent*100:0)};
            }).sort(function(a,b){return b.v-a.v}).slice(0,5);
            
            /* ========= 4) HEATMAP ========= */

              /* Agrupa horários em 4 blocos: manhã(6-12), tarde(12-18), noite(18-0), madrugada(0-6) */
              var bloco;
              if(h>=6&&h<12)bloco=0;
              else if(h>=12&&h<18)bloco=1;
              else if(h>=18)bloco=2;
              else bloco=3;
              var k=dia+"-"+bloco;
              heatmap[k]=(heatmap[k]||0)+1;
            });
            var maxHeat=Math.max.apply(null,[1].concat(Object.values(heatmap)));
            var blocos=["🌅 Manhã","☀️ Tarde","🌙 Noite","🌃 Madrug."];

      {dt==="clientes" && (

              {l:"GESTÃO FINANCEIRA",v:String(clFin.length),c:T.cyan},
              {l:"COURI MILE$",v:String(clMiles.length),c:T.purple},
              {l:"CONSERVADOR",v:String(cl.filter(c=>c.risco==="Conservador").length),c:T.green},
              {l:"MODERADO",v:String(cl.filter(c=>c.risco==="Moderado").length),c:T.gold},

            ].map((k,i)=>(
              <Cd key={i} style={{padding:"12px 14px"}} hov={false}><div style={{fontSize:7,color:T.t3,fontWeight:600,letterSpacing:.8}}>{k.l}</div><div style={{fontSize:18,fontWeight:800,color:k.c,marginTop:3}}>{k.v}</div></Cd>
            ))}

          {/* Client table */}
          <Cd style={{padding:18}} hov={false}>
            <h4 style={{margin:"0 0 14px",fontSize:13,fontWeight:700,color:T.gold}}>Clientes por Receita</h4>
            {cl.sort((a,b)=>{var ra=(a.sv.includes("patrimonio")?(a.pat||0)*(a.txGestao||0)/100:0)+(a.feeFixo||0)+(a.sv.includes("milhas")?99:0);var rb=(b.sv.includes("patrimonio")?(b.pat||0)*(b.txGestao||0)/100:0)+(b.feeFixo||0)+(b.sv.includes("milhas")?99:0);return rb-ra}).map((c,i)=>{
              var rec=(c.sv.includes("patrimonio")?(c.pat||0)*(c.txGestao||0)/100:0)+(c.feeFixo||0)+(c.sv.includes("milhas")?99:0);
              return(
                <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                  <div style={{width:22,height:22,borderRadius:7,background:i<3?T.goldD:"rgba(255,255,255,0.02)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:800,color:i<3?T.gold:T.t3}}>{i+1}</div>
                  <Av name={c.nome} sz={30}/>

      {/* ============ ABA: OPORTUNIDADES ============
         Combina dados cruzados que ainda não têm consolidação em outras telas:
         1. Clientes com alto caixa parado (>= 10% do AUM deles em caixa sem alocação)
         2. Ativos de RF vencendo nos próximos 30/60/90 dias (precisa reinvestir)
         3. Clientes com concentração excessiva em 1 ativo (>20%) — oportunidade de rebalancear
         4. Clientes com captação líquida fortemente positiva — oportunidade de aporte em RV */}
      {dt==="oport" && (()=>{
        var hoje=new Date();
        /* --- 1. Caixa parado --- */
        var caixaParado=cl.filter(function(c){return c.sv.includes("patrimonio")}).map(function(c){
          var ativos=c._ativosImport||[];
          var caixa=ativos.filter(function(a){return a.tp==="caixa"}).reduce(function(s,a){return s+(a.posR||0)},0);
          var totAt=ativos.reduce(function(s,a){return s+(a.posR||0)},0);
          var pct=totAt>0?caixa/totAt*100:0;
          return {c:c,caixa:caixa,totAt:totAt,pct:pct};
        }).filter(function(x){return x.caixa>=10000 || x.pct>=10}).sort(function(a,b){return b.caixa-a.caixa});
        /* --- 2. Vencimentos RF próximos (90 dias) --- */
        var RF_TYPES=["cdb","lci","lca","lc","cri","cra","tesouro","deb","debi","coe"];
        var vencProximos=[];
        cl.forEach(function(c){
          var ativos=c._ativosImport||[];
          ativos.forEach(function(a){
            if(RF_TYPES.indexOf(a.tp)<0||!a.venc)return;
            var d=new Date(a.venc);
            if(isNaN(d.getTime()))return;
            var dias=Math.ceil((d-hoje)/86400000);
            if(dias>=0&&dias<=90){
              vencProximos.push({cliente:c.nome,clId:c.id,ativo:a.tk||a.nm,tipo:a.tp,valor:a.posR||0,venc:d,dias:dias,inst:a.inst});
            }
          });
        });
        vencProximos.sort(function(a,b){return a.dias-b.dias});
        /* --- 3. Concentração excessiva (> 20% em um único ativo) --- */
        var concentrados=[];
        cl.forEach(function(c){
          var ativos=c._ativosImport||[];
          var totAt=ativos.reduce(function(s,a){return s+(a.posR||0)},0);
          if(totAt<10000)return;
          ativos.forEach(function(a){
            var pct=a.posR/totAt*100;
            if(pct>=20){
              concentrados.push({cliente:c.nome,clId:c.id,ativo:a.tk||a.nm,tipo:a.tp,valor:a.posR||0,pct:pct});
            }
          });
        });
        concentrados.sort(function(a,b){return b.pct-a.pct});
        /* --- 4. Captação líquida positiva (possível aporte recente) --- */
        var aportesRecentes=cl.filter(function(c){
          return c._gorilaRent&&c._gorilaRent.captacao&&c._gorilaRent.captacao>5000;
        }).map(function(c){
          return {c:c,capt:c._gorilaRent.captacao||0,ap:c._gorilaRent.aportes||0,ret:c._gorilaRent.retiradas||0};
        }).sort(function(a,b){return b.capt-a.capt});

        var tipoLabel={cdb:"CDB",lci:"LCI",lca:"LCA",lc:"LC",cri:"CRI",cra:"CRA",tesouro:"Tesouro",deb:"Debênture",debi:"Deb. Inc.",coe:"COE",acao:"Ação",fii:"FII",fiagro:"FIAgro",etf_br:"ETF",bdr:"BDR",stock_us:"Stock",reit:"REIT",fundo_rf:"Fundo RF",fundo_mm:"Fundo MM"};

        return (
          <div>
            {/* Resumo no topo — 4 cards KPI */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:10,marginBottom:16}}>
              <Cd style={{padding:"14px 16px"}} hov={false}>
                <div style={{fontSize:18,marginBottom:4}}>💤</div>
                <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>CAIXA PARADO</div>
                <div style={{fontSize:18,fontWeight:800,color:T.gold,marginTop:3,fontFamily:"'JetBrains Mono'"}}>{caixaParado.length}</div>
                <div style={{fontSize:9,color:T.t3,marginTop:2}}>clientes com &gt;R$ 10k sem alocar</div>
              </Cd>
              <Cd style={{padding:"14px 16px"}} hov={false}>
                <div style={{fontSize:18,marginBottom:4}}>⏰</div>
                <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>VENCIMENTOS 90D</div>
                <div style={{fontSize:18,fontWeight:800,color:T.orange,marginTop:3,fontFamily:"'JetBrains Mono'"}}>{vencProximos.length}</div>
                <div style={{fontSize:9,color:T.t3,marginTop:2}}>{fm(vencProximos.reduce(function(s,v){return s+v.valor},0))}</div>
              </Cd>
              <Cd style={{padding:"14px 16px"}} hov={false}>
                <div style={{fontSize:18,marginBottom:4}}>📊</div>
                <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>REBALANCEAR</div>
                <div style={{fontSize:18,fontWeight:800,color:T.red,marginTop:3,fontFamily:"'JetBrains Mono'"}}>{concentrados.length}</div>
                <div style={{fontSize:9,color:T.t3,marginTop:2}}>ativos &gt;20% da carteira</div>
              </Cd>
              <Cd style={{padding:"14px 16px"}} hov={false}>
                <div style={{fontSize:18,marginBottom:4}}>💰</div>
                <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>CAPTAÇÃO ATIVA</div>
                <div style={{fontSize:18,fontWeight:800,color:T.green,marginTop:3,fontFamily:"'JetBrains Mono'"}}>{aportesRecentes.length}</div>
                <div style={{fontSize:9,color:T.t3,marginTop:2}}>clientes com aporte recente</div>
              </Cd>
            </div>

            {/* Grid 2 colunas: Caixa Parado + Vencimentos */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(400px,1fr))",gap:14,marginBottom:14}}>
              {/* Caixa Parado */}
              <Cd style={{padding:18}} hov={false}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid "+T.w3}}>
                  <h4 style={{margin:0,fontSize:13,fontWeight:700,color:T.gold}}>💤 Caixa Parado</h4>
                  <Bg c="gold">{caixaParado.length} cliente{caixaParado.length!==1?"s":""}</Bg>
                </div>
                {caixaParado.length===0 ? (
                  <div style={{padding:20,textAlign:"center",color:T.t3,fontSize:11,fontStyle:"italic"}}>Nenhum cliente com caixa parado relevante. 👌</div>
                ) : (
                  caixaParado.slice(0,6).map(function(x,i){return (
                    <div key={i} onClick={function(){os(x.c)}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",background:i%2===0?"rgba(255,255,255,0.015)":"transparent",borderRadius:10,marginBottom:2,cursor:"pointer",transition:"background 0.2s"}} onMouseEnter={function(e){e.currentTarget.style.background="rgba(212,163,40,0.08)"}} onMouseLeave={function(e){e.currentTarget.style.background=i%2===0?"rgba(255,255,255,0.015)":"transparent"}}>
                      <Av name={x.c.nome} sz={32}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.c.nome}</div>
                        <div style={{fontSize:9,color:T.t3,marginTop:2}}>{x.pct.toFixed(1)}% em caixa</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:12,fontWeight:800,color:T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(x.caixa)}</div>
                        <div style={{fontSize:9,color:T.t3}}>de {fm(x.totAt)}</div>
                      </div>
                    </div>
                  )})
                )}
                {caixaParado.length>6 && <div style={{fontSize:10,color:T.t3,textAlign:"center",marginTop:8,fontStyle:"italic"}}>+ {caixaParado.length-6} outros</div>}
              </Cd>

              {/* Vencimentos RF */}
              <Cd style={{padding:18}} hov={false}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid "+T.w3}}>
                  <h4 style={{margin:0,fontSize:13,fontWeight:700,color:T.gold}}>⏰ Vencimentos nos Próximos 90 dias</h4>
                  <Bg c="orange">{vencProximos.length} ativo{vencProximos.length!==1?"s":""}</Bg>
                </div>
                {vencProximos.length===0 ? (
                  <div style={{padding:20,textAlign:"center",color:T.t3,fontSize:11,fontStyle:"italic"}}>Nenhum vencimento próximo.</div>
                ) : (
                  vencProximos.slice(0,6).map(function(v,i){
                    var urgencia=v.dias<=15?T.red:v.dias<=30?T.orange:T.cyan;
                    var urgLabel=v.dias<=15?"URGENTE":v.dias<=30?"PRÓXIMO":"PROGRAMADO";
                    var c=cl.find(function(x){return x.id===v.clId});
                    return (
                      <div key={i} onClick={function(){if(c)os(c)}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",background:i%2===0?"rgba(255,255,255,0.015)":"transparent",borderRadius:10,marginBottom:2,cursor:"pointer"}} onMouseEnter={function(e){e.currentTarget.style.background="rgba(212,163,40,0.08)"}} onMouseLeave={function(e){e.currentTarget.style.background=i%2===0?"rgba(255,255,255,0.015)":"transparent"}}>
                        <div style={{width:38,height:38,borderRadius:10,background:urgencia+"22",color:urgencia,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,border:"1px solid "+urgencia+"44"}}>
                          <div style={{fontSize:13,fontWeight:800,lineHeight:1,fontFamily:"'JetBrains Mono'"}}>{v.dias}</div>
                          <div style={{fontSize:7,fontWeight:600,letterSpacing:.5}}>DIAS</div>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.ativo}</div>
                          <div style={{fontSize:9,color:T.t3,marginTop:2}}>{v.cliente} · <span style={{color:urgencia,fontWeight:700}}>{urgLabel}</span></div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:11,fontWeight:800,color:T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(v.valor)}</div>
                          <div style={{fontSize:8,color:T.t3}}>{String(v.venc.getDate()).padStart(2,"0")}/{String(v.venc.getMonth()+1).padStart(2,"0")}</div>
                        </div>
                      </div>
                    );
                  })
                )}
                {vencProximos.length>6 && <div style={{fontSize:10,color:T.t3,textAlign:"center",marginTop:8,fontStyle:"italic"}}>+ {vencProximos.length-6} outros vencimentos</div>}
              </Cd>
            </div>

            {/* Grid 2 colunas: Concentrados + Captação */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(400px,1fr))",gap:14}}>
              {/* Concentração excessiva */}
              <Cd style={{padding:18}} hov={false}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid "+T.w3}}>
                  <h4 style={{margin:0,fontSize:13,fontWeight:700,color:T.gold}}>📊 Rebalanceamento Sugerido</h4>
                  <Bg c="red">{concentrados.length}</Bg>
                </div>
                {concentrados.length===0 ? (
                  <div style={{padding:20,textAlign:"center",color:T.t3,fontSize:11,fontStyle:"italic"}}>Nenhum cliente com concentração acima de 20%. 👌</div>
                ) : (
                  concentrados.slice(0,6).map(function(x,i){
                    var c=cl.find(function(cx){return cx.nome===x.cliente});
                    return (
                      <div key={i} onClick={function(){if(c)os(c)}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",background:i%2===0?"rgba(255,255,255,0.015)":"transparent",borderRadius:10,marginBottom:2,cursor:"pointer"}} onMouseEnter={function(e){e.currentTarget.style.background="rgba(212,163,40,0.08)"}} onMouseLeave={function(e){e.currentTarget.style.background=i%2===0?"rgba(255,255,255,0.015)":"transparent"}}>
                        <Av name={x.cliente} sz={32}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:11,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.cliente}</div>
                          <div style={{fontSize:9,color:T.t3,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{x.ativo} <span style={{color:T.t3}}>({tipoLabel[x.tipo]||x.tipo})</span></div>
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:13,fontWeight:800,color:T.red,fontFamily:"'JetBrains Mono'"}}>{x.pct.toFixed(1)}%</div>
                          <div style={{fontSize:8,color:T.t3}}>{fm(x.valor)}</div>
                        </div>
                      </div>
                    );
                  })
                )}
                {concentrados.length>6 && <div style={{fontSize:10,color:T.t3,textAlign:"center",marginTop:8,fontStyle:"italic"}}>+ {concentrados.length-6} outros</div>}
              </Cd>

              {/* Captação ativa */}
              <Cd style={{padding:18}} hov={false}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12,paddingBottom:10,borderBottom:"1px solid "+T.w3}}>
                  <h4 style={{margin:0,fontSize:13,fontWeight:700,color:T.gold}}>💰 Clientes em Captação Ativa</h4>
                  <Bg c="green">{aportesRecentes.length}</Bg>
                </div>
                {aportesRecentes.length===0 ? (
                  <div style={{padding:20,textAlign:"center",color:T.t3,fontSize:11,fontStyle:"italic"}}>Nenhum cliente com captação positiva recente.</div>
                ) : (
                  aportesRecentes.slice(0,6).map(function(x,i){return (
                    <div key={i} onClick={function(){os(x.c)}} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 8px",background:i%2===0?"rgba(255,255,255,0.015)":"transparent",borderRadius:10,marginBottom:2,cursor:"pointer"}} onMouseEnter={function(e){e.currentTarget.style.background="rgba(212,163,40,0.08)"}} onMouseLeave={function(e){e.currentTarget.style.background=i%2===0?"rgba(255,255,255,0.015)":"transparent"}}>
                      <Av name={x.c.nome} sz={32}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:12,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{x.c.nome}</div>
                        <div style={{fontSize:9,color:T.t3,marginTop:2}}>Aportou no último período</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{fontSize:12,fontWeight:800,color:T.green,fontFamily:"'JetBrains Mono'"}}>+{fm(x.capt)}</div>
                        <div style={{fontSize:8,color:T.t3}}>captação líquida</div>
                      </div>
                    </div>
                  )})
                )}
                {aportesRecentes.length>6 && <div style={{fontSize:10,color:T.t3,textAlign:"center",marginTop:8,fontStyle:"italic"}}>+ {aportesRecentes.length-6} outros</div>}
              </Cd>
            </div>
          </div>
        );
      })()}

      {/* ============ ABA: AGENDA & PRODUTIVIDADE ============
         Eventos pendentes, clientes sem contato recente, relatórios não gerados. */}
      {dt==="agenda" && (()=>{
        var hoje=new Date();
        var inicioDia=new Date(hoje.getFullYear(),hoje.getMonth(),hoje.getDate());
        var fim7=new Date(inicioDia.getTime()+7*86400000);
        var fim30=new Date(inicioDia.getTime()+30*86400000);
        /* Eventos futuros (compromissos do Ag) — filtra pelo data.it */
        var eventos=(d.it||[]).filter(function(it){
          if(!it.data)return false;
          var dt=new Date(it.data);
          return !isNaN(dt.getTime())&&dt>=inicioDia&&dt<=fim30;
        }).sort(function(a,b){return new Date(a.data)-new Date(b.data)});
        var ev7=eventos.filter(function(e){return new Date(e.data)<=fim7});
        /* Clientes sem contato há mais de N dias */
        var clSemContato=cl.filter(function(c){return c.sv.includes("patrimonio")}).map(function(c){
          var inter=(d.it||[]).filter(function(it){return it.cid===c.id});
          if(inter.length===0)return {c:c,dias:null,ultima:null};
          var mais=inter.map(function(i){return new Date(i.data)}).filter(function(d){return !isNaN(d.getTime())}).sort(function(a,b){return b-a})[0];
          if(!mais)return {c:c,dias:null,ultima:null};
          return {c:c,dias:Math.ceil((hoje-mais)/86400000),ultima:mais};
        }).filter(function(x){return x.dias===null||x.dias>=30}).sort(function(a,b){
          if(a.dias===null&&b.dias===null)return 0;
          if(a.dias===null)return -1;
          if(b.dias===null)return 1;
          return b.dias-a.dias;
        });
        /* Relatórios não gerados no mês — ainda não temos campo de histórico de relatórios,
           então consideramos "sem interação" como proxy para "provavelmente não recebeu relatório" */

function CL({data:d,onSel:os,dispatch:dp}){
  const[se,sSe]=useState("");const[fi,sFi]=useState("todos");const[showAdd,sShowAdd]=useState(false);

  const[bulkProgress,sBulkProgress]=useState(null);

  /* Bulk import multiple Gorila files */
  var importGorilaBulk=function(files){
    if(!files||files.length===0)return;
    var arr=Array.from(files);
    var total=arr.length;
    var results={ok:[],fail:[]};
    sBulkProgress({current:0,total:total,nome:"",results:results});

    var processNext=function(idx){
      if(idx>=arr.length){
        /* All done */
        sBulkProgress({current:total,total:total,nome:"",results:results,done:true});
        sGMsg("✅ Importação em massa concluída! "+results.ok.length+" sucessos, "+results.fail.length+" falhas");
        setTimeout(function(){sGMsg("");sBulkProgress(null)},6000);
        return;
      }
      var file=arr[idx];
      sBulkProgress({current:idx+1,total:total,nome:file.name,results:results});
      
      /* Re-use single import logic by calling importGorilaCliente with a callback-like pattern */
      var done=function(success,name,patVal){
        if(success){results.ok.push({nome:name||file.name,pat:patVal||0})}
        else{results.fail.push({nome:file.name,err:name||"erro desconhecido"})}
        setTimeout(function(){processNext(idx+1)},200);
      };
      
      processGorilaFile(file,done);
    };
    processNext(0);
  };

  /* Process single file with callback - extracted from importGorilaCliente */
  var processGorilaFile=function(file,callback){
    if(!file){callback(false,"arquivo inválido");return}
    var isPdf=file.name.match(/\.pdf$/i);
    
    if(isPdf){
      var reader=new FileReader();
      reader.onload=function(e){
        var data=new Uint8Array(e.target.result);
        if(typeof pdfjsLib==="undefined"){callback(false,"PDF.js não carregado");return}
        pdfjsLib.getDocument({data:data}).promise.then(function(pdf){
          var promises=[];
          for(var p=1;p<=pdf.numPages;p++){
            promises.push(pdf.getPage(p).then(function(page){
              return page.getTextContent().then(function(tc){
                return tc.items.map(function(it){return it.str}).join("\n");
              });
            }));
          }
          Promise.all(promises).then(function(pages){
            var allText=pages.join("\n");
            var lines=allText.split("\n").map(function(l){return l.trim()}).filter(function(l){return l});
            var nomeCliente="";
            for(var i=0;i<lines.length;i++){
              if(lines[i].indexOf("Cliente:")>=0){
                nomeCliente=lines[i].replace("Cliente:","").trim();
                if(!nomeCliente&&lines[i+1])nomeCliente=lines[i+1].trim();
                break;
              }
            }
            if(!nomeCliente){callback(false,"nome não encontrado no PDF");return}
            var patBruto=0;
            for(var i=0;i<Math.min(lines.length,50);i++){
              if(lines[i].match(/^Patrim/i)&&!lines[i].match(/por|acumulad|evol/i)){
                for(var j=i;j<Math.min(i+3,lines.length);j++){
                  var rm=lines[j].match(/R\$\s*([\d.,]+)/);
                  if(rm){patBruto=parseFloat(rm[1].replace(/\./g,"").replace(",","."))||0;if(patBruto>1000)break}
                }
                if(patBruto>1000)break;
              }
            }
            var instData={};var inCustodiante=false;
            for(var i=0;i<lines.length;i++){
              if(lines[i].match(/custodiante/i))inCustodiante=true;
              if(inCustodiante&&lines[i]==="Total"&&lines[i+1]&&lines[i+1].match(/R\$/))break;
              if(inCustodiante&&lines[i].match(/R\$/)&&i>0){
                var instName=lines[i-1];
                if(instName&&!instName.match(/R\$|%|Total|Corretora|carteira|Rent/)){
                  var valM=lines[i].match(/R\$\s*([\d.,]+)/);
                  if(valM){
                    var val=parseFloat(valM[1].replace(/\./g,"").replace(",","."))||0;
                    if(val>100){
                      var sn=instName;
                      if(sn.match(/xp investimentos/i))sn="Rico";
                      else if(sn.match(/banco safra|j\.\s*safra/i))sn="Safra";
                      else if(sn.match(/sproutfi/i))sn="Vest";
                      else if(sn.match(/rico/i))sn="Rico";
                      else if(sn.match(/toro/i))sn="Toro Investimentos";
                      else if(sn.match(/santander/i))sn="Banco Santander (Brasil)";
                      else if(sn.match(/outros/i))sn="Outros";
                      instData[sn]=val;
                    }
                  }
                }
              }
            }
            var ativos=[];
            Object.entries(instData).forEach(function(e){
              ativos.push({tk:"Portfolio "+e[0],nm:"Portfolio "+e[0],tp:"fundo_rf",qtd:1,pm:e[1],pa:e[1],inst:e[0],venc:"",posR:e[1]});
            });
            if(ativos.length===0&&patBruto>0){
              ativos.push({tk:"Portfolio Total",nm:"Portfolio Total",tp:"fundo_rf",qtd:1,pm:patBruto,pa:patBruto,inst:"Diversos",venc:"",posR:patBruto});
            }
            var existing=d.cl.find(function(c){return c.nome.toLowerCase()===nomeCliente.toLowerCase()});
            var newId=existing?existing.id:("c"+Date.now()+Math.random().toString(36).substr(2,5));
            var patReal=patBruto>0?patBruto:Object.values(instData).reduce(function(a,v){return a+v},0);
            var newC={
              id:newId,nome:nomeCliente,email:existing?existing.email:"",tel:existing?existing.tel:"",risco:existing?existing.risco:"Moderado",
              sv:existing?existing.sv:["patrimonio"],pat:patReal,patGorila:patReal,
              rend:0,notas:existing?existing.notas:("Importado em massa em "+new Date().toLocaleDateString("pt-BR")),
              txGestao:existing?existing.txGestao:0.80,feeFixo:existing?existing.feeFixo:0,feeBase:existing?existing.feeBase:"",
              _ativosImport:existing&&existing._ativosImport&&existing._ativosImport.length>ativos.length?existing._ativosImport:ativos,
              _ativosTs:Date.now()
            };
            dp({t:"RC",p:newC});
            callback(true,nomeCliente,patReal);
          }).catch(function(err){callback(false,"erro PDF: "+err.message)});
        }).catch(function(err){callback(false,"erro PDF: "+err.message)});
      };
      reader.readAsArrayBuffer(file);
      return;
    }
    
    /* Excel processing */
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:"array",raw:true});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:"",raw:true});
        if(aoa.length<10){callback(false,"arquivo curto");return}
        var nomeCliente=String(aoa[0][1]||"").trim();
        if(!nomeCliente){callback(false,"nome não encontrado");return}
        var patBruto=0;
        for(var i=0;i<Math.min(aoa.length,10);i++){
          var label=String(aoa[i][0]||"").toLowerCase();
          if(label.indexOf("patrim")>=0){
            var rawVal=aoa[i][1];
            patBruto=typeof rawVal==="number"?rawVal:parseFloat(String(rawVal||"0").replace(/[R$.\s]/g,"").replace(",","."))||0;
            break;
          }
        }
        var headerRow=-1;
        for(var i=0;i<Math.min(aoa.length,40);i++){
          var joined=(aoa[i]||[]).join("|").toLowerCase();
          if(joined.indexOf("corretora")>=0&&joined.indexOf("ativo")>=0){headerRow=i;break}
        }
        var ativos=[];
        var pv=function(v){if(typeof v==="number")return v;var s=String(v||"0").trim().replace(/R\$\s*/g,"").replace(/%/g,"").replace(/\s/g,"");if(s.match(/,\d{3}\./)){s=s.replace(/,/g,"")}else if(s.match(/\.\d{3},/)){s=s.replace(/\./g,"").replace(",",".")}else if(s.match(/,\d{1,2}$/)){s=s.replace(",",".")}return parseFloat(s)||0};
        if(headerRow>=0){
          var hdr=(aoa[headerRow]||[]).map(function(h){return String(h).toLowerCase().trim()});
          var ci=function(pats){for(var p=0;p<pats.length;p++){for(var j=0;j<hdr.length;j++){if(hdr[j].indexOf(pats[p])>=0)return j}}return-1};
          var iC=ci(["corretora"]),iA=ci(["ativo"]),iSC=ci(["sub-classe","sub classe","subclasse"]);
          var iCl=-1;for(var hi=0;hi<hdr.length;hi++){if(hdr[hi]==="classe"){iCl=hi;break}}
          if(iCl<0)iCl=ci(["classe"]);
          if(iCl===iSC){for(var hi=0;hi<hdr.length;hi++){if(hdr[hi]==="classe"&&hi!==iSC){iCl=hi;break}}}
          var iQ=ci(["quantidade"]),iP=ci(["posição","posicao"]),iPr=ci(["preço (r","cotação"]),iPM=ci(["preço médio","preco medio"]),iV=ci(["vencimento"]);
          for(var i=headerRow+1;i<aoa.length;i++){
            var r=aoa[i];if(!r||r.length<4)continue;
            var ativo=String(r[iA]||"").trim();if(!ativo||ativo.toLowerCase()==="total")continue;
            var corr=iC>=0?String(r[iC]||"").trim():"";
            var subcl=iSC>=0?String(r[iSC]||"").trim():"";
            var classe=iCl>=0?String(r[iCl]||"").trim():"";
            var qtd=pv(r[iQ]);var pos=pv(r[iP]);var preco=iPr>=0?pv(r[iPr]):0;var pm=iPM>=0?pv(r[iPM]):0;
            if(pos<=0)continue;
            if(preco===0&&qtd>0&&pos>0)preco=pos/qtd;
            if(pm===0&&preco>0)pm=preco;
            var venc=iV>=0?String(r[iV]||"").trim():"";
            var cl=(classe+" "+subcl+" "+ativo).toLowerCase();
            var tp="acao";
            var reitTks="O,NNN,STAG,AMT,PLD,SPG,PSA,DLR,CCI,EQIX,AVB,EQR,IRM,WPC,VICI,WELL,ARE,MPW,KIM,REG,FRT,BXP,SLG,HPP,PEAK,DOC,OHI,LTC,NHI,AGNC,NLY,STWD,BXMT,LADR,ABR,ARI,RWT,STORE,EPR,GTY,ADC,IIPR,SBRA,HR,VER,GOOD,LAND,GLPI";
            var etfTks="SPY,VOO,VTI,QQQ,IVV,VGT,VNQ,SCHH,RQI,VT,VXUS,VEA,VWO,BND,AGG,TLT,IEF,SHY,TFLO,BOXX,QLTA,VTWO,IWM,DIA,RSP,ARKK,XLK,XLF,XLE,XLV,XLI,XLP,XLY,XLU,XLC,XLRE,XLB,VIG,VYM,SCHD,HDV,DVY,JEPI,JEPQ,NOBL,GLD,IAU,SLV,USO,TIP,VTIP,IBIT,BITO,EMB,HYG,LQD,MUB,IGSB,VCSH,VCIT,VCLT,BSV,BIV,BLV,SGOV,SHV,MINT,FLOT,PFF,SPHD,SPLV";
            var tkUp=ativo.toUpperCase();
            var isReit=reitTks.split(",").indexOf(tkUp)>=0||cl.match(/reit/);
            var isEtf=etfTks.split(",").indexOf(tkUp)>=0||cl.match(/etf\b/);
            if(cl.match(/exterior/)&&isReit)tp="reit";
            else if(cl.match(/exterior/)&&isEtf)tp="etf_int";
            else if(cl.match(/exterior/))tp="stock_us";
            else if(cl.match(/cdb/))tp="cdb";else if(cl.match(/lci/))tp="lci";else if(cl.match(/lca/))tp="lca";
            else if(cl.match(/cri(?!pto)/))tp="cri";else if(cl.match(/cra(?!ft)/))tp="cra";
            else if(cl.match(/ntnb|ntn-b|tesouro/))tp="tesouro";
            else if(cl.match(/debenture|debênture/))tp=cl.match(/incent/)?"debi":"deb";
            else if(cl.match(/infra.*fund|fi-infra|fund.*infra/))tp="fundo_infra";
            else if(cl.match(/multimercado|multi/))tp="fundo_mm";
            else if(cl.match(/(fundos|fundo).*(renda fixa|rf)|rf.*cred/))tp="fundo_rf";
            else if(cl.match(/indexado|prefixado/)&&cl.match(/renda fixa/))tp="cdb";

        setTimeout(function(){sGMsg("");os(newC)},2500);

    };
    reader.readAsArrayBuffer(file);
  };

      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>

                if(!patReal && c._ativosImport && c._ativosImport.length>0){
                  patReal=c._ativosImport.reduce(function(s,at){return s+(at.posR||at.qtd*at.pa||0)},0);
                }
                /* Rentabilidade — busca robusta no _gorilaRent.periods */
                var rend=null, rendLabel="MÊS", rendEstimado=false;
                if(c._gorilaRent && c._gorilaRent.periods && c._gorilaRent.periods.length>0){
                  var periods=c._gorilaRent.periods;
                  /* Busca períodos mensais em várias variações de label */
                  var testeMes=function(p){
                    var s=String(p.p||"").toLowerCase().trim();
                    return s.indexOf("último mês")>=0 || s.indexOf("ultimo mes")>=0
                      || s.indexOf("ultimo mês")>=0 || s.indexOf("último mes")>=0
                      || s==="1m" || s==="1 m" || s==="mês" || s==="mes"
                      || s.indexOf("1 mês")>=0 || s.indexOf("1 mes")>=0
                      || s.indexOf("mtd")>=0 || s.indexOf("mês atual")>=0
                      || s.indexOf("mes atual")>=0 || s.indexOf("no mês")>=0
                      || s.indexOf("no mes")>=0;
                  };
                  var pMes=periods.find(testeMes);
                  if(pMes && typeof pMes.rent==="number"){
                    rend=pMes.rent*100;
                  }else{
                    /* Fallback 1: busca período mais curto disponível (3m, 6m etc.) */
                    var menorPeriodo=null, menorMeses=999;
                    periods.forEach(function(p){
                      var s=String(p.p||"").toLowerCase();
                      var m=s.match(/(\d+)\s*(m|mês|mes|mes\w+)/);
                      if(m){
                        var n=+m[1];
                        if(n<menorMeses && typeof p.rent==="number"){
                          menorMeses=n;
                          menorPeriodo=p;
                        }
                      }
                    });
                    if(menorPeriodo){
                      /* Aproxima para mensal: rent_mensal ≈ (1+rent_total)^(1/n) - 1 */
                      var rentAcum=menorPeriodo.rent;
                      rend=(Math.pow(1+rentAcum,1/menorMeses)-1)*100;
                      rendLabel="MÊS¹"; /* marca como estimado */
                      rendEstimado=true;
                    }
                  }
                }
                if(rend===null)rend=c.rend||0;
                var rendCor=rend>0?T.green:rend<0?T.red:T.t3;
                var rendSinal=rend>0?"+":"";
                var tooltipRend=rendEstimado?"Estimada a partir de período maior (último mês não disponível no relatório Gorila)":"Rentabilidade do último mês (Gorila)";
                return (<>
                  <div><div style={{fontSize:10,color:T.t3,fontWeight:600}}>PATRIMÔNIO</div><div style={{fontSize:18,fontWeight:800,color:T.gold,fontFamily:"'JetBrains Mono'",marginTop:2}}>{fm(patReal)}</div></div>
                  <div style={{textAlign:"right"}} title={tooltipRend}><div style={{fontSize:10,color:T.t3,fontWeight:600}}>REND. {rendLabel}</div><div style={{fontSize:16,fontWeight:700,color:rendCor,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{rendSinal}{rend.toFixed(2)}%</div></div>
                </>);
              })() : (<><div><div style={{fontSize:10,color:T.t3,fontWeight:600}}>FEE MENSAL</div><div style={{fontSize:18,fontWeight:800,color:T.cyan,fontFamily:"'JetBrains Mono'",marginTop:2}}>{fm(c.feeFixo)}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:10,color:T.t3,fontWeight:600}}>BASE IPCA</div><div style={{fontSize:14,fontWeight:600,color:T.t2,marginTop:2}}>{c.feeBase||"—"}</div></div></>)}
            </div>
            <div style={{display:"flex",gap:5}}>{c.sv.map(s=><Bg key={s} c={SC[s]}>{SL[s]}</Bg>)}</div>
          </Cd>
        ))}
      </div>
      <Mo open={showAdd} onClose={()=>sShowAdd(false)} title="✦ Novo Cliente">
        <NewClientForm onSave={c=>{dp({t:"AC",p:c});sShowAdd(false)}} onClose={()=>sShowAdd(false)}/>
      </Mo>
    </div>
  );
}

      /* ===== EVOLUÇÃO MENSAL DA RENDA PASSIVA — gráfico SVG simplificado ===== */
      /* Mostra barras mensais empilhadas BR + Exterior, valor = totalAnual/12 constante.

      if(totalAnualGeral>0){
        body+='<div class="section-title"><span class="ic">📈</span>Evolução Mensal da Renda Passiva</div>';
        var MN_CURTO_PROV=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
        var hojeProv=new Date();
        var parseData=function(s){
          if(!s)return null;
          var d=new Date(s);
          if(isNaN(d.getTime()))return null;
          var y=d.getFullYear();
          if(y<2000||y>2100)return null;
          return d;
        };
        /* Período do gráfico: desde o início do relacionamento OU últimos 12 meses */
        var dtGraphIni=parseData(c.dtCaptacao);
        var dtGraphFim=new Date(hojeProv.getFullYear(),hojeProv.getMonth(),1);
        if(!dtGraphIni){
          dtGraphIni=new Date(dtGraphFim.getFullYear(),dtGraphFim.getMonth()-11,1);
        }
        dtGraphIni=new Date(dtGraphIni.getFullYear(),dtGraphIni.getMonth(),1);
        var diffMeses=function(a,b){return(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())};
        var mesesTotal=diffMeses(dtGraphIni,dtGraphFim)+1;
        if(mesesTotal<1||mesesTotal>60)mesesTotal=12;
        /* Monta série mensal — valor constante (média mensal projetada) */
        var mensalBR=totalAnualBR/12;
        var mensalEXT=totalAnualEXT/12;
        var mensalTotal=mensalBR+mensalEXT;
        var serieMensal=[];
        for(var mi=0;mi<mesesTotal;mi++){
          var d=new Date(dtGraphIni.getFullYear(),dtGraphIni.getMonth()+mi,1);
          serieMensal.push({data:d,mes:d.getMonth()+1,ano:d.getFullYear(),br:mensalBR,ext:mensalEXT,total:mensalTotal});
        }
        /* Render SVG com escala limpa */
        var maxVal=mensalTotal*1.2||1; /* headroom de 20% */
        /* Escala "nice" — arredonda pra múltiplo de 10/100/1000 */
        var niceMax=function(v){
          if(v<=0)return 1;
          var ordem=Math.pow(10,Math.floor(Math.log10(v)));
          var raz=v/ordem;
          var nice=raz<=1?1:raz<=2?2:raz<=5?5:10;
          return nice*ordem;
        };
        maxVal=niceMax(maxVal);
        var svgW=720,svgH=240,padL=64,padR=18,padT=16,padB=52;
        var chartW=svgW-padL-padR, chartH=svgH-padT-padB;
        var bw=chartW/mesesTotal;
        var stepLabel=Math.max(1,Math.ceil(mesesTotal/12));
        var svg='<svg viewBox="0 0 '+svgW+' '+svgH+'" style="width:100%;height:auto;font-family:\'Outfit\',sans-serif" xmlns="http://www.w3.org/2000/svg">';
        svg+='<defs>'
          +'<linearGradient id="grdBR" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2DD4A0" stop-opacity=".95"/><stop offset="100%" stop-color="#2DD4A0" stop-opacity=".65"/></linearGradient>'
          +'<linearGradient id="grdEXT" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#A78BFA" stop-opacity=".95"/><stop offset="100%" stop-color="#A78BFA" stop-opacity=".65"/></linearGradient>'
          +'</defs>';
        /* Grid + labels Y (4 linhas horizontais) */
        for(var gi=0;gi<=4;gi++){
          var gy=padT+chartH*gi/4;
          svg+='<line x1="'+padL+'" y1="'+gy+'" x2="'+(svgW-padR)+'" y2="'+gy+'" stroke="rgba(255,255,255,0.05)" stroke-dasharray="2,3"/>';
          var vY=maxVal*(4-gi)/4;
          var lblY=vY>=1000?"R$ "+(vY/1000).toFixed(vY>=10000?0:1)+"k":"R$ "+vY.toFixed(0);
          svg+='<text x="'+(padL-8)+'" y="'+(gy+4)+'" text-anchor="end" fill="#6B7489" font-size="9" font-family="\'JetBrains Mono\',monospace">'+lblY+'</text>';
        }
        /* Linha média */
        if(mensalTotal>0){
          var mediaY=padT+chartH-(mensalTotal/maxVal)*chartH;
          svg+='<line x1="'+padL+'" y1="'+mediaY+'" x2="'+(svgW-padR)+'" y2="'+mediaY+'" stroke="#D4A328" stroke-width="1" stroke-dasharray="4,3" opacity=".7"/>';
          svg+='<text x="'+(svgW-padR-4)+'" y="'+(mediaY-5)+'" text-anchor="end" fill="#D4A328" font-size="9" font-weight="700">Média '+fm(mensalTotal)+'</text>';

          var hEXT=(m.ext/maxVal)*chartH;
          var yBR=padT+chartH-hBR;
          var yEXT=yBR-hEXT;

          if(hEXT>0)svg+='<rect x="'+x+'" y="'+yEXT+'" width="'+w+'" height="'+hEXT+'" fill="url(#grdEXT)" rx="2"/>';

      }

      /* ===== RENTABILIDADE POR INSTITUIÇÃO — ranking ===== */
      var byInst={};
      enr.forEach(function(a){

      /* ===== MÉTRICAS ESTRATÉGICAS — Currency + Yield médio ===== */

      if(pctBRL>0)body+='<div style="width:'+pctBRL+'%;background:linear-gradient(90deg,#2DD4A0,#34D399);opacity:.9"></div>';
      if(pctUSD>0)body+='<div style="width:'+pctUSD+'%;background:linear-gradient(90deg,#A78BFA,#8B5CF6);opacity:.9"></div>';
      body+='</div>';
      body+='<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px">'
        +'<div style="display:flex;align-items:center;gap:6px"><div style="width:8px;height:8px;border-radius:3px;background:#2DD4A0"></div><span style="color:#C8D0DE;font-weight:600">Brasil (BRL)</span></div>'
        +'<div style="display:flex;gap:10px;align-items:center"><span style="color:#8B94A7;font-size:10px">'+pctBRL.toFixed(1)+'%</span><span style="color:#2DD4A0;font-family:\'JetBrains Mono\',monospace;font-weight:700">'+fm(valBRL)+'</span></div>'

      body+='<div style="display:flex;justify-content:space-between;padding:6px 0;font-size:12px">'

      /* Interpretação da exposição */

      body+='<div style="font-size:10px;color:#8B94A7;margin-top:10px;line-height:1.5;font-style:italic">'+txtExp+'</div>';
      body+='</div>';
      body+='</div>';

      /* ===== COMPOSIÇÃO DETALHADA — ordenada por Macro-Classe > Subclasse > Valor ===== */

      body+='<div class="section-title"><span class="ic">📋</span>Composição Detalhada</div>';
      body+='<table><tr><th>Ativo</th><th>Qtd</th><th style="text-align:right">PM</th><th style="text-align:right">Atual</th><th style="text-align:right">Valor</th><th style="text-align:right">Rent.</th></tr>';
      MACRO_ORDEM.forEach(function(mk){

        body+='<tr style="background:rgba(212,163,40,0.04);border-top:1px solid rgba(212,163,40,0.2)"><td colspan="4" style="padding:10px 12px;font-size:11px;font-weight:800;color:'+macroInfo.c+';letter-spacing:.8px;text-transform:uppercase">● '+macroInfo.l+'</td><td colspan="2" style="padding:10px 12px;text-align:right;font-family:\'JetBrains Mono\',monospace;font-weight:800;color:'+macroInfo.c+';font-size:11px">'+fm(macroTotal)+' · '+macroPct.toFixed(1)+'%</td></tr>';

        var subEntries=Object.entries(grouped[mk]._subs).sort(function(a,b){return b[1]._total-a[1]._total});
        subEntries.forEach(function(se){
          var subLabel=se[0];

          body+='<tr style="background:rgba(255,255,255,0.015)"><td colspan="6" style="padding:6px 12px;font-size:9px;font-weight:700;color:#8B94A7;letter-spacing:1px;text-transform:uppercase">↳ '+subLabel+' <span style="color:#6B7489;font-weight:500;margin-left:8px">'+subData.ativos.length+' '+(subData.ativos.length===1?"ativo":"ativos")+' · '+fm(subTotal)+'</span></td></tr>';

              +'<td style="font-family:\'JetBrains Mono\',monospace">'+a.qtd+'</td>'

        +'<td style="text-align:right;font-family:\'JetBrains Mono\',monospace;color:'+(ganhoV>=0?"#2DD4A0":"#EF6461")+'">'+(ganhoV>=0?"+":"")+rentPct+'%</td></tr>';
      body+='</table>';
    }else if(isDarkReport && isFin){

    /* ====== RELATÓRIOS LIGHT (IRPF / APORTE / PLANEJAMENTO) ====== */
    if(tipo==="irpf"){

  const importVista=function(file){
    if(!file)return;
    const isExcel=file.name.match(/\.(xlsx|xls)$/i);
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        var rows=[];
        if(isExcel){
          const wb=XLSX.read(e.target.result,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          rows=XLSX.utils.sheet_to_json(ws,{defval:""});
        }else{
          const text=e.target.result;
          const lines=text.split(/\r?\n/).filter(function(l){return l.trim()});
          if(lines.length<2)return;
          const sep=lines[0].includes(";")?";":lines[0].includes("\t")?"\t":",";
          const headers=lines[0].split(sep).map(function(x){return x.replace(/"/g,"").trim()});
          rows=lines.slice(1).map(function(line){
            const vals=line.split(sep).map(function(v){return v.replace(/"/g,"").trim()});
            const obj={};headers.forEach(function(h,i){obj[h]=vals[i]||""});return obj;
          });
        }
        if(rows.length===0)return;
        var keys=Object.keys(rows[0]);

        /* Detect Meu Vista columns */
        var catKey=keys.find(function(k){return k.toLowerCase().match(/categ|descri|nome|item/)}) || keys[0];
        /* Meu Vista uses: Orçado, Realizado, Lançamentos, etc. Prefer "Realizado" as actual value */
        var valKey=keys.find(function(k){return k.toLowerCase().match(/realizado/)});
        if(!valKey) valKey=keys.find(function(k){return k.toLowerCase().match(/valor|total|mont/)});
        if(!valKey) valKey=keys[1];
        /* Also grab Orçado for budget comparison */
        var orcKey=keys.find(function(k){return k.toLowerCase().match(/orçado|orcado|budget|previsto/)});

        var parseVal=function(v){
          var s=String(v||"0").replace(/[R$\s]/g,"").replace(/\./g,"").replace(",",".");
          return parseFloat(s)||0;
        };

        var newRec=[];var newDesp=[];
        var despCores=[T.red,T.orange,T.cyan,T.green,T.purple,T.goldL,T.t2,"#F472B6","#6EE7B7","#93C5FD"];

        rows.forEach(function(r,i){
          var cat=String(r[catKey]||"").trim();
          var val=parseVal(r[valKey]);
          var orc=orcKey?parseVal(r[orcKey]):0;
          if(!cat)return;

          /* Meu Vista pattern: "Receita xxx" = receita (green), everything else = despesa (red) */
          var catLow=cat.toLowerCase();
          var isReceita=catLow.match(/^receita|^renda|^salár|^salario|^freelan|^bonus|^prêmio|^premio|^13|^férias|^ferias|^alugu.*receb|^reembolso|^restitu/);

          /* Also check if the row name explicitly says "Receita" anywhere */
          if(!isReceita && catLow.indexOf("receita")>=0) isReceita=true;

          /* Skip rows with zero in both realizado and orçado */
          if(val===0 && orc===0) return;

          /* Use realizado if available, otherwise orçado */
          var valor=val>0?val:orc;
          if(valor===0) return;

          if(isReceita){
            newRec.push({id:Date.now()+i,cat:cat,valor:Math.abs(valor)});
          }else{
            newDesp.push({id:Date.now()+i+1000,cat:cat,valor:Math.abs(valor),cor:despCores[newDesp.length%despCores.length]});
          }
        });

        /* Apply imported data */
        if(newRec.length>0) sReceitas(newRec);
        if(newDesp.length>0) sDespesas(newDesp);

        /* If nothing was classified as receita, try fallback: positive = receita, all = despesa */
        if(newRec.length===0 && newDesp.length===0){
          rows.forEach(function(r,i){
            var cat=String(r[catKey]||"Item").trim();
            var val=parseVal(r[valKey]);
            if(val>0){
              newDesp.push({id:Date.now()+i,cat:cat,valor:val,cor:despCores[i%despCores.length]});
            }
          });
          if(newDesp.length>0) sDespesas(newDesp);
        }
      }catch(err){console.error("Erro importação:",err)}
    };
    if(isExcel){reader.readAsArrayBuffer(file)}else{reader.readAsText(file,"UTF-8")}
  };

        var projMensal=projAnual/12;

        /* Concentração: 1 ativo > 25% */

            return (

                    <div>Nenhuma indicação registrada ainda</div>

                      </div>
                      <div style={{padding:12,background:T.w3,borderRadius:10,border:"1px solid "+T.bdrL}}>
                        <div style={{fontSize:8,color:T.t3,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>⏳ Em Andamento</div>
                        <div style={{fontSize:20,fontWeight:800,color:T.cyan,fontFamily:"'JetBrains Mono'"}}>{emAndamento.length}</div>
                        <div style={{fontSize:9,color:T.t3,marginTop:2}}>no funil</div>

          {/* Vencimento Alerts */}
          {(function(){

                {vencidos.map(function(a){return (
                  <div key={a.tk} style={{padding:8,background:T.redD,borderRadius:8,marginBottom:4,fontSize:11,fontWeight:600,color:T.red,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span>⛔ {a.tk} ({TIPOS[a.tp]?TIPOS[a.tp].l:a.tp}) — VENCIDO em {a.venc.split("-").reverse().join("/")}</span>
                    <span>{fm(a.qtd*a.pa)}</span>

                {vencProximos.map(function(a){

                  return (
                    <div key={a.tk} style={{padding:8,background:dias<=30?T.redD:T.orangeD,borderRadius:8,marginBottom:4,fontSize:11,fontWeight:600,color:dias<=30?T.red:T.orange,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:4}}>
                      <span>{dias<=30?"⚠️":"⏰"} {a.tk} ({TIPOS[a.tp]?TIPOS[a.tp].l:a.tp}{a.inst?" • "+a.inst:""}) vence em {a.venc.split("-").reverse().join("/")} ({dias}d)</span>
                      <span style={{fontFamily:"'JetBrains Mono'"}}>{fm(a.qtd*a.pa)}</span>
                    </div>
                  );
                })}
              </Cd>
            );

          {/* Objectives Summary - for Financial clients */}

            var objColors={emergencia:T.green,aposentadoria:T.cyan,casa:T.gold,viagem:T.purple,carro:T.orange,educacao:T.cyan,filhos:T.purple,casamento:T.gold,negocio:T.red,patrimonio:T.gold,curto_prazo:T.orange,longo_prazo:T.cyan,outros:T.t2};
            var byObj={};var semObj=0;

              if(a.obj){

                  </div>
                )}
              </Cd>

          {/* POSIÇÕES */}
          {cTab==="pos" && (
            <Cd style={{padding:16}} hov={false}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:6}}>
                <h4 style={{margin:0,fontSize:13,fontWeight:700,color:T.gold}}>Ativos ({ativos.length})</h4>
                <div style={{display:"flex",gap:4,alignItems:"center"}}>
                  {corrMsg && <span style={{fontSize:9,fontWeight:600,color:corrMsg.indexOf("✅")>=0?T.green:T.orange}}>{corrMsg}</span>}
                  <input ref={corrFileRef} type="file" accept=".csv,.txt,.tsv,.xlsx,.xls,.pdf" onChange={function(e){if(e.target.files[0])importCorretora(e.target.files[0]);e.target.value=""}} style={{display:"none"}}/>
                  <Bt v="secondary" onClick={function(){corrFileRef.current&&corrFileRef.current.click()}} style={{fontSize:9,padding:"4px 8px"}}>📥 Gorila</Bt>
                  <Bt v="secondary" onClick={function(){sShowAddAt(true)}} style={{fontSize:9,padding:"4px 8px"}}>＋ Ativo</Bt>
                </div>
              </div>
              {/* Institution filter */}
              {(function(){var insts=["todas"];ativos.forEach(function(a){var inst=a.inst||"Sem inst.";if(insts.indexOf(inst)<0)insts.push(inst)});return insts.length>2?(
                <div style={{display:"flex",gap:3,marginBottom:10,flexWrap:"wrap"}}>
                  {insts.map(function(inst){return <button key={inst} onClick={function(){sFiltInst(inst)}} style={{padding:"4px 10px",borderRadius:8,fontSize:9,fontWeight:600,cursor:"pointer",border:filtInst===inst?"1.5px solid "+T.cyan:"1px solid rgba(255,255,255,0.04)",background:filtInst===inst?T.cyanD:"transparent",color:filtInst===inst?T.cyan:T.t3}}>{inst==="todas"?"Todas":inst}</button>})}
                </div>
              ):null})()}
              {(function(){
                /* Filtra por instituição */
                var filtAt=enr.filter(function(a){return filtInst==="todas"||(a.inst||"Sem inst.")===filtInst});
                /* Mapa tipo → macro categoria */
                var TP_TO_MACRO={
                  cdb:"rf",lci:"rf",lca:"rf",lc:"rf",cri:"rf",cra:"rf",tesouro:"rf",deb:"rf",debi:"rf",fundo_rf:"rf",fundo_mm:"rf",fundo_camb:"rf",coe:"rf",poupanca:"rf",
                  acao:"rv",fii:"rv",fiagro:"rv",fip:"rv",etf_br:"rv",bdr:"rv",fundo_acoes:"rv",ouro:"rv",fundo_infra:"rv",
                  stock_us:"ext",etf_int:"ext",reit:"ext",
                  caixa:"caixa",cripto:"caixa",
                  prev:"prev"
                };
                /* Reclassificação on-the-fly */
                /* FI-Infra (foco infraestrutura, isentos) */
                var FI_INFRA_TKS=["IFRA11","IFRI11","KDIF11","BCIA11","BIDB11","BODB11","JURO11","CDII11","CPTI11","BDIF11","XPID11","BIPD11","XPIE11","NUIF11","SNID11","SPVI11","KIVO11","BIDP11"];
                /* FIAGRO (foco agronegócio, regras de FII) */
                var FIAGRO_TKS=["RZAG11","KNCA11","RURA11","XPCA11","CPTS11","FGAA11","RZAT11","AAZQ11","NCRA11","RZAK11","CPTR11","VGIA11","BBGO11"];
                /* UNITS (Ações com sufixo 11 — NÃO são FII) */
                var UNITS_TKS=["KLBN11","TAEE11","BPAC11","SANB11","ENMT11","PINE11","ENGI11","RAPT11","VVAR11","JPSA11","CASH11","LVTC11","WIZS11"];
                /* ETFs B3 com sufixo 11 (renda fixa, índices, etc) — NÃO são FII */
                var ETF_BR_11_TKS=["IB5M11","B5MB11","IMAB11","IRFM11","FIXA11","B5P211","BPEK11","SMAL11","BOVA11","BOVV11","IVVB11","DIVO11","MATB11","SMAC11","BOVB11","XBOV11","ECOO11","HASH11","ETHE11","BITH11","DEFI11","WEB311","CRPT11","NDIV11","SPXI11","XINA11","ASIA11","NASD11","KFRO11","AGRO11","ESGE11","FIND11","GOLD11","HOLD11","MILE11","NFTS11","QBTC11","XFIX11","WEEK11","TASA11"];
                /* === REITs americanos (curado, principais por categoria) === */
                var REIT_TKS=[

                  /* Retail / Mall */
                  "SPG","KIM","REG","FRT","BRX","KRG","MAC","WPG","SKT","TCO","ROIC","CDR","CBL","PEI",
                  /* Office */
                  "BXP","SLG","HPP","VNO","KRC","CUZ","DEI","BDN","PGRE","ARE","PSB","WRE","OPI","JBGS","CIO",
                  /* Self Storage */
                  "PSA","EXR","CUBE","LSI","NSA","SAFE",
                  /* Hotel / Lodging */
                  "HST","RHP","APLE","PEB","DRH","SHO","XHR","BHR","INN","CHH","PK","RLJ","SVC",
                  /* Mortgage REITs */
                  "AGNC","NLY","STWD","BXMT","RWT","ABR","ARI","LADR","NRZ","CIM","TWO","MFA","NYMT","ORC","WMC","HASI",
                  /* Specialty / Other */
                  "VICI","MGP","IRM","WY","RYN","PCH","CTT","LAND","FPI","GOOD","UMH","FOR","SAFT","STAR","DRH",

                  "IIPR","NLOP","NMRK","NWN",

                var ETF_TKS=[
                  /* Broad Market */

                  "BND","BNDX","AGG","TLT","TLH","IEF","IEI","SHY","BIL","SGOV","SHV","MINT","FLOT","TFLO","BSV","BIV","BLV","VCSH","VCIT","VCLT","LQD","HYG","JNK","EMB","TIP","VTIP","SCHO","SCHR","SCHZ","MUB","MUNI","HYMB","ANGL","FALN","BKLN","SRLN","HYLB","SJNK","USHY","SPHY","HYS",
                  /* International */
                  "VEA","IEFA","EFA","VWO","IEMG","EEM","EWZ","INDA","FXI","MCHI","EWJ","EWG","EWU","EWY","EWT","EZA","ARGT","TUR","RSX",

                  /* REIT ETFs */

                  /* Dividend / Income */
                  "VIG","VYM","SCHD","HDV","DVY","NOBL","DGRO","SPYD","SPHD","SPLV","JEPI","JEPQ","DIVO","QYLD","XYLD","RYLD","NUSI","SDIV","DLN",
                  /* Cripto ETFs */
                  "IBIT","FBTC","BITO","ETHE","ETHA","FETH","BTCO","ARKB","BITB","BRRR","HODL","ETH","BITC","BITS",

                  /* ESG / Thematic */
                  "ESGV","SUSL","ESGU","DSI","FCNTX","DRIV","ICLN","TAN","FAN","PBW","LIT","REMX","BLOK","CIBR","HACK","ROBO","BOTZ","FINX","KOMP","KWEB",
                  /* Outros amplamente conhecidos */
                  "DIA","IWM","IWB","IWD","IWF","IWN","IWO","IWP","IWR","IWS","IWV","RSP","MDY","OEF","SCHE","VTWO","BOXX","QLTA","PFF","PGX","PGF","PFFD","SDIV"
                ];
                filtAt=filtAt.map(function(a){
                  var nv={...a};
                  var tkUp=String(a.tk||"").toUpperCase();
                  var nmLow=String(a.nm||"").toLowerCase();
                  /* === RECLASSIFICAÇÃO BR === */
                  /* Fundos de investimento (CLASSE ÚNICA DE COTAS / Fundo de Investimento Financeiro) */
                  if((nv.tp==="acao"||!nv.tp||nv.tp==="outros")&&(nmLow.indexOf("classe única")>=0||nmLow.indexOf("classe unica")>=0||nmLow.indexOf("fundo de investimento")>=0||nmLow.indexOf("fic fim")>=0||nmLow.indexOf("fic frf")>=0||nmLow.indexOf("fic fia")>=0)){
                    /* Tenta inferir tipo do fundo */
                    if(nmLow.indexOf("multimercado")>=0||nmLow.indexOf("multistrateg")>=0||nmLow.indexOf("fim")>=0)nv.tp="fundo_mm";
                    else if(nmLow.indexOf("ações")>=0||nmLow.indexOf("acoes")>=0||nmLow.indexOf("equity")>=0||nmLow.indexOf("fia")>=0)nv.tp="fundo_acoes";
                    else if(nmLow.indexOf("cambial")>=0||nmLow.indexOf("dolar")>=0||nmLow.indexOf("dólar")>=0)nv.tp="fundo_camb";
                    else if(nmLow.indexOf("infra")>=0||nmLow.indexOf("fi-infra")>=0)nv.tp="fundo_infra";
                    else nv.tp="fundo_rf";  /* default: fundo RF (DI, crédito, etc) */
                  }
                  /* BDR: tickers terminados em 32/33/34/35 */
                  if((nv.tp==="acao"||!nv.tp)&&tkUp.match(/3[2-5]$/)){
                    nv.tp="bdr";
                  }
                  /* XXX11: permite sobrescrever mesmo se já tá como fii (caso Gorila tenha classificado errado) */
                  else if((nv.tp==="acao"||nv.tp==="fii"||!nv.tp)&&tkUp.match(/11$/)){
                    if(UNITS_TKS.indexOf(tkUp)>=0)nv.tp="acao";
                    else if(ETF_BR_11_TKS.indexOf(tkUp)>=0)nv.tp="etf_br";
                    else if(FIAGRO_TKS.indexOf(tkUp)>=0)nv.tp="fiagro";
                    else if(FI_INFRA_TKS.indexOf(tkUp)>=0)nv.tp="fundo_infra";
                    else if(nmLow.indexOf("agro")>=0||nmLow.indexOf("fiagro")>=0)nv.tp="fiagro";
                    else if(nmLow.indexOf("infra")>=0||nmLow.indexOf("fi-infra")>=0)nv.tp="fundo_infra";
                    else if(!nv.tp||nv.tp==="acao")nv.tp="fii";
                    /* Se já estava fii e não bateu em nada específico, mantém fii */
                  }
                  /* Poupança */
                  if((nv.tp==="acao"||!nv.tp||nv.tp==="outros")&&(tkUp==="POUPANCA"||tkUp==="POUPANÇA"||nmLow.indexOf("poupan")>=0)){
                    nv.tp="poupanca";
                  }
                  /* IFRA/IFRI/KDIF como FI-Infra */
                  if((nv.tp==="acao"||!nv.tp)&&(tkUp.match(/^IFR[AI]/)||tkUp.match(/^KDIF/))){
                    nv.tp="fundo_infra";
                  }
                  /* === RECLASSIFICAÇÃO EXTERIOR === */
                  /* Se já está marcado como ativo no exterior (stock_us/etf_int/reit), refina entre eles. 
                     Também trata 'outros' que ficou sem classificação mas é ticker exterior conhecido. */
                  var foiExterior=(nv.tp==="stock_us"||nv.tp==="etf_int"||nv.tp==="reit");
                  var podeSerExterior=foiExterior||((nv.tp==="acao"||nv.tp==="outros"||!nv.tp)&&!tkUp.match(/\d/));/* tickers BR têm número, US não */
                  if(podeSerExterior){
                    if(REIT_TKS.indexOf(tkUp)>=0)nv.tp="reit";
                    else if(ETF_TKS.indexOf(tkUp)>=0)nv.tp="etf_int";
                    else if(nmLow.indexOf("reit")>=0||nmLow.indexOf("real estate trust")>=0)nv.tp="reit";
                    else if(nmLow.indexOf("etf")>=0||nmLow.indexOf("ishares")>=0||nmLow.indexOf("vanguard")>=0||nmLow.indexOf("spdr")>=0)nv.tp="etf_int";
                    else if(foiExterior&&nv.tp!=="reit"&&nv.tp!=="etf_int")nv.tp="stock_us";/* default exterior é stock */
                  }
                  return nv;
                });
                var MACROS={
                  rf:{label:"💰 Renda Fixa",col:"#38BDF8",ord:1},

                };

                  var mk=TP_TO_MACRO[tp]||"outros";
                  if(!macros[mk])macros[mk]={key:mk,label:MACROS[mk].label,col:MACROS[mk].col,ord:MACROS[mk].ord,ativos:[],vA:0,cT:0,ganho:0,grupos:{}};
                  macros[mk].ativos.push(a);

                  macros[mk].cT+=a.cT;
                  macros[mk].ganho+=a.ganho;
                  if(!macros[mk].grupos[tp])macros[mk].grupos[tp]={tp:tp,label:TIPOS[tp]?TIPOS[tp].l:tp,ativos:[],vA:0,cT:0,ganho:0,col:a.col};
                  macros[mk].grupos[tp].ativos.push(a);
                  macros[mk].grupos[tp].vA+=a.vA;
                  macros[mk].grupos[tp].cT+=a.cT;
                  macros[mk].grupos[tp].ganho+=a.ganho;
                });
                var totalGeral=filtAt.reduce(function(s,a){return s+a.vA},0);
                /* Ordena macros por ord (definida) */
                var macroArr=Object.values(macros).sort(function(a,b){return a.ord-b.ord});
                /* Render: cada macro */
                return macroArr.map(function(macro,mi){
                  var pctMacro=totalGeral>0?(macro.vA/totalGeral*100):0;
                  var ganhoPctMacro=macro.cT>0?((macro.vA/macro.cT)-1)*100:0;
                  var isMacroCol=colMacros[macro.key]===true;
                  /* Sub-grupos por classe ordenados por valor desc */
                  var grpArr=Object.values(macro.grupos).sort(function(a,b){return b.vA-a.vA});

                            {[["PM","pm"],["ATUAL","pa"],["QTD","qtd"]].map(function(arr){var l=arr[0],k=arr[1];return(

                          </div>

      {tab==="aportes" && isPat && (function(){
        /* ===== REBALANCEAMENTO INTELIGENTE ===== */
        /* Mapa classe → macro (igual Carteira) */
        var TP2M={cdb:"rf",lci:"rf",lca:"rf",lc:"rf",cri:"rf",cra:"rf",tesouro:"rf",deb:"rf",debi:"rf",fundo_rf:"rf",fundo_mm:"rf",fundo_camb:"rf",coe:"rf",poupanca:"rf",acao:"rv",fii:"rv",fiagro:"rv",fip:"rv",etf_br:"rv",bdr:"rv",fundo_acoes:"rv",ouro:"rv",fundo_infra:"rv",stock_us:"ext",etf_int:"ext",reit:"ext",caixa:"caixa",cripto:"caixa",prev:"prev"};
        var MACRO_L={rf:"Renda Fixa",rv:"Renda Variável",ext:"Exterior",caixa:"Caixa & Cripto",prev:"Previdência",outros:"Outros"};
        var MACRO_C={rf:"#38BDF8",rv:"#2DD4A0",ext:"#A78BFA",caixa:"#FBBF24",prev:"#F472B6",outros:"#94A3B8"};
        
        /* Distribuição atual */
        var atualMacro={},atualSub={},atualAtivos={};
        enr.forEach(function(a){
          var mk=TP2M[a.tp]||"outros";
          atualMacro[mk]=(atualMacro[mk]||0)+a.vA;
          var subK=a.tp||"outros";
          atualSub[subK]=(atualSub[subK]||0)+a.vA;
          atualAtivos[a.tk]=a.vA;
        });
        var totalAtual=enr.reduce(function(s,a){return s+a.vA},0);
        
        /* Alvo salvo no cliente (default: carteira atual como ponto de partida) */
        var alvoSalvo=c.alvo||{};
        var alvoMacro=alvoSalvo.macro||{};
        var alvoSub=alvoSalvo.subclass||{};
        var alvoAtivos=alvoSalvo.ativos||{};
        
        /* Se alvo está vazio, inicializa com % atual */
        var alvoMacroNorm={};
        Object.keys(MACRO_L).forEach(function(k){
          if(k==="outros")return;
          if(alvoMacro[k]!==undefined)alvoMacroNorm[k]=alvoMacro[k];
          else alvoMacroNorm[k]=totalAtual>0?((atualMacro[k]||0)/totalAtual*100):0;
        });
        var totalAlvoMacro=Object.values(alvoMacroNorm).reduce(function(s,v){return s+v},0);
        
        /* Salvar alvo no cliente */
        var upAlvo=function(nivel,key,pct){
          var novo={...alvoSalvo};
          if(!novo[nivel])novo[nivel]={};
          novo[nivel]={...novo[nivel]};
          novo[nivel][key]=Math.max(0,pct);
          dp({t:"UC",p:{id:c.id,alvo:novo}});
        };
        
        /* ===== ALGORITMO DE SUGESTÃO ===== */
        /* Nível 1: quanto vai pra cada MACRO */
        var patFinal=totalAtual+apValor;
        var distMacro={};
        var deficitMacro={};
        Object.keys(alvoMacroNorm).forEach(function(mk){
          var alvoPct=alvoMacroNorm[mk]||0;
          var alvoReais=(patFinal*alvoPct/100);
          var atualReais=atualMacro[mk]||0;
          var deficit=Math.max(0,alvoReais-atualReais);/* quanto falta pra atingir alvo */
          deficitMacro[mk]=deficit;
        });
        var totalDeficitMacro=Object.values(deficitMacro).reduce(function(s,v){return s+v},0);
        /* Distribui proporcionalmente ao déficit */
        if(totalDeficitMacro>0){
          Object.keys(deficitMacro).forEach(function(mk){
            distMacro[mk]=apValor*(deficitMacro[mk]/totalDeficitMacro);
          });
        }else{
          /* Todas macros estão iguais ou acima do alvo — aloca proporcional ao alvo */
          Object.keys(alvoMacroNorm).forEach(function(mk){
            distMacro[mk]=totalAlvoMacro>0?(apValor*(alvoMacroNorm[mk]||0)/totalAlvoMacro):0;
          });
        }
        
        /* Nível 2: dentro de cada macro, distribui entre subclasses do usuário */
        var distSub={};
        Object.keys(distMacro).forEach(function(mk){
          var valorMacro=distMacro[mk];
          if(valorMacro<=0)return;
          /* Subclasses daquele macro com alvo definido */
          var subsM=Object.keys(TP2M).filter(function(tp){return TP2M[tp]===mk});
          /* Se tem alvo explícito por subclasse, usa. Senão, distribui pelas subclasses atuais na mesma proporção */
          var temAlvoExp=subsM.some(function(tp){return alvoSub[tp]!==undefined&&alvoSub[tp]>0});
          var alvoSubM={};
          var totalPctSubM=0;
          if(temAlvoExp){
            subsM.forEach(function(tp){
              alvoSubM[tp]=alvoSub[tp]||0;
              totalPctSubM+=alvoSubM[tp];
            });
          }else{
            /* Usa proporção atual */
            var totalAtualMacro=atualMacro[mk]||0;
            subsM.forEach(function(tp){
              if(totalAtualMacro>0){
                alvoSubM[tp]=((atualSub[tp]||0)/totalAtualMacro)*100;
                totalPctSubM+=alvoSubM[tp];
              }
            });
          }
          if(totalPctSubM<=0){
            /* Nenhuma subclasse tem alvo nem valor atual — divide igual entre as subclasses com ativos */
            var subsComAtivos=subsM.filter(function(tp){return enr.some(function(a){return a.tp===tp})});
            if(subsComAtivos.length>0){
              subsComAtivos.forEach(function(tp){alvoSubM[tp]=1;totalPctSubM++});
            }
          }
          /* Calcula déficit por subclasse */
          var defSub={};
          var totalDefSub=0;
          Object.keys(alvoSubM).forEach(function(tp){
            var alvoR=(patFinal*(alvoMacroNorm[mk]||0)/100)*(totalPctSubM>0?alvoSubM[tp]/totalPctSubM:0);
            var atR=atualSub[tp]||0;
            var d=Math.max(0,alvoR-atR);
            defSub[tp]=d;
            totalDefSub+=d;
          });
          if(totalDefSub>0){
            Object.keys(defSub).forEach(function(tp){
              distSub[tp]=(distSub[tp]||0)+valorMacro*(defSub[tp]/totalDefSub);
            });
          }
        });
        
        /* Nível 3: dentro de cada subclasse, distribui entre ATIVOS bloqueando quem passou do alvo */
        var distAtivos={};
        Object.keys(distSub).forEach(function(tp){
          var valorSub=distSub[tp];
          if(valorSub<=0)return;
          var ativosSub=enr.filter(function(a){return a.tp===tp});
          if(ativosSub.length===0)return;
          /* Se tem alvo por ativo, usa. Senão distribui pelo peso atual proporcional */
          var temAlvoExp=ativosSub.some(function(a){return alvoAtivos[a.tk]!==undefined&&alvoAtivos[a.tk]>0});
          var totalAtualSub=ativosSub.reduce(function(s,a){return s+a.vA},0);
          var alvoDict={};
          var totalPctAt=0;
          if(temAlvoExp){
            ativosSub.forEach(function(a){
              alvoDict[a.tk]=alvoAtivos[a.tk]||0;
              totalPctAt+=alvoDict[a.tk];
            });
          }else{
            ativosSub.forEach(function(a){
              alvoDict[a.tk]=totalAtualSub>0?(a.vA/totalAtualSub)*100:(100/ativosSub.length);
              totalPctAt+=alvoDict[a.tk];
            });
          }
          /* Calcula déficit por ativo — BLOQUEIA quem passou do alvo */
          var defAt={};
          var totalDefAt=0;
          ativosSub.forEach(function(a){
            var pctAlvo=totalPctAt>0?(alvoDict[a.tk]/totalPctAt):0;
            var alvoR=valorSub+totalAtualSub;
            alvoR=alvoR*pctAlvo;
            var atR=a.vA;
            if(atR>=alvoR){defAt[a.tk]=0;return;}  /* bloqueia: já passou do alvo */
            var d=Math.max(0,alvoR-atR);
            defAt[a.tk]=d;
            totalDefAt+=d;
          });
          if(totalDefAt>0){
            ativosSub.forEach(function(a){
              distAtivos[a.tk]=(distAtivos[a.tk]||0)+valorSub*(defAt[a.tk]/totalDefAt);
            });
          }else{
            /* Todos ativos daquela subclasse passaram do alvo — redireciona dinheiro pra outra subclasse com déficit */
            /* Por ora, deixa zerado (será agrupado em "sobra") */
          }
        });
        
        /* Tipos que negociam em múltiplos de 1 cota/ação */
        /* Tipos que exigem COTA INTEIRA (Brasil) — ativos de exterior permitem fração */
        var LOTE_INT=["fii","fiagro","fundo_infra","acao","etf_br","bdr"];
        /* Tipos do exterior — permitem compra fracionada em corretoras internacionais (Vest, Avenue, IBKR, etc.) */
        var EXT_FRAC=["reit","etf_int","stock_us"];
        
        /* Sugestões formatadas pra exibição */
        var sugestoes=[];
        var sobraArred=0;/* acumula arredondamentos pra baixo */
        enr.forEach(function(a){
          var vBruto=distAtivos[a.tk]||0;
          var atualPct=totalAtual>0?(a.vA/totalAtual*100):0;
          var mk=TP2M[a.tp]||"outros";
          var ativosSubM=enr.filter(function(x){return x.tp===a.tp});
          var totalSub=ativosSubM.reduce(function(s,x){return s+x.vA},0);
          var alvoPctSub=alvoAtivos[a.tk]!==undefined?alvoAtivos[a.tk]:(totalSub>0?(a.vA/totalSub*100):0);
          /* Arredondamento — lógica diferente para BR (cota inteira) vs Exterior (fração) */

                    if(s.indexOf("prefix")>=0||s.indexOf(" pre ")>=0||s.indexOf("pré ")>=0||s.match(/\bpre[\s\-_]/))return "pre";
                    if(s.indexOf("selic")>=0||s.indexOf("cdi")>=0||s.indexOf("pós")>=0||s.indexOf("pos-")>=0)return "pos";
                    /* Fallback por tipo: LCI/LCA/CDB/Fundo RF sem indicação explícita = pós-fixado (padrão de mercado) */
                    return "pos";
                  };
                  var IDX_L={pos:"Pós-fixado (CDI/Selic)",pre:"Prefixado",ipca:"Indexado à Inflação (IPCA+)"};
                  var IDX_C={pos:"#38BDF8",pre:"#FBBF24",ipca:"#A78BFA"};
                  var IDX_IC={pos:"📊",pre:"📐",ipca:"📈"};
                  /* Calcula distribuição por indexador dentro da RF */
                  var RF_TYPES_IDX=["cdb","lci","lca","lc","cri","cra","tesouro","deb","debi","coe","fundo_rf","fundo_mm"];
                  var totalRF=0;
                  var byIdx={pos:0,pre:0,ipca:0};
                  enr.forEach(function(a){
                    if(RF_TYPES_IDX.indexOf(a.tp)<0)return;
                    var idx=detectIndexador(a);
                    byIdx[idx]+=a.vA;
                    totalRF+=a.vA;
                  });
                  return (
                  <div>
                    <div style={{fontSize:10,color:T.t3,marginBottom:10,fontStyle:"italic"}}>% sobre o TOTAL da macro (ex: dentro de RV, quanto em FII vs Ação)</div>

                      var subsM=Object.keys(TP2M).filter(function(tp){return TP2M[tp]===mk});

                          </div>
                          {subsComAtivos.map(function(tp){
                            var pctAt=totalMacro>0?((atualSub[tp]||0)/totalMacro*100):0;
                            return (
                              <div key={tp} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 6px",fontSize:11}}>
                                <span style={{flex:1,color:T.t2}}>{TIPOS[tp]?TIPOS[tp].l:tp}</span>
                                <span style={{fontSize:9,color:T.t3,fontFamily:"'JetBrains Mono'",minWidth:60,textAlign:"right"}}>atual {pctAt.toFixed(1)}%</span>
                                <input type="number" step="1" min="0" max="100" value={alvoSub[tp]||0} onChange={function(e){upAlvo("subclass",tp,+e.target.value)}} style={{width:55,padding:"3px 5px",background:T.w3,border:"1px solid "+T.bdrL,borderRadius:4,color:MACRO_C[mk],fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none",textAlign:"center"}}/>
                                <span style={{fontSize:9,color:T.t3}}>%</span>
                              </div>
                            );
                          })}
                          {/* Breakdown por INDEXADOR — só em Renda Fixa */}
                          {mk==="rf" && totalRF>0 && (
                            <div style={{marginTop:10,paddingTop:10,borderTop:"1px dashed "+MACRO_C[mk]+"22"}}>
                              <div style={{fontSize:9,color:T.t3,marginBottom:6,fontWeight:700,letterSpacing:.5,textTransform:"uppercase"}}>Composição por Indexador</div>
                              {["pos","pre","ipca"].filter(function(k){return byIdx[k]>0}).map(function(k){
                                var pct=totalRF>0?(byIdx[k]/totalRF*100):0;
                                return (
                                  <div key={k} style={{padding:"6px 4px",display:"flex",alignItems:"center",gap:8}}>
                                    <span style={{fontSize:14}}>{IDX_IC[k]}</span>
                                    <div style={{flex:1,minWidth:0}}>
                                      <div style={{fontSize:10,fontWeight:700,color:IDX_C[k]}}>{IDX_L[k]}</div>
                                      <div style={{height:4,background:"rgba(255,255,255,0.04)",borderRadius:2,overflow:"hidden",marginTop:3}}>
                                        <div style={{height:"100%",width:pct.toFixed(1)+"%",background:IDX_C[k],opacity:.75}}/>
                                      </div>
                                    </div>
                                    <span style={{fontSize:10,fontWeight:700,color:IDX_C[k],fontFamily:"'JetBrains Mono'",minWidth:50,textAlign:"right"}}>{pct.toFixed(1)}%</span>
                                    <span style={{fontSize:9,color:T.t3,fontFamily:"'JetBrains Mono'",minWidth:75,textAlign:"right"}}>{fm(byIdx[k])}</span>
                                  </div>
                                );
                              })}
                              <div style={{fontSize:9,color:T.t3,marginTop:6,fontStyle:"italic",lineHeight:1.4}}>💡 Detectado automaticamente pelo nome do ativo. Reclassifique editando o ativo se necessário.</div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                  );
                })()}

                {/* NÍVEL ATIVOS */}
                {alvoNivel==="ativos" && (
                  <div>
                    <div style={{fontSize:10,color:T.t3,marginBottom:10,fontStyle:"italic"}}>% sobre o TOTAL da subclasse (ex: dentro de FII, quanto em HGLG11 vs KNRI11). Deixe 0 pra distribuir proporcional à carteira atual.</div>
                    {enr.slice().sort(function(a,b){return b.vA-a.vA}).map(function(a){
                      var ativosSubM=enr.filter(function(x){return x.tp===a.tp});
                      var totalSubL=ativosSubM.reduce(function(s,x){return s+x.vA},0);

                      return (

                          <span style={{fontSize:9,color:T.t3,fontFamily:"'JetBrains Mono'"}}>{fm(a.vA)}</span>
                          <span style={{fontSize:9,color:T.t3,fontFamily:"'JetBrains Mono'",minWidth:55,textAlign:"right"}}>atual {pctSub.toFixed(1)}%</span>
                          <input type="number" step="1" min="0" max="100" value={alvoAtivos[a.tk]||0} onChange={function(e){upAlvo("ativos",a.tk,+e.target.value)}} style={{width:55,padding:"3px 5px",background:T.w3,border:"1px solid "+T.bdrL,borderRadius:4,color:T.cyan,fontSize:11,fontWeight:700,fontFamily:"'JetBrains Mono'",outline:"none",textAlign:"center"}}/>
                          <span style={{fontSize:9,color:T.t3}}>%</span>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            )}
          </Cd>

              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>

                <Bt v="secondary" onClick={function(e){
