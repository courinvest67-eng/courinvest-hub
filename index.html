                  txt+="Data: "+new Date().toLocaleDateString("pt-BR")+"\n\n";
                  txt+="━━━━━━━━━━━━━━━━━━\n";
                  aportesData.forEach(function(ap){
                    txt+="▸ *"+ap.ativo+"* ("+ap.tipo+")\n";
                    txt+="   Valor: *"+fm(ap.valor)+"*\n";
                    txt+="   Conta: "+ap.conta+"\n";
                    if(ap.obs)txt+="   "+ap.obs+"\n";
                    txt+="\n";
                  });
                  txt+="━━━━━━━━━━━━━━━━━━\n";
                  txt+="*TOTAL: "+fm(totalAporte)+"*\n\n";
                  txt+="Qualquer dúvida estou à disposição.\n_Courinvest Consultoria em Investimentos_";
                  /* Copia com fallback síncrono (funciona em todos os browsers dentro de click handler) */
                  var copiado=false;
                  var ta=document.createElement("textarea");
                  ta.value=txt;
                  ta.style.position="fixed";ta.style.top="0";ta.style.left="0";ta.style.opacity="0";ta.style.pointerEvents="none";
                  document.body.appendChild(ta);
                  ta.focus();ta.select();
                  try{copiado=document.execCommand("copy")}catch(err){}
                  document.body.removeChild(ta);
                  if(navigator.clipboard&&navigator.clipboard.writeText){try{navigator.clipboard.writeText(txt);copiado=true}catch(err){}}
                  /* Feedback visual no botão */
                  var btn=e.currentTarget;
                  var origText=btn.innerHTML;
                  btn.innerHTML=copiado?"✅ Copiado!":"❌ Falhou";
                  btn.style.color=copiado?"#2DD4A0":"#EF6461";
                  setTimeout(function(){btn.innerHTML=origText;btn.style.color=""},2000);
                }} style={{fontSize:10,padding:"6px 12px"}}>📋 Copiar</Bt>
                <Bt onClick={function(){
                  /* Gera texto plain pra copiar */
                  var txtPlain="*COURINVEST — Tabela de Aportes*\n";
                  txtPlain+="Cliente: "+c.nome+"\n";
                  txtPlain+="Data: "+new Date().toLocaleDateString("pt-BR")+"\n\n";
                  aportesData.forEach(function(ap){
                    txtPlain+="▸ *"+ap.ativo+"* ("+ap.tipo+")\n";
                    txtPlain+="   Valor: *"+fm(ap.valor)+"*\n";
                    txtPlain+="   Conta: "+ap.conta+"\n";
                    if(ap.obs)txtPlain+="   "+ap.obs+"\n";
                    txtPlain+="\n";
                  });
                  txtPlain+="*TOTAL: "+fm(totalAporte)+"*\n\n";
                  txtPlain+="Qualquer dúvida estou à disposição.\n_Courinvest Consultoria_";

                  /* Copia para clipboard — usa fallback robusto com textarea temporária.
                     Esse método é síncrono e funciona mesmo em contextos onde navigator.clipboard
                     falha por perda de foco. */
                  var copiado=false;
                  var ta=document.createElement("textarea");
                  ta.value=txtPlain;
                  ta.style.position="fixed";
                  ta.style.top="0";
                  ta.style.left="0";
                  ta.style.opacity="0";
                  ta.style.pointerEvents="none";
                  document.body.appendChild(ta);
                  ta.focus();
                  ta.select();
                  try{
                    copiado=document.execCommand("copy");
                  }catch(e){copiado=false}
                  document.body.removeChild(ta);
                  /* Tenta também via API moderna (Edge/Chrome recentes) */
                  if(navigator.clipboard&&navigator.clipboard.writeText){
                    try{navigator.clipboard.writeText(txtPlain)}catch(e){}
                  }

                  /* Detecta se cliente tem link de grupo */
                  var waLink=(c.waGrupo||"").trim();
                  if(waLink&&waLink.indexOf("chat.whatsapp.com")>=0){
                    /* Grupo: copia texto e abre link (usuário cola no grupo) */
                    if(copiado){
                      alert("✅ Mensagem copiada para a área de transferência!\n\nAgora cole (Ctrl+V / Cmd+V ou toque e segure) no grupo do WhatsApp que vai abrir.");
                    }else{
                      alert("⚠️ Não foi possível copiar automaticamente. Use o botão \"📋 Copiar\" antes de enviar ao grupo.");
                    }
                    window.open(waLink,"_blank");
                  }else{
                    /* Sem grupo: usa wa.me com telefone (mensagem vai no URL, não precisa colar) */
                    var txtUrl=encodeURIComponent(txtPlain);
                    var tel=(c.tel||"").replace(/\D/g,"");
                    if(!tel){alert("❌ Cliente sem telefone nem link de grupo. Preencha um dos dois na aba Visão Geral > Dados do Cliente.");return;}
                    window.open("https://wa.me/55"+tel+"?text="+txtUrl);
                  }
                }} style={{fontSize:10,padding:"6px 12px"}}>📱 {c.waGrupo&&c.waGrupo.indexOf("chat.whatsapp.com")>=0?"Enviar ao Grupo":"Enviar WhatsApp"}</Bt>

                      <label style={{fontSize:10,color:T.t3,fontWeight:700}}>Ano-base</label>

                        <option value={new Date().getFullYear()-2}>{new Date().getFullYear()-2}</option>
                        <option value={new Date().getFullYear()-1}>{new Date().getFullYear()-1}</option>
                        <option value={new Date().getFullYear()}>{new Date().getFullYear()}</option>
                      </select>
                    </div>
                    <Bt v="secondary" onClick={resetIrpf} style={{fontSize:11}}>🔄 Resetar</Bt>
                  </div>

                  {/* Alerta de contexto */}
                  <Cd style={{padding:16,marginBottom:14,background:"linear-gradient(145deg,"+T.cyan+"15,"+T.cyan+"04)",border:"1px solid "+T.cyan+"33"}} hov={false}>
                    <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                      <span style={{fontSize:22,flexShrink:0}}>ℹ️</span>
                      <div style={{flex:1,fontSize:11,color:T.t2,lineHeight:1.6}}>
                        Este assistente te guia na declaração do <strong style={{color:T.cyan}}>Exercício {anoDec}</strong> (Ano-base <strong style={{color:T.cyan}}>{anoBase}</strong>). Os códigos, campos e fichas referem-se ao <strong style={{color:T.cyan}}>Programa IRPF {anoDec}</strong> da Receita Federal. Importe os informes das corretoras para preencher automaticamente os valores.
                        {temExterior && <span> Identificamos <strong style={{color:T.purple}}>ativos no exterior</strong> — a <strong style={{color:T.purple}}>Parte 2</strong> está ativada.</span>}
                      </div>
                    </div>
                  </Cd>

                  {/* ========== IMPORTAÇÕES BRASIL (B3) ========== */}
                  {sec("🇧🇷","Importações — Corretoras Brasil (B3)",<>
                    <div style={{fontSize:11,color:T.t3,marginBottom:14,lineHeight:1.55}}>Importe os 3 documentos anuais consolidados da B3 ou da sua corretora principal. Isso vai preencher automaticamente os valores de proventos, negociações e posição em 31/12.</div>
                    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                      {uploadBtn(irpfRefInforme,"Informe de Rendimentos","Proventos por pagador (PDF)","💰",".pdf",handleUploadInforme)}
                      {uploadBtn(irpfRefNegoc,"Notas de Negociação","Compras e vendas (PDF/XLSX)","📉",".pdf,.xlsx,.xls,.csv",handleUploadNegoc)}
                      {uploadBtn(irpfRefCustodia,"Extrato de Custódia","Posição em 31/12 (PDF)","📋",".pdf,.xlsx",handleUploadCustodia)}
                    </div>
                    {/* Arquivos importados */}
                    {fileLine(irpfData.informeRend,function(){sIrpfData(function(p){return{...p,informeRend:null}})})}
                    {fileLine(irpfData.negociacoes,function(){sIrpfData(function(p){return{...p,negociacoes:null}})})}
                    {fileLine(irpfData.custodia,function(){sIrpfData(function(p){return{...p,custodia:null}})})}
                  </>)}

                  {/* ========== PARTE 1 — DECLARAÇÃO (BENS E DIREITOS) ========== */}
                  {sec("📝","Parte 1 — Bens e Direitos",<>
                    <div style={{fontSize:11,color:T.t3,marginBottom:14,lineHeight:1.55}}>No <strong style={{color:T.gold}}>Programa IRPF {anoDec}</strong>, acesse a ficha <strong style={{color:T.gold}}>"Bens e Direitos"</strong> e declare cada ativo abaixo com o código correspondente. Use o <strong>valor de custo (PM × quantidade em 31/12)</strong>, não o valor de mercado.</div>

                    {/* Sub-bloco: Renda Fixa */}
                    <div style={{background:T.cyan+"10",border:"1px solid "+T.cyan+"22",borderRadius:10,padding:14,marginBottom:10}}>
                      <div style={{fontSize:12,fontWeight:700,color:T.cyan,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>🏦 Renda Fixa (CDB, LCI, LCA, Tesouro, Debêntures)</div>
                      {step("1","CDB / RDB / LC","Grupo 04 · Item 02","No programa: Bens e Direitos → Novo → Grupo 04 (Aplicações e Investimentos) → Item 02 (Títulos privados). Informe CNPJ do emissor, banco/corretora custodiante e o valor aplicado em 31/12/"+anoBase+". Não inclua rendimentos — só o principal.")}
                      {step("2","LCI e LCA","Grupo 04 · Item 03","Grupo 04, Item 03 (LCI/LCA). Valor em 31/12 = saldo reportado no Informe de Rendimentos. Rendimentos isentos vão para outra ficha (passo 7).")}
                      {step("3","Tesouro Direto","Grupo 04 · Item 02","Grupo 04, Item 02. Discriminação: 'Tesouro [Prefixado/IPCA+/Selic] YYYY — NNN títulos'. CNPJ do Tesouro Nacional: 00.394.460/0001-02. Informe valor a mercado em 31/12.")}
                      {step("4","Debêntures e CRI/CRA","Grupo 04 · Item 03","Grupo 04, Item 03. Informe CNPJ do emissor. Debêntures incentivadas (Lei 12.431/11) têm rendimentos isentos — vão no passo 7.")}
                    </div>

                    {/* Sub-bloco: Renda Variável */}
                    <div style={{background:T.green+"10",border:"1px solid "+T.green+"22",borderRadius:10,padding:14,marginBottom:10}}>
                      <div style={{fontSize:12,fontWeight:700,color:T.green,marginBottom:8,display:"flex",alignItems:"center",gap:6}}>📈 Renda Variável (Ações, FIIs, ETFs, BDRs)</div>
                      {step("5","Ações Brasil","Grupo 03 · Item 01","Grupo 03 (Participações Societárias) → Item 01 (Ações). Uma entrada por código (ticker). Discriminação: 'QTD ações de EMPRESA, ticker TICKER, custodiadas na CORRETORA'. CNPJ da empresa emissora. Valor = PM × qtd em 31/12.")}
                      {step("6","Fundos Imobiliários (FII)","Grupo 07 · Item 03","Grupo 07 (Fundos) → Item 03 (FII). Uma entrada por FII. CNPJ do fundo. Valor = PM × qtd em 31/12. Proventos mensais isentos (PF) vão no passo 7.")}
                      {step("7","ETFs Brasil (BOVA11, IVVB11, etc)","Grupo 07 · Item 09","Grupo 07, Item 09 (ETF). CNPJ do fundo. Valor pela cotação de 31/12 × qtd.")}
                      {step("8","BDRs","Grupo 04 · Item 04","Grupo 04, Item 04. BDR não é considerado ativo no exterior pela Receita (custodiado no Brasil). Valor = PM × qtd.")}
                    </div>
                  </>)}

                  {/* ========== RENDIMENTOS ========== */}
                  {sec("💎","Rendimentos — Isentos, Exclusivos e Tributáveis",<>
                    <div style={{fontSize:11,color:T.t3,marginBottom:14,lineHeight:1.55}}>Distribua cada tipo de rendimento na ficha correta. Consulte o <strong style={{color:T.gold}}>Informe de Rendimentos</strong> de cada instituição — eles já separam os valores por categoria.</div>
                    {step("9","Dividendos de ações e FIIs","Isentos e Não Tributáveis · Código 09","Ficha 'Rendimentos Isentos e Não Tributáveis' → Linha 09 (Lucros e dividendos recebidos). Informe CNPJ do pagador (empresa/FII) e o valor. FIIs aparecem aqui por serem isentos para PF.")}
                    {step("10","JSCP (Juros sobre Capital Próprio)","Trib. Exclusiva · Código 10","Ficha 'Rendimentos Sujeitos à Tributação Exclusiva/Definitiva' → Linha 10. Informe CNPJ do pagador e o valor LÍQUIDO recebido (IRRF de 15% já retido pela empresa).")}
                    {step("11","CDB, Tesouro, Debêntures (trib.)","Trib. Exclusiva · Código 06","Ficha 'Rendimentos Sujeitos à Tributação Exclusiva/Definitiva' → Linha 06. CNPJ do banco/corretora. Valor já com IR retido na fonte.")}
                    {step("12","LCI, LCA, CRI, CRA, Debêntures Incentivadas","Isentos · Código 12","Ficha 'Rendimentos Isentos' → Linha 12 (Rendimentos de caderneta de poupança, letras hipotecárias, LCI, LCA). CNPJ e valor.")}
                    {step("13","Poupança","Isentos · Código 12","Ficha 'Rendimentos Isentos' → Linha 12. Banco, CNPJ e valor total creditado no ano.")}
                  </>)}

                  {/* ========== RENDA VARIÁVEL MENSAL (placeholder — DARFs vêm na Parte 3) ========== */}
                  {sec("📊","Renda Variável — Apuração Mensal (DARFs)",<>
                    <div style={{fontSize:11,color:T.t3,marginBottom:14,lineHeight:1.55}}>A ficha <strong style={{color:T.gold}}>"Renda Variável → Operações Comuns / Day-Trade"</strong> precisa ser preenchida mês a mês. Se você vendeu ações acima de <strong style={{color:T.gold}}>R$ 20.000/mês</strong>, tinha que pagar DARF até o último dia útil do mês seguinte. FIIs sempre pagam (20% sobre ganho).</div>
                    <div style={{padding:22,textAlign:"center",background:T.w3,borderRadius:10,border:"1px dashed "+T.bdrL}}>
                      <div style={{fontSize:32,marginBottom:8,opacity:.5}}>🧮</div>
                      <div style={{fontSize:12,fontWeight:700,color:T.t2,marginBottom:4}}>Calculadoras de DARF</div>
                      <div style={{fontSize:10,color:T.t3,lineHeight:1.5}}>Swing trade de ações (>R$20k/mês) · FIIs (20%) · Day trade (20%)<br/>Disponível após importar Notas de Negociação.</div>
                    </div>
                  </>)}

                  {/* ========== PARTE 2 — EXTERIOR (condicional) ========== */}
                  {temExterior && sec("🌎","Parte 2 — Investimentos no Exterior",<>
                    <div style={{fontSize:11,color:T.t3,marginBottom:14,lineHeight:1.55}}>A partir de <strong style={{color:T.purple}}>2024</strong> (Lei 14.754/2023), a tributação de investimentos no exterior mudou: <strong>15% anual</strong> sobre rendimentos, sem isenção de R$35k, e declaração obrigatória no <strong>anexo "Bens no Exterior"</strong>. Se o total investido ultrapassar <strong>US$ 1 milhão</strong>, também é obrigatório declarar <strong>CBE</strong> no Banco Central.</div>

                    {/* Upload exterior */}
                    <div style={{marginBottom:14}}>
                      <div style={{fontSize:10,color:T.t3,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",marginBottom:8}}>Importar Informes do Exterior</div>
                      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
                        <input ref={irpfRefExterior} type="file" accept=".pdf,.xlsx,.xls,.csv" multiple style={{display:"none"}} onChange={handleUploadExterior}/>
                        <button onClick={function(){irpfRefExterior.current&&irpfRefExterior.current.click()}} style={{flex:1,minWidth:200,padding:"14px 12px",borderRadius:12,border:"1.5px dashed "+T.purple+"55",background:T.purple+"10",color:T.purple,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:6,fontFamily:"'Outfit'"}}>
                          <span style={{fontSize:22}}>🌎</span>
                          <span style={{fontSize:11,fontWeight:700}}>Importar Relatórios de Corretoras</span>
                          <span style={{fontSize:9,color:T.t3,fontWeight:500}}>PDF ou Excel · múltiplos arquivos</span>
                        </button>
                      </div>
                      {/* Corretoras suportadas */}
                      <div style={{fontSize:9,color:T.t3,marginTop:8,textAlign:"center",lineHeight:1.6}}>
                        <strong style={{color:T.t2}}>Corretoras suportadas:</strong> Vest · Avenue · Inter Internacional · C6 Invest Internacional · Interactive Brokers
                      </div>
                      {/* Arquivos importados do exterior */}
                      {irpfData.exterior.length>0 && (
                        <div style={{marginTop:10}}>
                          {irpfData.exterior.map(function(ext,i){return ext.arquivos.map(function(arq,j){return (
                            <div key={i+"-"+j} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 12px",background:T.w3,borderRadius:8,marginTop:4,border:"1px solid "+T.purple+"22"}}>
                              <span style={{fontSize:14}}>📎</span>
                              <span style={{flex:1,fontSize:11,color:T.t2,fontFamily:"'JetBrains Mono'",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{arq.nome}</span>
                              <Bg c="orange">Pendente parser</Bg>
                              <button onClick={function(){sIrpfData(function(p){return{...p,exterior:p.exterior.filter(function(_,idx){return idx!==i})}})}} style={{background:"none",border:"none",color:T.t3,cursor:"pointer",fontSize:12,padding:"0 4px"}}>✕</button>
                            </div>
                          )})})}
                        </div>
                      )}
                    </div>

                    {/* Passos do exterior */}
                    {step("E1","Ações e ETFs no Exterior","Grupo 04 · Item 01","Programa IRPF → Bens e Direitos → Grupo 04 → Item 01 (Depósito em conta-corrente ou poupança no exterior). Valor em reais pela cotação de 31/12 do Banco Central. Informe o país, o nome do ativo, a corretora e o CNPJ se houver (IBKR, Avenue etc. têm CNPJ).")}
                    {step("E2","REITs","Grupo 04 · Item 07","Grupo 04 → Item 07 (Outros bens/direitos no exterior) ou equivalente ao ativo subjacente. Informe valor em BRL pela cotação do BCB em 31/12.")}
                    {step("E3","Conta-corrente na corretora estrangeira","Grupo 04 · Item 01","Qualquer saldo não investido na conta da corretora (cash em USD) entra aqui. Valor em reais pela PTAX de 31/12.")}
                    {step("E4","Dividendos recebidos (Tributação Exclusiva 15% — Lei 14.754)","Ficha 'Renda Variável · Operações no Exterior'","A partir de 2024 os dividendos estrangeiros são tributados em 15% anual sobre o total apurado no ano. Preencha a ficha 'Bens no Exterior - Rendimentos'. IR retido na fonte (30% padrão EUA) pode ser compensado até o limite do imposto devido.")}
                    {step("E5","Ganhos de capital na venda","Ficha GCAP · 15%","Vendas realizadas no ano pagam 15% sobre o ganho em reais (custo e venda convertidos pela PTAX de cada data). Declaração anual única na ficha 'Bens no Exterior - Ganhos de Capital'.")}
                    {step("E6","CBE — Declaração ao Banco Central","bcb.gov.br/cbe","Obrigatória se o total de ativos no exterior ultrapassou <strong>US$ 1.000.000</strong> em 31/12. Acesse bcb.gov.br → CBE e faça até 5 de abril. Multa por atraso começa em R$ 2.500.")}
                  </>)}

                  {/* Nota rodapé */}
                  <Cd style={{padding:14,marginTop:14,background:T.orangeD,border:"1px solid "+T.orange+"33"}} hov={false}>
                    <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
                      <span style={{fontSize:16}}>⚠️</span>
                      <div style={{fontSize:10,color:T.t2,lineHeight:1.6,flex:1}}>
                        <strong style={{color:T.orange}}>Aviso:</strong> Este assistente é uma ferramenta de apoio. Consulte sempre seu contador antes de entregar a declaração. Courinvest não atua como contadoria e não se responsabiliza pela correção dos valores lançados. As regras da Receita podem mudar a cada ano — confirme no Programa IRPF {anoDec} oficial.
                      </div>
                    </div>
                  </Cd>

                  {/* Toast */}
                  {irpfToast && (
                    <div style={{position:"fixed",bottom:20,right:20,padding:"12px 18px",background:T.card,border:"1px solid "+T.gold+"44",borderRadius:12,color:T.gold,fontSize:12,fontWeight:600,boxShadow:"0 10px 40px rgba(0,0,0,0.4)",zIndex:1001,maxWidth:"calc(100vw - 40px)"}}>
                      {irpfToast}
                    </div>
                  )}
                </div>
              );
            })()
          ) : !reportHtml ? (
            <Cd style={{padding:24}} hov={false}>
              <h4 style={{margin:"0 0 4px",fontSize:16,fontWeight:700,color:T.gold}}>📄 Gerar Relatório</h4>
              <div style={{fontSize:11,color:T.t3,marginBottom:20}}>Cliente: <strong style={{color:T.t1}}>{c.nome}</strong></div>

              {/* GRUPO 1 — RELATÓRIOS DE PERFORMANCE (destaque grande) */}
              <div style={{fontSize:10,color:T.t3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>📊 Performance da Carteira</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(260px,1fr))",gap:12,marginBottom:20}}>
                <Cd onClick={function(){sReportHtml(gerarRelatorio("mensal"))}} style={{padding:20,cursor:"pointer",background:"linear-gradient(145deg,"+T.goldD+",rgba(212,163,40,0.04))",border:"1px solid "+T.gold+"33"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:32}}>📊</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:800,color:T.gold,marginBottom:2}}>Relatório Mensal</div>
                      <div style={{fontSize:10,color:T.t3,lineHeight:1.5}}>Performance do último mês · Benchmarks · Atribuição · Proventos · Alocação</div>
                    </div>
                  </div>
                </Cd>
                <Cd onClick={function(){sReportHtml(gerarRelatorio("anual"))}} style={{padding:20,cursor:"pointer",background:"linear-gradient(145deg,"+T.goldD+",rgba(212,163,40,0.04))",border:"1px solid "+T.gold+"33"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <div style={{fontSize:32}}>📈</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:14,fontWeight:800,color:T.gold,marginBottom:2}}>Relatório Anual</div>
                      <div style={{fontSize:10,color:T.t3,lineHeight:1.5}}>Consolidado dos últimos 12 meses · Mesma estrutura do mensal, visão do ano cheio</div>
                    </div>
                  </div>
                </Cd>
              </div>

              {/* GRUPO 2 — IRPF (dark + light) */}
              <div style={{fontSize:10,color:T.t3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>📋 Declarar os Investimentos no IRPF</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10,marginBottom:20}}>
                <Cd onClick={function(){sIrpfMode(true)}} style={{padding:16,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:24}}>🧭</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:T.gold}}>IRPF · Assistente</div>
                      <div style={{fontSize:9,color:T.t3,marginTop:2}}>Passo a passo interativo</div>
                    </div>
                  </div>
                </Cd>
                <Cd onClick={function(){sReportHtml(gerarRelatorio("irpf_light"))}} style={{padding:16,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:24}}>📄</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:T.gold}}>IRPF · Guia Rápido</div>
                      <div style={{fontSize:9,color:T.t3,marginTop:2}}>Relatório simples p/ impressão</div>
                    </div>
                  </div>
                </Cd>
              </div>

              {/* GRUPO 3 — TABELA DE APORTES (dark + light) */}
              <div style={{fontSize:10,color:T.t3,fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:8}}>💰 Tabela de Aportes</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:10,marginBottom:22}}>
                <Cd onClick={function(){sReportHtml(gerarRelatorio("aporte"))}} style={{padding:16,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:24}}>🌙</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:T.gold}}>Aportes · Versão Dark</div>
                      <div style={{fontSize:9,color:T.t3,marginTop:2}}>Tela/apresentação</div>
                    </div>
                  </div>
                </Cd>
                <Cd onClick={function(){sReportHtml(gerarRelatorio("aporte_light"))}} style={{padding:16,cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:24}}>☀️</div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:T.gold}}>Aportes · Versão Light</div>
                      <div style={{fontSize:9,color:T.t3,marginTop:2}}>Para imprimir</div>
                    </div>
                  </div>
                </Cd>

              {/* AÇÕES */}
              <div style={{display:"flex",gap:8,flexWrap:"wrap",paddingTop:14,borderTop:"1px solid "+T.w3}}>
                <Bt v="secondary" style={{fontSize:11}} onClick={function(){
                  var assunto=encodeURIComponent("Relatório — "+c.nome+" | Courinvest");
                  var corpo=encodeURIComponent("Olá "+c.nome.split(" ")[0]+",\n\nSeu relatório está pronto.\n\nQualquer dúvida estou à disposição.\n\nCourinvest Consultoria em Investimentos");
                  window.location.href="mailto:"+(c.email||"")+"?subject="+assunto+"&body="+corpo;
                }}>📧 Enviar por Email</Bt>
                <Bt v="secondary" style={{fontSize:11}} onClick={function(){
                  var msg=encodeURIComponent("Olá "+c.nome.split(" ")[0]+"! 👋\n\nSeu relatório está pronto. Posso enviar por aqui ou por email?\n\n_Courinvest Consultoria_");
                  var tel=(c.tel||"").replace(/\D/g,"");
                  window.location.href="https://wa.me/55"+tel+"?text="+msg;
                }}>📱 WhatsApp</Bt>
              </div>
            </Cd>
          ) : (
            <div>
              {/* Report preview toolbar */}
              <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
                <Bt v="ghost" onClick={function(){sReportHtml(null)}} style={{fontSize:13,padding:"6px 0"}}>← Voltar</Bt>
                <div style={{marginLeft:"auto",display:"flex",gap:6}}>
                  <Bt v="secondary" style={{fontSize:10,padding:"6px 12px"}} onClick={function(){
                    var printWin=document.getElementById("report-frame").contentWindow;

                  <Bt v="secondary" style={{fontSize:10,padding:"6px 12px"}} onClick={function(){

                  }}>📧 Email</Bt>
                </div>
              </div>
              {/* Report rendered in iframe */}
              <div style={{borderRadius:14,overflow:"hidden",border:"1px solid "+T.bdr,background:"#050A14"}}>
                <iframe id="report-frame" srcDoc={reportHtml} style={{width:"100%",height:"80vh",border:"none",borderRadius:14,background:"#050A14"}}/>
              </div>
            </div>
          )}
        </div>
      )}

      {/* MILHAS */}
      {tab==="milhas" && c.sv.includes("milhas") && (
        <div>
          {/* KPIs */}
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>

/* FINANCEIRO DA EMPRESA */
function FinanceiroView({data:d,dispatch:dp}){
  const[fTab,sFTab]=useState("importar");
  const fileRef=useRef(null);
  /* State vem do reducer global (persiste entre navegações) */
  const entradas=(d&&d.fin&&d.fin.entradas)||[];
  const despesas=(d&&d.fin&&d.fin.despesas)||[];
  const sEntradas=function(updater){
    /* API compatível: aceita array ou função */
    var next=typeof updater==="function"?updater(entradas):updater;
    if(next.length===0)dp({t:"FIN_CLEAR_ENTRADAS"});
    else if(next.length>entradas.length){
      /* Add diff */
      var added=next.slice(entradas.length);
      dp({t:"FIN_ADD_ENTRADAS",p:added});
    }else{
      /* Replace full: clear + add */
      dp({t:"FIN_CLEAR_ENTRADAS"});
      if(next.length>0)setTimeout(function(){dp({t:"FIN_ADD_ENTRADAS",p:next})},0);
    }
  };
  const sDespesas=function(updater){
    var next=typeof updater==="function"?updater(despesas):updater;
    /* Diff-based: add new, delete missing */
    var existingIds=despesas.map(function(x){return x.id});
    var nextIds=next.map(function(x){return x.id});
    next.forEach(function(nd){if(existingIds.indexOf(nd.id)<0)dp({t:"FIN_ADD_DESPESA",p:nd})});
    existingIds.forEach(function(id){if(nextIds.indexOf(id)<0)dp({t:"FIN_DEL_DESPESA",p:id})});
  };
  const[showAddDesp,sShowAddDesp]=useState(false);
  const[selMonth,sSelMonth]=useState(null);
  const[selCliFin,sSelCliFin]=useState(null);
  const[selYear,sSelYear]=useState("todos");

  /* Import spreadsheet */
  var importPlanilha=function(file){
    if(!file)return;
    var isExcel=file.name.match(/\.(xlsx|xls)$/i);
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var rows=[];var sheetUsed="";
        if(isExcel){
          var wb=XLSX.read(e.target.result,{type:"array",raw:false});
          var bestSheet="";var bestCount=0;
          wb.SheetNames.forEach(function(name){
            var ws=wb.Sheets[name];
            var r=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});
            if(r.length>bestCount){bestCount=r.length;bestSheet=name}
          });
          sheetUsed=bestSheet;
          var ws=wb.Sheets[bestSheet];
          rows=XLSX.utils.sheet_to_json(ws,{defval:"",raw:false});
        }else{
          var text=e.target.result;
          var lines=text.split(/\r?\n/).filter(function(l){return l.trim()});
          if(lines.length<2)return;
          var sep=lines[0].includes(";")?";":lines[0].includes("\t")?"\t":",";
          var headers=lines[0].split(sep).map(function(x){return x.replace(/"/g,"").trim()});
          rows=lines.slice(1).map(function(line){var vals=line.split(sep).map(function(v){return v.replace(/"/g,"").trim()});var obj={};headers.forEach(function(h,i){obj[h]=vals[i]||""});return obj});
        }
        if(rows.length===0){alert("Planilha vazia");return}
        var rawKeys=Object.keys(rows[0]);
        var findCol=function(patterns){
          return rawKeys.find(function(k){
            var kl=k.toLowerCase().trim();
            for(var i=0;i<patterns.length;i++){if(kl.indexOf(patterns[i])>=0)return true}
            return false;
          });
        };
        var colData=findCol(["data","date"]);
        var colServico=findCol(["servic","serviç"]);
        var colMeio=findCol(["meio","recebimento","pagamento"]);
        var colCliente=rawKeys.find(function(k){return k.trim().toLowerCase()==="cliente"}) || findCol(["cliente"]);
        var colValor=findCol(["valor","value"]);
        var colNF=findCol(["nf","nota"]);
        var colPct=findCol(["fat","percent","%"]);
        var parseVal=function(v){
          if(typeof v==="number")return v;
          var s=String(v||"0").trim().replace(/R\$\s*/g,"").replace(/\s/g,"");
          if(s.match(/,\d{3}\./)){s=s.replace(/,/g,"")}
          else if(s.match(/\.\d{3},/)){s=s.replace(/\./g,"").replace(",",".")}
          else if(s.match(/,\d{1,2}$/)){s=s.replace(",",".")}
          return parseFloat(s)||0;
        };
        var parseDate=function(v){
          if(!v)return"";var s=String(v).trim();
          if(s.match(/^\d{1,2}\/\d{1,2}\/\d{2}$/)){var p=s.split("/");var yr=+p[2];yr=yr<50?2000+yr:1900+yr;return yr+"-"+(p[0].length<2?"0"+p[0]:p[0])+"-"+(p[1].length<2?"0"+p[1]:p[1])}
          if(s.match(/^\d{1,2}\/\d{1,2}\/\d{4}$/)){var p=s.split("/");return p[2]+"-"+(p[1].length<2?"0"+p[1]:p[1])+"-"+(p[0].length<2?"0"+p[0]:p[0])}
          if(s.match(/^\d{4}-\d{2}-\d{2}/))return s.substring(0,10);
          var num=parseFloat(s);if(num>40000&&num<60000){var d=new Date((num-25569)*86400*1000);return d.toISOString().split("T")[0]}
          return s;
        };
        var parsed=rows.map(function(r,i){
          var val=parseVal(colValor?r[colValor]:0);
          if(val<=0)return null;
          var cli=String(colCliente?r[colCliente]:"").trim();
          if(!cli||cli.toLowerCase()==="total geral"||cli.toLowerCase()==="cliente")return null;
          return{id:Date.now()+i,data:parseDate(colData?r[colData]:""),servico:String(colServico?r[colServico]:"").trim(),meio:String(colMeio?r[colMeio]:"").trim(),cliente:cli,valor:val,nf:String(colNF?r[colNF]:"").trim(),pctFat:parseVal(colPct?r[colPct]:0)};
        }).filter(function(r){return r!==null});
        if(parsed.length===0){alert("Nenhuma entrada encontrada.\nAba: "+(sheetUsed||"CSV")+"\nColunas: "+rawKeys.join(", ")+"\nValor col: "+(colValor||"?"));return}
        sEntradas(function(prev){return prev.concat(parsed)});
        sFTab("resumo");
      }catch(err){alert("Erro: "+err.message);console.error(err)}
    };
    if(isExcel){reader.readAsArrayBuffer(file)}else{reader.readAsText(file,"UTF-8")}
  };


  /* Computed data from entradas */
  /* Extract available years */
  var anos=[];entradas.forEach(function(e){if(e.data){var yr=e.data.substring(0,4);if(anos.indexOf(yr)<0)anos.push(yr)}});
  anos.sort();

  /* Filter by selected year */
  var entradasFilt=selYear==="todos"?entradas:entradas.filter(function(e){return e.data&&e.data.substring(0,4)===selYear});
  var despesasFilt=selYear==="todos"?despesas:despesas.filter(function(d){return!d.data||d.data.substring(0,4)===selYear});

  var totalEntradas=entradasFilt.reduce(function(a,e){return a+e.valor},0);
  var totalDespesas=despesasFilt.reduce(function(a,d){return a+d.valor},0);
  var lucro=totalEntradas-totalDespesas;
  var margem=totalEntradas>0?((lucro/totalEntradas)*100):0;

  /* Group by month */
  var byMonth={};
  entradasFilt.forEach(function(e){
    var m=e.data?e.data.substring(0,7):"sem-data";
    if(!byMonth[m])byMonth[m]={rec:0,entries:[],servicos:{},meios:{}};
    byMonth[m].rec+=e.valor;
    byMonth[m].entries.push(e);
    var svc=e.servico||"Outros";
    byMonth[m].servicos[svc]=(byMonth[m].servicos[svc]||0)+e.valor;
    var meio=e.meio||"Outros";
    byMonth[m].meios[meio]=(byMonth[m].meios[meio]||0)+e.valor;
  });

  var byDespCat={};

  var despCatColors={Aluguel:T.red,Software:T.cyan,Contabilidade:T.orange,Marketing:T.purple,Telefonia:T.green,Impostos:T.gold,Outros:T.t3};

  var fmtMonth=function(m){var p=m.split("-");return(["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][+p[1]]||p[1])+"/"+p[0].slice(2)};

  return (
    <div>
      <div style={{display:"flex",gap:4,marginBottom:16,flexWrap:"wrap"}}>

          <button key={t.id} onClick={function(){sFTab(t.id)}} style={{padding:"8px 16px",borderRadius:12,fontSize:11,fontWeight:600,cursor:"pointer",border:fTab===t.id?"1.5px solid "+T.gold:"1px solid rgba(255,255,255,0.04)",background:fTab===t.id?T.goldD:"transparent",color:fTab===t.id?T.gold:T.t3}}>{t.l}</button>

      {/* IMPORTAR */}
      {fTab==="importar" && (

            <div style={{fontSize:42,marginBottom:14,animation:"float 4s ease infinite"}}>📊</div>
            <div style={{fontSize:18,fontWeight:700,color:T.gold,marginBottom:6}}>Importar Planilhas de Entradas</div>
            <div style={{fontSize:13,color:T.t3,marginBottom:18,lineHeight:1.7}}>Selecione uma ou <strong style={{color:T.t2}}>várias planilhas de uma vez</strong>.<br/>Os dados são acumulados automaticamente.<br/><span style={{color:T.t2}}>Colunas: Data | Serviço | Meio de Recebimento | Cliente | Valor | NF | % Fat.</span></div>
            <Bt onClick={function(){fileRef.current&&fileRef.current.click()}} style={{fontSize:14,padding:"14px 32px"}}>📥 Selecionar Planilhas (CSV ou Excel)</Bt>
            {entradas.length>0 && <div style={{marginTop:16,padding:10,background:T.greenD,borderRadius:10,fontSize:12,color:T.green,fontWeight:600}}>✅ {entradas.length} entradas carregadas • Total: {fm(totalEntradas)}</div>}
          </Cd>
          {entradas.length>0 && (

              </div>

                    </tr>

              <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>

                  {l:"RECEITA "+(selYear==="todos"?"TOTAL":selYear),v:fm(totalEntradas),c:T.green},
                  {l:"DESPESA "+(selYear==="todos"?"TOTAL":selYear),v:fm(totalDespesas),c:T.red},
                  {l:"LUCRO "+(selYear==="todos"?"":""+selYear),v:fm(lucro),c:lucro>=0?T.green:T.red},

                  </Cd>
                )})}
              </div>
              {/* Chart */}
              <Cd style={{padding:22}} hov={false}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:6}}>

                </div>
                {(function(){
                  var isMob=typeof window!=="undefined"&&window.innerWidth<640;
                  var minBarW=isMob?44:0;

                  return (
                    <div style={{overflowX:isMob?"auto":"visible",paddingBottom:isMob?4:0}}>
                      <div style={{display:"flex",alignItems:"flex-end",gap:isMob?6:(mesesOrdenados.length>8?4:8),height:isMob?180:220,padding:"0 2px",minWidth:totalMinW||"auto"}}>
                        {mesesOrdenados.map(function(m,i){
                          var prevRec=i>0?byMonth[mesesOrdenados[i-1]].rec:0;
                          var curRec=byMonth[m].rec;
                          var evolPct=prevRec>0?(((curRec/prevRec)-1)*100):0;
                          var isSel=selMonth===m;
                          var barH=Math.max(12,(curRec/mxRec)*(isMob?130:175));
                          return (
                            <div key={i} onClick={function(){sSelMonth(isSel?null:m)}} style={{flex:isMob?"0 0 "+minBarW+"px":1,display:"flex",flexDirection:"column",alignItems:"center",cursor:"pointer",minWidth:isMob?minBarW:0}}>
                              {i>0 && (!isMob||isSel) && <div style={{padding:"2px 6px",borderRadius:6,background:evolPct>=0?"rgba(45,212,160,0.12)":"rgba(239,100,97,0.12)",marginBottom:4,whiteSpace:"nowrap"}}>

                              </div>}
                              {i===0 && !isMob && <div style={{height:22}}/>}
                              {(!isMob||isSel) && <div style={{fontSize:isMob?11:(mesesOrdenados.length>8?8:11),fontWeight:700,color:isSel?T.gold:T.t1,fontFamily:"'JetBrains Mono'",marginBottom:4,whiteSpace:"nowrap"}}>{fm(curRec).replace("R$ ","")}</div>}
                              <div style={{width:"100%",maxWidth:isMob?44:56,height:barH,background:isSel?"linear-gradient(180deg,#F0D060,#D4A328,rgba(212,163,40,0.4))":"linear-gradient(180deg,rgba(45,212,160,0.8),rgba(45,212,160,0.4),rgba(45,212,160,0.1))",borderRadius:"8px 8px 3px 3px",border:isSel?"1.5px solid "+T.gold:"1px solid rgba(45,212,160,0.15)",boxShadow:isSel?"0 0 16px rgba(212,163,40,0.3)":"0 2px 8px rgba(45,212,160,0.08)",transition:"all 0.3s ease",position:"relative",overflow:"hidden"}}>
                                <div style={{position:"absolute",top:0,left:"20%",right:"20%",height:2,background:isSel?"rgba(255,255,255,0.5)":"rgba(255,255,255,0.15)",borderRadius:1}}/>
                              </div>
                              <div style={{marginTop:8,fontSize:isMob?10:(mesesOrdenados.length>8?8:11),color:isSel?T.gold:T.t2,fontWeight:isSel?700:500,whiteSpace:"nowrap"}}>{fmtMonth(m)}</div>
                              {!isMob && <div style={{fontSize:8,color:T.t3,marginTop:1}}>{byMonth[m].entries.length} ent.</div>}
                            </div>
                          );
                        })}
                      </div>
                    </div>

                {mesesOrdenados.length>=2 && (function(){
                  var first=byMonth[mesesOrdenados[0]].rec;

                  var evol=first>0?(((last/first)-1)*100):0;
                  var maxMes=mesesOrdenados.reduce(function(b,m){return byMonth[m].rec>byMonth[b].rec?m:b},mesesOrdenados[0]);
                  var minMes=mesesOrdenados.reduce(function(b,m){return byMonth[m].rec<byMonth[b].rec?m:b},mesesOrdenados[0]);
                  return (
                    <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(110px,1fr))",gap:8,marginTop:16,padding:12,background:"rgba(255,255,255,0.015)",borderRadius:12,border:"1px solid rgba(255,255,255,0.03)"}}>

                      <div style={{textAlign:"center"}}><div style={{fontSize:8,color:T.t3,fontWeight:600}}>TOTAL</div><div style={{fontSize:14,fontWeight:800,color:T.gold,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{fm(totalEntradas)}</div></div>
                    </div>
                  );
                })()}
              </Cd>

              {/* Month drill-down */}
              {selMonth && byMonth[selMonth] && (
                <Cd style={{padding:18,marginTop:12}} hov={false} glow>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>

                    <button onClick={function(){sSelMonth(null)}} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,color:T.t3,padding:"4px 10px",cursor:"pointer",fontSize:12}}>✕</button>

                    <Cd style={{padding:"10px 14px",flex:1,minWidth:100}} hov={false}><div style={{fontSize:7,color:T.t3,fontWeight:600}}>RECEITA</div><div style={{fontSize:16,fontWeight:800,color:T.green,fontFamily:"'JetBrains Mono'"}}>{fm(byMonth[selMonth].rec)}</div></Cd>
                    <Cd style={{padding:"10px 14px",flex:1,minWidth:100}} hov={false}><div style={{fontSize:7,color:T.t3,fontWeight:600}}>ENTRADAS</div><div style={{fontSize:16,fontWeight:800,color:T.cyan}}>{byMonth[selMonth].entries.length}</div></Cd>

                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>

                      </div>

                  </div>
                  {/* By meio this month */}

                    <div style={{fontSize:11,fontWeight:700,color:T.t2,marginBottom:8}}>Por Meio de Recebimento</div>

                      <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                        <span style={{fontSize:12,color:T.t2}}>{m}</span>
                        <span style={{fontSize:12,fontWeight:700,color:meioColors[m]||T.t2,fontFamily:"'JetBrains Mono'"}}>{fm(v)}</span>
                      </div>
                    )})}
                  </div>
                  {/* Faturamento por Cliente this month */}
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:11,fontWeight:700,color:T.gold,marginBottom:8}}>👤 Faturamento por Cliente</div>
                    {(function(){
                      var cliMonth={};

                        cliMonth[e.cliente].servico=e.servico;
                        cliMonth[e.cliente].meio=e.meio;

                      return Object.entries(cliMonth).sort(function(a,b){return b[1].total-a[1].total}).map(function(e,i){

                          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 0",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>

                              <div style={{fontSize:12,fontWeight:700,color:T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(d.total)}</div>

                            </div>
                          </div>

                            <div style={{display:"flex",alignItems:"flex-end",gap:isMob?3:5,height:isMob?110:130,padding:"4px 2px",overflowX:mesesCli.length>8?"auto":"visible"}}>
                              {mesesCli.map(function(m,idx){
                                var v=valoresMes[idx];
                                var hBar=maxMes>0?Math.max(6,(v/maxMes)*100):6;
                                var isBest=idx===bestMesIdx&&v>0;
                                return (
                                  <div key={idx} style={{flex:mesesCli.length>8&&isMob?"0 0 auto":1,width:mesesCli.length>8&&isMob?28:"auto",display:"flex",flexDirection:"column",alignItems:"center",minWidth:isMob?24:0}}>
                                    <div style={{fontSize:isMob?7:8,color:isBest?T.green:T.t3,fontWeight:isBest?700:500,marginBottom:3,whiteSpace:"nowrap",fontFamily:"'JetBrains Mono'"}}>{v>=1000?(v/1000).toFixed(1)+"k":v.toFixed(0)}</div>
                                    <div style={{width:"100%",maxWidth:32,height:hBar+"px",background:isBest?"linear-gradient(180deg,"+T.gold+","+T.goldD+")":"linear-gradient(180deg,rgba(45,212,160,0.7),rgba(45,212,160,0.2))",borderRadius:"4px 4px 2px 2px",border:isBest?"1px solid "+T.gold:"1px solid rgba(45,212,160,0.2)"}}/>
                                    <div style={{fontSize:isMob?7:8,color:isBest?T.gold:T.t3,marginTop:4,whiteSpace:"nowrap",fontWeight:isBest?700:500}}>{fmtMes(m)}</div>
                                  </div>
                                );
                              })}
                            </div>
                          </div>
                          {/* Resumo por ano */}
                          {yrs.length>1 && (
                            <div style={{marginBottom:14}}>
                              <div style={{fontSize:10,color:T.t3,fontWeight:600,marginBottom:6}}>RESUMO POR ANO</div>
                              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                                {yrs.map(function(yr,yi){
                                  var y=byYr[yr];
                                  var prevYr=byYr[yrs[yi-1]];
                                  var evol=prevYr&&prevYr.total>0?(((y.total/prevYr.total)-1)*100):null;
                                  return (
                                    <Cd key={yr} style={{padding:"8px 12px",flex:1,minWidth:110}} hov={false}>
                                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
                                        <span style={{fontSize:11,fontWeight:700,color:T.t2}}>{yr}</span>
                                        {evol!==null && <span style={{fontSize:9,fontWeight:700,color:evol>=0?T.green:T.red}}>{evol>=0?"▲ +":"▼ "}{Math.abs(evol).toFixed(1)}%</span>}
                                      </div>
                                      <div style={{fontSize:13,fontWeight:800,color:T.gold,fontFamily:"'JetBrains Mono'"}}>{fm(y.total)}</div>
                                      <div style={{fontSize:9,color:T.t3,marginTop:2}}>{y.count} meses</div>
                                    </Cd>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                          {/* Pagamentos individuais */}
                          {entriesSort.length>0 && (
                            <div>
                              <div style={{fontSize:10,color:T.t3,fontWeight:600,marginBottom:6}}>HISTÓRICO DE PAGAMENTOS ({entriesSort.length})</div>
                              <div style={{maxHeight:200,overflowY:"auto",background:"rgba(255,255,255,0.015)",borderRadius:8,border:"1px solid rgba(255,255,255,0.03)"}}>
                                {entriesSort.slice(0,50).map(function(ent,ei){
                                  var dt=ent.data?(function(){var p=ent.data.split("-");return p[2]+"/"+p[1]+"/"+p[0]})():"—";
                                  return (
                                    <div key={ei} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",borderBottom:ei<Math.min(entriesSort.length,50)-1?"1px solid rgba(255,255,255,0.02)":"none",fontSize:11}}>
                                      <div style={{flex:1,minWidth:0}}>
                                        <div style={{color:T.t1,fontWeight:600}}>{dt}</div>
                                        <div style={{color:T.t3,fontSize:9,marginTop:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{ent.servico||"—"}{ent.meio?" • "+ent.meio:""}{ent.nf?" • NF "+ent.nf:""}</div>
                                      </div>
                                      <div style={{color:T.gold,fontWeight:800,fontFamily:"'JetBrains Mono'",fontSize:12}}>{fm(ent.valor)}</div>
                                    </div>
                                  );
                                })}
                                {entriesSort.length>50 && <div style={{padding:8,textAlign:"center",fontSize:9,color:T.t3,fontStyle:"italic"}}>... e mais {entriesSort.length-50} pagamentos</div>}
                              </div>
                            </div>
                          )}
                        </Cd>
                      );
                    })()}
                    </div>
                  );
                });
              })()}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

    {id:4,nome:"Luciana Pinto",tel:"(31)96543-2109",email:"luciana@email.com",origem:"Site",servico:"patrimonio",patEst:1200000,stage:"proposta",notas:"Enviada proposta 0.9% a.a.",dtCriado:"2026-03-15"},
    {id:5,nome:"Pedro Augusto",tel:"(11)95432-1098",email:"pedro@email.com",origem:"Indicação",servico:"planejamento",patEst:0,stage:"negociacao",notas:"Negociando valor do fee mensal",dtCriado:"2026-03-10"},
    {id:6,nome:"Ana Beatriz",tel:"(21)94321-0987",email:"ana@email.com",origem:"Instagram",servico:"milhas",patEst:0,stage:"prospect",notas:"Interesse em Couri Mile$",dtCriado:"2026-04-05"},
    {id:7,nome:"Marcos Oliveira",tel:"(11)93210-9876",email:"marcos@email.com",origem:"Indicação",servico:"patrimonio",patEst:650000,stage:"fechado",notas:"Convertido! Início em maio.",dtCriado:"2026-02-15"},
    {id:8,nome:"Juliana Costa",tel:"(31)92109-8765",email:"juliana@email.com",origem:"LinkedIn",servico:"patrimonio",patEst:900000,stage:"perdido",notas:"Escolheu concorrente (XP)",dtCriado:"2026-02-01"},
  ];
  const leads=(d&&d.lds&&d.lds.length>0)?d.lds:SEED_LEADS;
  /* Se ainda não há leads no estado global, faz o seed inicial (roda 1x) */
  React.useEffect(function(){
    if(d&&(!d.lds||d.lds.length===0)){
      dp({t:"SET_LEADS",p:SEED_LEADS});
    }
  },[]);
  /* Helpers que manipulam leads via reducer (mantêm a mesma API do código antigo) */
  var sLeads=function(updater){
    var current=(d&&d.lds&&d.lds.length>0)?d.lds:SEED_LEADS;
    var next=typeof updater==="function"?updater(current):updater;
    dp({t:"SET_LEADS",p:next});
  };

  const[showAdd,sShowAdd]=useState(false);
  const[selLead,sSelLead]=useState(null);
  const[toast,sToast]=useState(null);
  const show=function(m){sToast(m);setTimeout(function(){sToast(null)},3000)};

  /* Form state para Novo Lead — controlado via React */
  const[ldForm,sLdForm]=useState({nome:"",tel:"",email:"",origem:"Indicação",servico:"patrimonio",patEst:0,notas:"",indicadorTipo:"cliente",indicadorId:"",indicadorNome:"",indicadorBusca:""});
  const resetLdForm=function(){sLdForm({nome:"",tel:"",email:"",origem:"Indicação",servico:"patrimonio",patEst:0,notas:"",indicadorTipo:"cliente",indicadorId:"",indicadorNome:"",indicadorBusca:""})};

  /* Period filter: month YYYY-MM or year YYYY or "todos" */
  const hojeRef=new Date();
  const mesAtual=String(hojeRef.getMonth()+1).padStart(2,"0");
  const anoAtual=hojeRef.getFullYear();
  const[periodo,sPeriodo]=useState("mes:"+anoAtual+"-"+mesAtual);
  const MN_CURTO=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];

  /* Build period options: last 12 months + years */
  var periodOpts=[{v:"todos",l:"Todos os períodos"}];
  for(var i=0;i<12;i++){
    var d=new Date(anoAtual,hojeRef.getMonth()-i,1);
    var ym=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    periodOpts.push({v:"mes:"+ym,l:MN_CURTO[d.getMonth()]+"/"+String(d.getFullYear()).slice(2)+" (mensal)"});
  }
  /* Year options from 2024 to current */
  for(var y=anoAtual;y>=2024;y--){
    periodOpts.push({v:"ano:"+y,l:y+" (anual)"});
  }

  /* Period filter helper: returns true if date "YYYY-MM-DD" falls inside selected period */
  var inPeriod=function(dateStr){
    if(!dateStr)return periodo==="todos";
    if(periodo==="todos")return true;
    if(periodo.indexOf("mes:")===0){var ym=periodo.substring(4);return dateStr.substring(0,7)===ym}
    if(periodo.indexOf("ano:")===0){var yr=periodo.substring(4);return dateStr.substring(0,4)===yr}
    return true;
  };
  var periodLabel=(function(){var o=periodOpts.find(function(x){return x.v===periodo});return o?o.l:""})();

  /* ===== CLIENTES — auto-populated from data.cl ===== */
  /* Status convention:
     - status="ativo" (default) → coluna "Ativos"
     - status="inativo" → coluna "Inativos/Encerrados" com badge INATIVO (cliente sem contato)
     - status="encerrado" → coluna "Inativos/Encerrados" com badge ENCERRADO (cliente cancelou)
     OBS: Clientes com dados importados do Gorila (_gorilaRent ou _ativosImport) sempre contam
     como ativos, salvo se status estiver explicitamente como "encerrado". */
  var clientes=(d&&d.cl?d.cl:[]).map(function(c){
    var temImport=!!(c._gorilaRent || (c._ativosImport && c._ativosImport.length>0));
    /* Se tem import do Gorila e status não é "encerrado" explícito, força como ativo */
    var statusRaw=c.status||"ativo";
    var status=(temImport && statusRaw!=="encerrado")?"ativo":statusRaw;
    var dtCap=c.dtCaptacao||"2024-01-01";
    var dtStatus=c.dtStatusChange||dtCap;
    /* Last interaction check (from data.it) */
    var intCli=((d&&d.it)||[]).filter(function(i){return i.cid===c.id}).sort(function(a,b){return (b.data||"").localeCompare(a.data||"")});
    var lastInt=intCli.length>0?intCli[0].data:dtCap;
    var monthsSinceContact=Math.floor((hojeRef-new Date(lastInt))/(30*86400000));
    return Object.assign({},c,{
      sv:Array.isArray(c.sv)?c.sv:[],     /* defensivo: sv sempre array */
      status:status,
      dtCaptacao:dtCap,
      dtStatusChange:dtStatus,
      _lastInt:lastInt,
      _mSinceContact:monthsSinceContact,
      _semContato:status==="ativo"&&monthsSinceContact>=6,
      _temGorila:temImport
    });
  });

  var ativosTodos=clientes.filter(function(c){return c.status==="ativo"});
  var inativosTodos=clientes.filter(function(c){return c.status==="inativo"||c.status==="encerrado"});

  /* Move client between statuses */
  var moveClientStatus=function(clienteId,newStatus){
    var hoje=new Date().toISOString().split("T")[0];
    dp({t:"UC",p:{id:clienteId,status:newStatus,dtStatusChange:hoje}});
    var labels={ativo:"ativado",inativo:"marcado como inativo",encerrado:"marcado como encerrado"};
    show("✅ Cliente "+(labels[newStatus]||newStatus));
  };

  /* ===== LEADS ===== */
  var moveLead=function(leadId,newStage){
    sLeads(function(p){return p.map(function(l){return l.id===leadId?Object.assign({},l,{stage:newStage}):l})});
  };
  var leadsAtivos=leads.filter(function(l){return l.stage!=="fechado"&&l.stage!=="perdido"});
  var leadsFechados=leads.filter(function(l){return l.stage==="fechado"});
  var leadsPerdidos=leads.filter(function(l){return l.stage==="perdido"});

  /* ===== METRICS (filtered by period) ===== */
  /* Captados no período: clientes cujo dtCaptacao cai no período */
  var captadosPeriodo=clientes.filter(function(c){return inPeriod(c.dtCaptacao)});
  /* Inativos/encerrados no período: cujo dtStatusChange cai no período E status != ativo */
  var saidasPeriodo=clientes.filter(function(c){return c.status!=="ativo"&&inPeriod(c.dtStatusChange)});
  var inativosPeriodo=saidasPeriodo.filter(function(c){return c.status==="inativo"});
  var encerradosPeriodo=saidasPeriodo.filter(function(c){return c.status==="encerrado"});
  var netCaptacao=captadosPeriodo.length-saidasPeriodo.length;
  /* Retention rate */
  var baseRetencao=ativosTodos.length+saidasPeriodo.length;
  var taxaRetencao=baseRetencao>0?((ativosTodos.length/baseRetencao)*100).toFixed(0):100;

  /* Pipeline totals (aggregate leads + clients for view) */
  var totalPatPipeline=leads.filter(function(l){return l.stage!=="perdido"}).reduce(function(a,l){return a+l.patEst},0);
  var fechadosLeads=leadsFechados.length;
  var convRate=fechadosLeads+leadsPerdidos.length>0?((fechadosLeads/(fechadosLeads+leadsPerdidos.length))*100).toFixed(0):0;

  /* ===== EVOLUTION CHART — last 12 months ===== */
  var evolMeses=[];
  for(var i=11;i>=0;i--){
    var dEvol=new Date(anoAtual,hojeRef.getMonth()-i,1);
    var yme=dEvol.getFullYear()+"-"+String(dEvol.getMonth()+1).padStart(2,"0");
    var novos=clientes.filter(function(c){return c.dtCaptacao&&c.dtCaptacao.substring(0,7)===yme}).length;
    var saidas=clientes.filter(function(c){return c.status!=="ativo"&&c.dtStatusChange&&c.dtStatusChange.substring(0,7)===yme}).length;
    evolMeses.push({ym:yme,label:MN_CURTO[dEvol.getMonth()]+"/"+String(dEvol.getFullYear()).slice(2),novos:novos,saidas:saidas,net:novos-saidas});
  }
  var maxEvol=Math.max.apply(null,evolMeses.map(function(m){return Math.max(m.novos,m.saidas)}).concat([1]));

  return (
    <div>
      {toast && <div style={{position:"fixed",top:20,right:20,zIndex:2000,padding:"14px 24px",background:T.greenD,border:"1px solid "+T.green+"33",borderRadius:14,color:T.green,fontSize:13,fontWeight:600,boxShadow:"0 12px 40px rgba(0,0,0,0.4)"}}>{toast}</div>}

      {/* PERIOD SELECTOR */}
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14,flexWrap:"wrap"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:11,fontWeight:700,color:T.t3,letterSpacing:.8}}>📅 PERÍODO DE ANÁLISE:</span>
          <select value={periodo} onChange={function(e){sPeriodo(e.target.value)}} style={{padding:"8px 14px",background:T.w3,border:"1px solid "+T.gold+"22",borderRadius:10,color:T.gold,fontSize:12,fontWeight:700,outline:"none",cursor:"pointer",minWidth:180}}>
            {periodOpts.map(function(o){return <option key={o.v} value={o.v}>{o.l}</option>})}
          </select>
        </div>
        <span style={{fontSize:10,color:T.t3,marginLeft:"auto"}}>Filtra KPIs de captação, saídas e evolução abaixo</span>
      </div>

      {/* KPIs — captação do período + totais atuais */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:10,marginBottom:14}}>
        <Cd style={{padding:"12px 16px"}} hov={false} glow>
          <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>✅ CLIENTES ATIVOS</div>
          <div style={{fontSize:22,fontWeight:800,color:T.green,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{ativosTodos.length}</div>
          <div style={{fontSize:9,color:T.t3,marginTop:2}}>Base total hoje</div>
        </Cd>
        <Cd style={{padding:"12px 16px",border:"1px solid "+T.gold+"22"}} hov={false}>
          <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>🆕 CAPTADOS NO PERÍODO</div>
          <div style={{fontSize:22,fontWeight:800,color:T.gold,marginTop:2,fontFamily:"'JetBrains Mono'"}}>+{captadosPeriodo.length}</div>
          <div style={{fontSize:9,color:T.t3,marginTop:2}}>{periodLabel}</div>
        </Cd>
        <Cd style={{padding:"12px 16px"}} hov={false}>
          <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>⚠️ INATIVOS NO PERÍODO</div>
          <div style={{fontSize:22,fontWeight:800,color:T.orange,marginTop:2,fontFamily:"'JetBrains Mono'"}}>−{inativosPeriodo.length}</div>
          <div style={{fontSize:9,color:T.t3,marginTop:2}}>Sem contato/engajamento</div>
        </Cd>
        <Cd style={{padding:"12px 16px"}} hov={false}>
          <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>🚪 ENCERRADOS NO PERÍODO</div>
          <div style={{fontSize:22,fontWeight:800,color:T.red,marginTop:2,fontFamily:"'JetBrains Mono'"}}>−{encerradosPeriodo.length}</div>
          <div style={{fontSize:9,color:T.t3,marginTop:2}}>Cancelamentos</div>
        </Cd>
        <Cd style={{padding:"12px 16px"}} hov={false}>
          <div style={{fontSize:8,color:T.t3,fontWeight:600,letterSpacing:1}}>📊 NET NO PERÍODO</div>
          <div style={{fontSize:22,fontWeight:800,color:netCaptacao>=0?T.green:T.red,marginTop:2,fontFamily:"'JetBrains Mono'"}}>{netCaptacao>=0?"+":""}{netCaptacao}</div>
          <div style={{fontSize:9,color:T.t3,marginTop:2}}>Captação − Saídas</div>

          <div style={{fontSize:9,color:T.t3,marginTop:2}}>Ativos / (Ativos + Saídas)</div>
        </Cd>
      </div>

      {/* EVOLUTION CHART */}
      <Cd style={{padding:16,marginBottom:14}} hov={false}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12,flexWrap:"wrap",gap:8}}>

          <div style={{display:"flex",gap:12,fontSize:10}}>
            <span style={{color:T.t3}}><span style={{display:"inline-block",width:10,height:10,background:T.green,borderRadius:2,marginRight:4,verticalAlign:"middle"}}/>Novos</span>
            <span style={{color:T.t3}}><span style={{display:"inline-block",width:10,height:10,background:T.red,borderRadius:2,marginRight:4,verticalAlign:"middle"}}/>Saídas</span>
            <span style={{color:T.t3}}><span style={{display:"inline-block",width:10,height:10,background:T.gold,borderRadius:"50%",marginRight:4,verticalAlign:"middle"}}/>Net</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"flex-end",gap:6,height:140,padding:"0 4px"}}>
          {evolMeses.map(function(m,i){
            var hNovos=Math.max(3,(m.novos/maxEvol)*100);
            var hSaidas=Math.max(3,(m.saidas/maxEvol)*100);
            return (
              <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",minWidth:0}}>
                <div style={{fontSize:9,fontWeight:700,color:m.net>=0?T.green:T.red,fontFamily:"'JetBrains Mono'",marginBottom:3}}>{m.net>=0?"+":""}{m.net}</div>
                <div style={{display:"flex",gap:2,alignItems:"flex-end",width:"100%",justifyContent:"center",height:110}}>
                  <div title={"Novos: "+m.novos} style={{width:"42%",maxWidth:16,height:m.novos>0?hNovos+"%":"3px",background:"linear-gradient(180deg,"+T.green+",rgba(45,212,160,0.3))",borderRadius:"3px 3px 0 0",opacity:m.novos>0?.85:.2}}/>
                  <div title={"Saídas: "+m.saidas} style={{width:"42%",maxWidth:16,height:m.saidas>0?hSaidas+"%":"3px",background:"linear-gradient(180deg,"+T.red+",rgba(248,113,113,0.3))",borderRadius:"3px 3px 0 0",opacity:m.saidas>0?.85:.2}}/>
                </div>
                <div style={{fontSize:8,color:T.t3,marginTop:5,whiteSpace:"nowrap"}}>{m.label}</div>
              </div>
            );
          })}
        </div>
      </Cd>

      {/* ============ FUNIL DE VENDAS (LEADS) ============ */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <h4 style={{margin:0,fontSize:14,fontWeight:700,color:T.gold}}>🎯 Funil de Vendas (Leads)</h4>
          <Bg c="gold">{leads.length} leads</Bg>
          <span style={{fontSize:10,color:T.t3,marginLeft:4}}>• Conversão {convRate}% • Pipeline {fm(totalPatPipeline)}</span>
        </div>
        <Bt onClick={function(){sShowAdd(true)}} style={{fontSize:12,padding:"8px 16px"}}>＋ Novo Lead</Bt>
      </div>

      <div style={{display:"flex",gap:10,overflowX:"auto",paddingBottom:10}}>
        {stages.map(function(stage){
          var stageLeads=leads.filter(function(l){return l.stage===stage.id});
          return (
            <div key={stage.id} style={{minWidth:180,flex:"0 0 auto",display:"flex",flexDirection:"column",width:window.innerWidth<768?"70vw":"auto"}}>
              <div style={{padding:"10px 14px",background:stage.co+"12",borderRadius:"14px 14px 0 0",border:"1px solid "+stage.co+"22",borderBottom:"2px solid "+stage.co+"44",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{fontSize:16}}>{stage.ic}</span>
                  <span style={{fontSize:12,fontWeight:700,color:stage.co}}>{stage.l}</span>
                </div>
                <span style={{fontSize:11,fontWeight:800,color:stage.co,background:stage.co+"22",padding:"2px 8px",borderRadius:10}}>{stageLeads.length}</span>
              </div>
              <div style={{flex:1,background:T.w3,borderRadius:"0 0 14px 14px",padding:8,minHeight:120,display:"flex",flexDirection:"column",gap:6,border:"1px solid "+T.bdrL,borderTop:"none"}}>
                {stageLeads.map(function(lead){return (
                  <div key={lead.id} onClick={function(){sSelLead(lead)}} style={{padding:12,background:T.card,borderRadius:12,border:"1px solid "+T.bdr,cursor:"pointer",transition:"all 0.2s"}}>
                    <div style={{fontSize:13,fontWeight:700,marginBottom:4}}>{lead.nome}</div>
                    <div style={{display:"flex",gap:4,marginBottom:6,flexWrap:"wrap"}}>
                      <Bg c={SC[lead.servico]||"gold"}>{SL[lead.servico]||lead.servico}</Bg>

                        {lead.indicador.tipo==="cliente" && <span style={{fontSize:7,color:T.t3,background:T.goldD,padding:"1px 4px",borderRadius:3}}>cliente</span>}
                      </div>
                    )}
                    {lead.patEst>0 && <div style={{fontSize:11,color:T.gold,fontWeight:600,fontFamily:"'JetBrains Mono'"}}>{fm(lead.patEst)}</div>}
                    {lead.notas && <div style={{fontSize:10,color:T.t3,marginTop:4,lineHeight:1.4}}>{lead.notas.substring(0,60)}{lead.notas.length>60?"...":""}</div>}
                    <div style={{display:"flex",gap:3,marginTop:8}}>
                      {stages.filter(function(s){return s.id!==lead.stage}).slice(0,3).map(function(s){return (
                        <button key={s.id} onClick={function(e){e.stopPropagation();moveLead(lead.id,s.id);show("Lead movido para "+s.l)}} style={{padding:"3px 6px",borderRadius:4,border:"1px solid "+s.co+"33",background:s.co+"12",color:s.co,fontSize:8,fontWeight:600,cursor:"pointer"}}>{s.ic}</button>
                      )})}
                      <button onClick={function(e){e.stopPropagation();moveLead(lead.id,"perdido");show("Lead marcado como perdido")}} style={{padding:"3px 6px",borderRadius:4,border:"1px solid "+T.red+"33",background:T.redD,color:T.red,fontSize:8,fontWeight:600,cursor:"pointer",marginLeft:"auto"}}>✗</button>
                    </div>
                  </div>
                )})}
                {stageLeads.length===0 && <div style={{padding:16,textAlign:"center",fontSize:11,color:T.t3,opacity:.5}}>Sem leads</div>}
              </div>
            </div>
          );
        })}
      </div>

      {/* ============ CLIENTES — ATIVOS & INATIVOS ============ */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:20,marginBottom:14,flexWrap:"wrap",gap:8}}>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          <h4 style={{margin:0,fontSize:14,fontWeight:700,color:T.gold}}>👥 Clientes da Base</h4>
          <Bg c="green">{ativosTodos.length} ativos</Bg>
          {inativosTodos.length>0 && <Bg c="orange">{inativosTodos.length} fora da base</Bg>}
        </div>
        <span style={{fontSize:10,color:T.t3}}>Auto-populado da aba Clientes • Mova entre status pelos botões no card</span>
      </div>

      <div style={{display:"grid",gridTemplateColumns:window.innerWidth<768?"1fr":"2fr 1fr",gap:10}}>
        {/* ATIVOS */}
        <div style={{display:"flex",flexDirection:"column"}}>
          <div style={{padding:"10px 14px",background:T.green+"12",borderRadius:"14px 14px 0 0",border:"1px solid "+T.green+"22",borderBottom:"2px solid "+T.green+"44",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:16}}>✅</span>
              <span style={{fontSize:12,fontWeight:700,color:T.green}}>Ativos</span>
              <span style={{fontSize:9,color:T.t3,marginLeft:4}}>auto-populada</span>
            </div>
            <span style={{fontSize:11,fontWeight:800,color:T.green,background:T.green+"22",padding:"2px 8px",borderRadius:10}}>{ativosTodos.length}</span>
          </div>

            {ativosTodos.length===0 && <div style={{padding:20,textAlign:"center",fontSize:11,color:T.t3,opacity:.5,gridColumn:"1 / -1"}}>Nenhum cliente ativo — cadastre na aba Clientes</div>}
            {ativosTodos.map(function(c){
              var svArr=Array.isArray(c.sv)?c.sv:[];
              var patGorila=c.patGorila||c.pat||0;
              /* Se não tem pat direto mas tem ativos importados, soma */

}
function Ag(){
  const MN=["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const[showNew,sShowNew]=useState(false);
  const[toast,sToast]=useState(null);
  const show=function(m){sToast(m);setTimeout(function(){sToast(null)},3000)};

  var addToGCal=function(a){
    /* Google Calendar URL format */
    var dtParts=a.dt.split("-");
    var hrParts=a.hr.split(":");
    var durMin=parseInt(a.du)||60;
    var start=new Date(+dtParts[0],+dtParts[1]-1,+dtParts[2],+hrParts[0],+hrParts[1]);
    var end=new Date(start.getTime()+durMin*60000);
    var pad=function(n){return n<10?"0"+n:String(n)};
    var fmt=function(d){return d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+"T"+pad(d.getHours())+pad(d.getMinutes())+"00"};
    var title=encodeURIComponent("Courinvest — "+a.cl+" ("+a.tp+")");
    var details=encodeURIComponent("Reunião com "+a.cl+"\nTipo: "+a.tp+"\nDuração: "+a.du+"\n\nCourinvest Consultoria em Investimentos");
    var url="https://calendar.google.com/calendar/render?action=TEMPLATE&text="+title+"&dates="+fmt(start)+"/"+fmt(end)+"&details="+details;
    window.open(url,"_blank");
  };

  return (
    <div>
      {toast && <div style={{position:"fixed",top:20,right:20,zIndex:2000,padding:"14px 24px",background:T.greenD,border:"1px solid "+T.green+"33",borderRadius:14,color:T.green,fontSize:13,fontWeight:600,boxShadow:"0 12px 40px rgba(0,0,0,0.4)",animation:"fadeUp .3s ease"}}>{toast}</div>}

      <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
        <Cd style={{padding:24,flex:2,minWidth:300}} hov={false}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
            <h3 style={{margin:0,fontSize:16,fontWeight:700,color:T.gold}}>Próximas Reuniões</h3>
            <Bt onClick={function(){sShowNew(true)}} style={{fontSize:11,padding:"8px 14px"}}>＋ Agendar</Bt>
          </div>
          {agd.map(function(a,i){
            var dd=Math.ceil((new Date(a.dt)-new Date("2026-04-11"))/864e5);
            return (
              <div key={a.id} style={{display:"flex",gap:14,padding:"14px 0",borderBottom:i<agd.length-1?"1px solid "+T.w3:"none",alignItems:"center"}}>
                <div style={{width:54,height:54,borderRadius:16,background:dd<=0?T.goldD:dd===1?T.cyanD:T.w3,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0,border:"1px solid "+(dd<=0?T.gold+"33":dd===1?T.cyan+"33":T.bdrL)}}>
                  <span style={{fontSize:18,fontWeight:800,color:dd<=1?T.gold:T.t1}}>{a.dt.split("-")[2]}</span>
                  <span style={{fontSize:9,color:T.t3}}>{MN[+a.dt.split("-")[1]]}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                    <span style={{fontSize:15,fontWeight:700}}>{a.cl}</span>
                    {dd<=0 && <Bg c="gold">HOJE</Bg>}
                    {dd===1 && <Bg c="cyan">AMANHÃ</Bg>}
                  </div>
                  <div style={{fontSize:12,color:T.t3}}>{a.tp}</div>
                  <div style={{fontSize:11,color:T.t2,marginTop:4}}>🕐 {a.hr} • ⏱ {a.du}{dd>1?" • em "+dd+" dias":""}</div>
                </div>

/* IMPORT */
function ImportView(){
  const[file,sFile]=useState(null);
  const[rows,sRows]=useState([]);
  const[cols,sCols]=useState([]);
  const[fonte,sFonte]=useState("");
  const[status,sStatus]=useState("idle");
  const fileRef=useRef(null);

  const handleFile=function(f){
    if(!f)return;
    sFile(f);sStatus("loading");
    const isExcel=f.name.match(/\.(xlsx|xls)$/i);
    const reader=new FileReader();
    reader.onload=function(e){
      try{
        let h=[],d=[];
        if(isExcel){
          const wb=XLSX.read(e.target.result,{type:"array"});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const json=XLSX.utils.sheet_to_json(ws,{defval:""});
          if(json.length>0){h=Object.keys(json[0]);d=json}
        }else{
          const text=e.target.result;
          const lines=text.split(/\r?\n/).filter(function(l){return l.trim()});
          if(lines.length<2){sStatus("error");return}
          const sep=lines[0].includes(";")?";":lines[0].includes("\t")?"\t":",";
          h=lines[0].split(sep).map(function(x){return x.replace(/"/g,"").trim()});
          d=lines.slice(1).map(function(line){const vals=line.split(sep).map(function(v){return v.replace(/"/g,"").trim()});const obj={};h.forEach(function(hh,i){obj[hh]=vals[i]||""});return obj}).filter(function(r){return Object.values(r).some(function(v){return v})});
        }
        if(h.length===0){sStatus("error");return}
        sCols(h);sRows(d);sFonte("Detectado");sStatus("done");
      }catch(err){sStatus("error")}
    };
    reader.onerror=function(){sStatus("error")};
    if(isExcel){reader.readAsArrayBuffer(f)}else{reader.readAsText(f,"UTF-8")}
  };

  return (
    <div>
      <Cd style={{padding:status==="done"?24:50,textAlign:status==="done"?"left":"center"}} hov={false}>
        {status!=="done" && (
          <div onClick={function(){fileRef.current && fileRef.current.click()}} style={{cursor:"pointer"}}>
            <input ref={fileRef} type="file" accept=".csv,.txt,.tsv,.xlsx,.xls" onChange={function(e){if(e.target.files[0])handleFile(e.target.files[0])}} style={{display:"none"}}/>
            <div style={{fontSize:42,marginBottom:14,animation:"float 4s ease infinite"}}>📁</div>
            <div style={{fontSize:18,fontWeight:700,color:T.gold,marginBottom:8}}>Importar Dados</div>
            <div style={{fontSize:14,color:T.t3}}>Clique para selecionar CSV ou Excel</div>
          </div>
        )}
        {status==="done" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div><div style={{fontSize:16,fontWeight:700}}>{file && file.name}</div><Bg c="green">Importado</Bg></div>
              <Bt v="secondary" onClick={function(){sStatus("idle");sFile(null);sRows([]);sCols([])}} style={{fontSize:12}}>📁 Novo</Bt>
            </div>
            <div style={{fontSize:12,color:T.t2,marginBottom:10}}>{rows.length} linhas • {cols.length} colunas</div>
          </div>
        )}
      </Cd>
      {status==="done" && rows.length>0 && (
        <Cd style={{padding:20,marginTop:14}} hov={false}>
          <h4 style={{margin:"0 0 14px",fontSize:14,fontWeight:700,color:T.gold}}>Preview ({Math.min(rows.length,15)} linhas)</h4>
          <div style={{overflowX:"auto",borderRadius:12,border:"1px solid "+T.bdrL}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
              <thead><tr style={{background:T.w3}}>{cols.map(function(c,i){return <th key={i} style={{padding:"8px 12px",textAlign:"left",fontWeight:700,color:T.gold,fontSize:10,borderBottom:"1px solid "+T.bdr,whiteSpace:"nowrap"}}>{c}</th>})}</tr></thead>
              <tbody>{rows.slice(0,15).map(function(r,ri){return <tr key={ri} style={{background:ri%2===0?"transparent":T.w3}}>{cols.map(function(c,ci){return <td key={ci} style={{padding:"6px 12px",borderBottom:"1px solid "+T.bdrL,color:T.t2,whiteSpace:"nowrap",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis"}}>{r[c]||"—"}</td>})}</tr>})}</tbody>
            </table>
          </div>
        </Cd>
      )}
    </div>
  );
}

/* Tabela regressiva de taxa de gestão por patrimônio */
function txGestaoRegressiva(patrimonio){
  if(!patrimonio||patrimonio<200000)return null;
  if(patrimonio<=600000)return 0.175;
  if(patrimonio<=1500000)return 0.150;
  if(patrimonio<=3000000)return 0.125;
  return 0.100;
}
/* Consultoria Financeira (trabalho pontual, 2 sessões):
   - patrimônio < R$ 100k: valor fixo de R$ 990
   - patrimônio >= R$ 100k: 1% sobre o patrimônio
*/
function precoConsultoria(patrimonio){
  var p=patrimonio||0;
  if(p<100000)return{tipo:"fixo",valor:990,base:0,pct:0};
  return{tipo:"percentual",valor:p*0.01,base:p,pct:1.0};
}

/* Baseado no componente Logo do menu lateral: semicírculo aberto à direita (~180°) */

function CourinvestLogo({color="#F2C12E",textColor="#0A1628",width=280,showText=true,darkMode=false}){

  var gid="cvLg"+Math.random().toString(36).slice(2,8);
  return (
    <svg width={width} height={showText?width*0.255:width} viewBox={showText?"0 0 430 110":"0 0 100 100"} style={{display:"block"}} xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id={gid} x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="#F0D060"/>
          <stop offset="50%" stopColor={color}/>
          <stop offset="100%" stopColor="#B8891A"/>
        </linearGradient>
      </defs>
      {showText?(
        <>
          {/* Monograma CourInvest — semicírculo aberto à direita, proporcional à barra lateral */}
          <g transform="translate(10,5) scale(1.0)">
            {/* Círculo externo sutil */}
            <circle cx="50" cy="50" r="46" stroke={"url(#"+gid+")"} strokeWidth="0.5" opacity=".15" fill="none"/>

            <path d="M50 6 C18 6,6 26,6 50 C6 74,18 94,50 94" stroke={"url(#"+gid+")"} strokeWidth="5" strokeLinecap="round" fill="none"/>
            {/* Arco interno concêntrico */}
            <path d="M50 18 C28 18,18 32,18 50 C18 68,28 82,50 82" stroke={"url(#"+gid+")"} strokeWidth="4" strokeLinecap="round" fill="none" opacity=".7"/>
            {/* Ponto central + halo */}
            <circle cx="58" cy="50" r="4" fill={"url(#"+gid+")"}/>
            <circle cx="58" cy="50" r="7" fill="none" stroke={"url(#"+gid+")"} strokeWidth=".8" opacity=".2"/>
          </g>
          {/* Texto COURINVEST + tagline */}
          <g transform="translate(130,45)">
            <text x="0" y="0" fontFamily="'Outfit',sans-serif" fontSize="32" fontWeight="800" fill={txtCol} letterSpacing="1">COURINVEST</text>
            <text x="0" y="22" fontFamily="'Outfit',sans-serif" fontSize="10" fontWeight="600" fill={subCol} letterSpacing="3.5">CONSULTORIA EM INVESTIMENTOS</text>

        <g>

      )}

}
